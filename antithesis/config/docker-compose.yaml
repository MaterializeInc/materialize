    - MZ_NO_BUILTIN_POSTGRES=1
    - MZ_NO_BUILTIN_COCKROACH=1
    - MZ_ADAPTER_STASH_URL=postgres://root@postgres-metadata:26257?options=--search_path=adapter
    volumes:
    - mzdata:/mzdata
    - mydata:/var/lib/mysql-files
    - tmp:/share/tmp
    - scratch:/scratch
    tmpfs:
    - /tmp
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - localhost:6878/api/readyz
      interval: 1s
      start_period: 600s
    stop_grace_period: 120s
    platform: linux/amd64
    image: materialize/materialized:latest
  workload:
    depends_on:
      materialized:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
    - PGHOST=materialized
    - PGPORT=6875
    - PGUSER=materialize
    - KAFKA_BROKER=kafka:9092
    - SCHEMA_REGISTRY_URL=http://schema-registry:8081
    platform: linux/amd64
    image: materialize-workload:latest
networks: {}
volumes:
  mzdata: null
  pgdata: null
  mysqldata: null
  mssqldata: null
  sourcedata_512Mb:
    driver_opts:
      device: tmpfs
      type: tmpfs
      o: size=512m
  mydata: null
  tmp: null
  secrets: null
  scratch: null
