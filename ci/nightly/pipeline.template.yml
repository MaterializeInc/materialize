    timeout_in_minutes: 60
    plugins:
      - ./ci/plugins/mzcompose:
          composition: iceberg
    agents:
      queue: hetzner-aarch64-8cpu-16gb

  - group: "Race Condition"
    key: race-condition
    steps:
       - id: race-condition-subsequent
         topics: [iceberg, kafka, kafka-sink, mysql, postgres, sql-server]
         label: "Race Condition Test (subsequent)"
         depends_on: build-x86_64
         timeout_in_minutes: 60
         agents:
           queue: hetzner-x86-64-8cpu-16gb
         plugins:
           - ./ci/plugins/mzcompose:
               composition: race-condition
               args: [--runtime=1500, --scenario=subsequent]

       - id: race-condition-subsequent-100
         topics: [iceberg, kafka, kafka-sink, mysql, postgres, sql-server]
         label: "Race Condition Test (subsequent, 100 objects)"
         depends_on: build-x86_64
         timeout_in_minutes: 60
         agents:
           queue: hetzner-x86-64-12cpu-24gb
         plugins:
           - ./ci/plugins/mzcompose:
               composition: race-condition
               # One scenario takes ~25 min; --runtime=1500 ensures a second
               # scenario won't start. Keep --repetitions modest so a single
               # scenario fits in the 30-min target runtime.
               args: [--runtime=1500, --scenario=subsequent, --num-objects=100, --repetitions=50]

       - id: race-condition-subsequent-chain
         topics: [iceberg, kafka, kafka-sink, mysql, postgres, sql-server]
         label: "Race Condition Test (subsequent chain)"
         depends_on: build-x86_64
         timeout_in_minutes: 60
         agents:
           queue: hetzner-x86-64-8cpu-16gb
         plugins:
           - ./ci/plugins/mzcompose:
               composition: race-condition
               args: [--runtime=1500, --scenario=subsequent-chain]

       - id: race-condition-subsequent-chain-50
         topics: [iceberg, kafka, kafka-sink, mysql, postgres, sql-server]
         label: "Race Condition Test (subsequent chain, 50 objects)"
         depends_on: build-x86_64
         timeout_in_minutes: 60
         agents:
           queue: hetzner-x86-64-12cpu-24gb
         plugins:
           - ./ci/plugins/mzcompose:
               composition: race-condition
               # OoM with 100 objects
               args: [--runtime=1500, --scenario=subsequent-chain, --num-objects=50, --repetitions=50]

       - id: race-condition-concurrent
         topics: [iceberg, kafka, kafka-sink, mysql, postgres, sql-server]
         label: "Race Condition Test (concurrent)"
         depends_on: build-x86_64
         timeout_in_minutes: 60
         agents:
           queue: hetzner-x86-64-8cpu-16gb
         plugins:
           - ./ci/plugins/mzcompose:
               composition: race-condition
               args: [--runtime=1500, --scenario=concurrent]
         skip: "Not stable yet, not clear if this is a product issue"

       - id: race-condition-rotate-keys
         topics: [iceberg, kafka, kafka-sink, mysql, postgres, sql-server]
         label: "ALTER CONNECTION ROTATE KEYS vs SET race"
         depends_on: build-x86_64
         timeout_in_minutes: 15
         agents:
           queue: hetzner-x86-64-4cpu-8gb
         plugins:
           - ./ci/plugins/mzcompose:
               composition: race-condition
               run: rotate-keys-race

  - id: mz-deploy
    topics: [kafka, postgres]
    label: "mz-deploy"
    depends_on: build-x86_64
    timeout_in_minutes: 30
    inputs: [src/mz-deploy, test/mz-deploy]
    plugins:
      - ./ci/plugins/mzcompose:
          composition: mz-deploy
          ci-builder: stable
    agents:
      queue: hetzner-x86-64-4cpu-8gb

