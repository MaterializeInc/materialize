# Default priority, just set to be explicit
priority: 0

steps:
  - group: Builds
    key: builds
    steps:
      - id: build-x86_64
        label: ":rust: Build x86_64"
        command: bin/ci-builder run stable bin/pyactivate -m ci.test.build
        inputs:
          - "*"
        depends_on: []
        timeout_in_minutes: 60
        agents:
          queue: l-builder-linux-x86_64

      - id: build-aarch64
        label: ":rust: Build aarch64"
        command: bin/ci-builder run stable bin/pyactivate -m ci.test.build
        inputs:
          - "*"
        depends_on: []
        timeout_in_minutes: 60
        agents:
          queue: l-builder-linux-aarch64

      - id: build-x86_64-asan
        label: ":rust: Build x86_64 (ASan)"
        command: bin/ci-builder run min bin/pyactivate -m ci.test.build
        inputs:
          - "*"
        depends_on: []
        timeout_in_minutes: 60
        agents:
          queue: builder-linux-x86_64
        env:
          CI_SANITIZER: address

        sanitizer: skip
        branches: "main"
        skip: "currently broken"

      - id: build-aarch64-asan
        label: ":rust: Build aarch64 (ASan)"
        command: bin/ci-builder run min bin/pyactivate -m ci.test.build
        inputs:
          - "*"
        depends_on: []
        timeout_in_minutes: 60
        agents:
          queue: builder-linux-aarch64-mem
        env:
          CI_SANITIZER: address
        sanitizer: skip
        branches: "main"
        skip: "currently broken"

      - id: build-rust-latest-beta
        label: "Build with Latest Rust Beta"
        command: bin/ci-builder run stable ci/test/rust-beta-build.sh
        depends_on: []
        timeout_in_minutes: 60
        agents:
          queue: hetzner-aarch64-16cpu-32gb
        branches: "main *build*"

      - id: build-rust-latest-beta-release
        label: "Build with Latest Rust Beta (Release)"
        command: bin/ci-builder run stable ci/test/rust-beta-build.sh --release
        depends_on: []
        timeout_in_minutes: 60
        agents:
          queue: hetzner-x86-64-dedi-48cpu-192gb
        branches: "main *build*"

      - id: devel-docker-tags
        label: Tag development docker images
        command: bin/ci-builder run min bin/pyactivate -m ci.test.dev_tag
        inputs:
          - "*"
        depends_on:
          - build-x86_64
          - build-aarch64
        timeout_in_minutes: 20
        agents:
          queue: linux-aarch64-small
        coverage: skip
        # Fortify against intermittent DockerHub/GHCR issues
        retry:
          automatic:
            - exit_status: 1
              limit: 2

  - group: Linters
    key: linters
    steps:
      - id: closed-issues-detect
        timeout_in_minutes: 30
        label: Detect references to already closed issues
        command: bin/ci-builder run stable bin/ci-closed-issues-detect
        depends_on: []
        agents:
          queue: hetzner-aarch64-4cpu-8gb
        branches: "main"
        sanitizer: skip

      - id: unused-deps
        label: Unused dependencies
        command: bin/ci-builder run nightly bin/unused-deps
        inputs:
          - Cargo.lock
          - Cargo.toml
          - "**/Cargo.toml"
          - "**/*.rs"
        depends_on: []
        timeout_in_minutes: 45
        agents:
          queue: hetzner-aarch64-8cpu-16gb
        sanitizer: skip

      - id: check-package-isolation
        label: Package-isolated cargo check
        command: bin/ci-builder run stable bin/check-package-isolation
        inputs:
          - Cargo.lock
          - Cargo.toml
          - "**/Cargo.toml"
          - "**/*.rs"
        depends_on: []
        timeout_in_minutes: 60
        parallelism: 8
        agents:
          queue: hetzner-aarch64-16cpu-32gb
        sanitizer: skip

      - id: cargo-deny-check-advisories
        label: Security advisories
        command: bin/ci-builder run stable cargo deny check advisories
        inputs:
          - Cargo.lock
          - deny.toml
        depends_on: []
        timeout_in_minutes: 20
        agents:
          queue: hetzner-aarch64-4cpu-8gb
        sanitizer: skip

      - id: sbomgen
        timeout_in_minutes: 30
        label: Generate SBOM and upload to AWS
        command: bin/ci-builder run stable bin/sbomgen
        depends_on: []
        agents:
          # Because of scratch-aws-access
          queue: linux-aarch64-small
        branches: "main v*.*"
        sanitizer: skip
        plugins:
          - ./ci/plugins/scratch-aws-access: ~
        artifact_paths: [sbom.json, inspector-results.json]

  - id: miri-test
    topics: [kafka, postgres]
    label: ":rust: Miri test (full)"
    depends_on: []
    timeout_in_minutes: 60
    plugins:
      - ./ci/plugins/mzcompose:
          composition: cargo-test
          args: [--miri-full]
    agents:
      queue: hetzner-aarch64-16cpu-32gb
    sanitizer: skip

  - group: Benchmarks
    key: benchmark
    steps:
      - id: feature-benchmark
        topics: [cockroach, copy-to-s3, iceberg, kafka, kafka-sink, mysql, postgres, sql-server]
        label: "Feature benchmark against merge base or 'latest'"
        depends_on: build-x86_64
        timeout_in_minutes: 120
        parallelism: 12
        agents:
          queue: hetzner-x86-64-dedi-16cpu-64gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: feature-benchmark
              args:
                - --other-tag
                # common-ancestor will default to latest if not in a PR
                - common-ancestor
      - id: scalability-benchmark-dml-dql
        topics: [postgres]
        label: "Scalability benchmark (read & write) against merge base or 'latest'"
        depends_on: build-x86_64
        timeout_in_minutes: 120
        env:
          # Runs against Dockerhub directly
          MZ_GHCR: 0
        agents:
          # Larger instance is more stable in performance
          queue: hetzner-x86-64-dedi-16cpu-64gb
        parallelism: 4
        plugins:
          - ./ci/plugins/mzcompose:
              composition: scalability
              args:
                - --target
                - HEAD
                - --target
                - common-ancestor
                - --regression-against
                - common-ancestor
                - --workload-group-marker
                - "DmlDqlWorkload"
                - --max-concurrency
                - "256"
      - id: scalability-benchmark-ddl
        topics: [postgres]
        label: "Scalability benchmark (DDL) against merge base or 'latest'"
        depends_on: build-x86_64
        timeout_in_minutes: 120
        parallelism: 2
        env:
          # Runs against Dockerhub directly
          MZ_GHCR: 0
        agents:
          # Larger instance is more stable in performance
          queue: hetzner-x86-64-dedi-16cpu-64gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: scalability
              args:
                - --target
                - HEAD
                - --target
                - common-ancestor
                - --regression-against
                - common-ancestor
                - --workload-group-marker
                - "DdlWorkload"
                - --count
                - "128"
                - --exponent-base
                - "4"
                - --max-concurrency
                - "64"
      - id: scalability-benchmark-connection
        topics: [postgres]
        label: "Scalability benchmark (connection) against merge base or 'latest'"
        depends_on: build-x86_64
        timeout_in_minutes: 120
        parallelism: 2
        env:
          # Runs against Dockerhub directly
          MZ_GHCR: 0
        agents:
          # Larger instance is more stable in performance
          queue: hetzner-x86-64-dedi-16cpu-64gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: scalability
              args:
                - --target
                - HEAD
                - --target
                - common-ancestor
                - --regression-against
                - common-ancestor
                - --workload-group-marker
                - "ConnectionWorkload"
                - --exponent-base
                - "2"
                - --max-concurrency
                - "1024"
      - id: parallel-benchmark
        topics: [cockroach, kafka, mysql, postgres]
        label: "Parallel Benchmark"
        depends_on: build-x86_64
        timeout_in_minutes: 120
        parallelism: 5
        agents:
          # Larger instance is more stable in performance
          queue: hetzner-x86-64-dedi-16cpu-64gb
        env:
          # TODO(def-) Investigate test failures with GHCR, might just need to wait for more recent tags to be uploaded
          MZ_GHCR: 0
        plugins:
          - ./ci/plugins/mzcompose:
              composition: parallel-benchmark
              args:
                - --other-tag
                - common-ancestor

      - id: workload-replay
        topics: [iceberg, kafka, mysql, postgres, sql-server, ssh-tunnel]
        label: "Workload Replay (1% initial data)"
        depends_on: build-x86_64
        timeout_in_minutes: 120
        parallelism: 5
        plugins:
          - ./ci/plugins/mzcompose:
              composition: workload-replay
              run: benchmark
              args:
                - --factor-initial-data=0.01
                - --compare-against
                - common-ancestor
        agents:
          queue: hetzner-x86-64-dedi-8cpu-32gb

  - group: Kafka
    key: kafka
    steps:
      - id: kafka-multi-broker
        topics: [kafka, kafka-sink]
        label: Kafka multi-broker
        depends_on: build-aarch64
        timeout_in_minutes: 30
        agents:
          queue: hetzner-aarch64-4cpu-8gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: kafka-multi-broker

      - id: redpanda-resumption
        topics: [kafka, kafka-sink]
        label: ":panda_face: resumption"
        depends_on: build-aarch64
        timeout_in_minutes: 30
        plugins:
          - ./ci/plugins/mzcompose:
              composition: kafka-resumption
              args: [--redpanda]
        agents:
          queue: hetzner-aarch64-4cpu-8gb


  - group: Testdrive
    key: testdrive
    steps:
      - id: redpanda-testdrive
        topics: [copy-to-s3, kafka, kafka-sink, mysql, postgres]
        label: ":panda_face: :racing_car: testdrive"
        depends_on: build-aarch64
        timeout_in_minutes: 60
        parallelism: 2
        agents:
          queue: hetzner-aarch64-4cpu-8gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: testdrive
              args: [--redpanda, --slow]

      - id: testdrive-partitions-5
        topics: [copy-to-s3, kafka, kafka-sink, mysql, postgres]
        label: ":racing_car: testdrive with --kafka-default-partitions 5"
        depends_on: build-aarch64
        timeout_in_minutes: 60
        parallelism: 2
        agents:
          queue: hetzner-aarch64-4cpu-8gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: testdrive
              args: [--kafka-default-partitions=5, --slow]

      - id: testdrive-replicas-4
        topics: [copy-to-s3, kafka, kafka-sink, mysql, postgres]
        label: ":racing_car: testdrive 4 replicas"
        depends_on: build-aarch64
        timeout_in_minutes: 60
        parallelism: 2
        agents:
          queue: hetzner-aarch64-16cpu-32gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: testdrive
              args: [--replicas=4, --slow]

      - id: testdrive-size-1
        topics: [copy-to-s3, kafka, kafka-sink, mysql, postgres]
        label: ":racing_car: testdrive with SIZE 1"
        depends_on: build-aarch64
        timeout_in_minutes: 60
        parallelism: 2
        agents:
          queue: hetzner-aarch64-4cpu-8gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: testdrive
              args: [--default-size=1, --slow, --check-statement-logging]

      - id: testdrive-size-8
        topics: [copy-to-s3, kafka, kafka-sink, mysql, postgres]
        label: ":racing_car: testdrive with SIZE 8"
        depends_on: build-aarch64
        timeout_in_minutes: 60
        parallelism: 2
        agents:
          queue: hetzner-aarch64-8cpu-16gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: testdrive
              args: [--default-size=8, --slow]

      - id: persistence-testdrive
        topics: [copy-to-s3, kafka, kafka-sink, mysql, postgres]
        label: ":racing_car: testdrive with --persistent-user-tables"
        depends_on: build-aarch64
        timeout_in_minutes: 30
        parallelism: 2
        agents:
          queue: hetzner-aarch64-4cpu-8gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: testdrive
              args: [--persistent-user-tables, --slow]
        skip: "Persistence tests disabled"

      - id: azurite-testdrive
        topics: [azurite, copy-to-s3, kafka, kafka-sink, mysql, postgres]
        label: "testdrive with :azure: blob store"
        depends_on: build-aarch64
        timeout_in_minutes: 60
        parallelism: 2
        agents:
          # Larger agent because Azurite is slow
          queue: hetzner-aarch64-8cpu-16gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: testdrive
              args: [--azurite, --slow]

      - id: azurite-testdrive-size-8
        topics: [azurite, copy-to-s3, kafka, kafka-sink, mysql, postgres]
        label: ":racing_car: testdrive with SIZE 8 and :azure: blob store"
        depends_on: build-aarch64
        timeout_in_minutes: 60
        parallelism: 2
        agents:
          queue: hetzner-aarch64-8cpu-16gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: testdrive
              args: [--default-size=8, --azurite, --slow]

      - id: testdrive-fdb
        topics: [copy-to-s3, kafka, kafka-sink, mysql, postgres]
        label: "testdrive with FoundationDB"
        depends_on: build-aarch64
        timeout_in_minutes: 60
        parallelism: 2
        inputs: [test/testdrive]
        plugins:
          - ./ci/plugins/mzcompose:
              composition: testdrive
              env:
                - EXTERNAL_METADATA_STORE: foundationdb
        agents:
          queue: hetzner-aarch64-4cpu-8gb

      - id: testdrive-alloydb
        topics: [copy-to-s3, kafka, kafka-sink, mysql, postgres]
        label: "testdrive with AlloyDB"
        depends_on: build-x86_64
        timeout_in_minutes: 60
        parallelism: 2
        inputs: [test/testdrive]
        plugins:
          - ./ci/plugins/mzcompose:
              composition: testdrive
              env:
                - EXTERNAL_METADATA_STORE: alloydb
        agents:
          # `gosu` doesn't work on Graviton
          queue: hetzner-x86-64-4cpu-8gb


  - group: Limits
    key: limits-group
    steps:
      - id: limits
        topics: [cockroach, iceberg, kafka, kafka-sink, mysql, postgres, sql-server]
        label: "Product limits"
        depends_on: build-x86_64
        agents:
          queue: hetzner-x86-64-dedi-16cpu-64gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: limits
              run: main
        timeout_in_minutes: 60
        parallelism: 3

      - id: limits-instance-size
        topics: [cockroach, iceberg, kafka, kafka-sink, mysql, postgres, sql-server]
        label: "Instance size limits"
        depends_on: build-x86_64
        agents:
          queue: hetzner-x86-64-dedi-16cpu-64gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: limits
              run: instance-size
        timeout_in_minutes: 60

      - id: bounded-memory
        topics: [copy-to-s3, iceberg, kafka, mysql, postgres]
        label: "Bounded Memory"
        depends_on: build-aarch64
        timeout_in_minutes: 60
        parallelism: 3
        agents:
          queue: hetzner-aarch64-4cpu-8gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: bounded-memory
      - id: bounded-memory-search
        topics: [copy-to-s3, iceberg, kafka, mysql, postgres]
        label: "Bounded Memory Search (materialized only)"
        depends_on: build-aarch64
        timeout_in_minutes: 60
        parallelism: 8
        skip: "disabled by default"
        agents:
          queue: hetzner-aarch64-8cpu-16gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: bounded-memory
              run: minimization-search
              args:
                [
                  --materialized-memory-search-step=0.3,
                  --clusterd-memory-search-step=0,
                  --materialized-memory-lower-bound-in-gb=0.5,
                  --clusterd-memory-lower-bound-in-gb=0.5
                ]

  - group: Upsert
    key: upsert
    steps:
      - id: upsert-compaction-enabled
        topics: [kafka]
        label: Upsert (compaction enabled)
        depends_on: build-aarch64
        timeout_in_minutes: 60
        plugins:
          - ./ci/plugins/mzcompose:
              composition: upsert
        agents:
          queue: hetzner-aarch64-4cpu-8gb

      - id: upsert-compaction-disabled
        topics: [kafka]
        label: Upsert (compaction disabled)
        depends_on: build-aarch64
        timeout_in_minutes: 60
        plugins:
          - ./ci/plugins/mzcompose:
              composition: upsert
              args: [--compaction-disabled]
        agents:
          queue: hetzner-aarch64-4cpu-8gb

  - id: ssh-connection-extended
    topics: [kafka, kafka-sink, mysql, postgres, sql-server, ssh-tunnel]
    label: Extended SSH connection
    depends_on: build-aarch64
    timeout_in_minutes: 45
    plugins:
      - ./ci/plugins/mzcompose:
          composition: ssh-connection
          args: [--extended]
    agents:
      # SQL Server crashes on Graviton
      queue: hetzner-x86-64-4cpu-8gb

  - id: sql-server-cdc
    topics: [sql-server]
    label: SQL Server
    depends_on: build-x86_64
    timeout_in_minutes: 30
    inputs: [test/sql-server-cdc]
    plugins:
      - ./ci/plugins/mzcompose:
          composition: sql-server-cdc
    agents:
      # The SQL Server Docker image isn't available on ARM.
      #
      # See: <https://github.com/microsoft/mssql-docker/issues/864>
      queue: hetzner-x86-64-8cpu-16gb

  - id: sql-server-cdc-azure
    topics: [sql-server]
    label: "SQL Server (Azure SQL Database)"
    depends_on: build-x86_64
    timeout_in_minutes: 30
    inputs: [test/sql-server-cdc]
    # Runs against a single shared Azure SQL Database, so only one build may
    # touch it at a time.
    concurrency: 1
    concurrency_group: 'sql-server-cdc-azure'
    plugins:
      - ./ci/plugins/mzcompose:
          composition: sql-server-cdc
          run: azure
    agents:
      queue: hetzner-x86-64-4cpu-8gb
    # Requires AZURE_SQL_* credentials in the CI secrets `env` file.
    skip: "Pending Azure SQL Database credentials in the CI secrets bucket"

  - id: http-auth
    label: HTTP auth
    depends_on: build-aarch64
    timeout_in_minutes: 30
    inputs: [test/http-auth]
    plugins:
      - ./ci/plugins/mzcompose:
          composition: http-auth
    agents:
      queue: hetzner-aarch64-4cpu-8gb


  - group: Zippy
    key: zippy
    steps:
      - id: zippy-kafka-sources
        topics: [cockroach, debezium, iceberg, kafka, kafka-sink, mysql, postgres, sql-server, ssh-tunnel]
        label: "Zippy Kafka Sources"
        depends_on: build-aarch64
        timeout_in_minutes: 60
        agents:
          queue: hetzner-aarch64-8cpu-16gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: zippy
              args: [--scenario=KafkaSources, --actions=10000, --max-execution-time=20m]

      - id: zippy-kafka-sources-azurite
        topics: [azurite, cockroach, debezium, iceberg, kafka, kafka-sink, mysql, postgres, sql-server, ssh-tunnel]
        label: "Zippy Kafka Sources with :azure: blob store"
        depends_on: build-x86_64
        timeout_in_minutes: 60
        agents:
          # Azurite is rather slow, prevent timeouts by using dedicated CPUs
          queue: hetzner-x86-64-dedi-16cpu-64gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: zippy
              args: [--scenario=KafkaSources, --actions=5000, --max-execution-time=10m, --azurite]

      - id: zippy-kafka-parallel-insert
        topics: [cockroach, debezium, iceberg, kafka, mysql, postgres, sql-server, ssh-tunnel]
        label: "Zippy Kafka Parallel Insert"
        depends_on: build-aarch64
        timeout_in_minutes: 60
        agents:
          queue: hetzner-aarch64-8cpu-16gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: zippy
              args: [--scenario=KafkaParallelInsert, --transaction-isolation=serializable, --actions=10000, --max-execution-time=20m]

      - id: zippy-kafka-parallel-insert-azurite
        topics: [azurite, cockroach, debezium, iceberg, kafka, mysql, postgres, sql-server, ssh-tunnel]
        label: "Zippy Kafka Parallel Insert with :azure: blob store"
        depends_on: build-aarch64
        timeout_in_minutes: 60
        agents:
          queue: hetzner-aarch64-8cpu-16gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: zippy
              args: [--scenario=KafkaParallelInsert, --transaction-isolation=serializable, --actions=10000, --max-execution-time=20m, --azurite]

      - id: zippy-user-tables
        topics: [cockroach, debezium, iceberg, kafka, kafka-sink, mysql, postgres, sql-server, ssh-tunnel]
        label: "Zippy User Tables"
        depends_on: build-aarch64
        timeout_in_minutes: 60
        agents:
          queue: hetzner-aarch64-16cpu-32gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: zippy
              # Azurite is too slow, takes a lot of memory in this test
              args: [--scenario=UserTables, --actions=10000, --max-execution-time=20m]

      - id: zippy-postgres-cdc
        topics: [cockroach, debezium, iceberg, kafka, mysql, postgres, sql-server, ssh-tunnel]
        label: "Zippy Postgres CDC"
        depends_on: build-aarch64
        timeout_in_minutes: 60
        agents:
          queue: hetzner-aarch64-16cpu-32gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: zippy
              args: [--scenario=PostgresCdc, --actions=10000, --max-execution-time=20m]

      - id: zippy-mysql-cdc
        topics: [azurite, cockroach, debezium, iceberg, kafka, mysql, postgres, sql-server, ssh-tunnel]
        label: "Zippy MySQL CDC"
        depends_on: build-aarch64
        timeout_in_minutes: 60
        agents:
          queue: hetzner-aarch64-8cpu-16gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: zippy
              args: [--scenario=MySqlCdc, --actions=10000, --max-execution-time=20m, --azurite]

      - id: zippy-sql-server-cdc
        topics: [azurite, cockroach, debezium, iceberg, kafka, mysql, postgres, sql-server, ssh-tunnel]
        label: "Zippy SQL Server CDC"
        depends_on: build-x86_64
        timeout_in_minutes: 60
        agents:
          # Flaky timeouts with smaller agent, SQL Server seems to use a lot of CPU
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: zippy
              args: [--scenario=SqlServerCdc, --actions=10000, --max-execution-time=20m, --azurite]
        skip: "https://linear.app/materializeinc/issue/DB-113"

      - id: zippy-debezium-postgres
        topics: [cockroach, debezium, iceberg, kafka, mysql, postgres, sql-server, ssh-tunnel]
