  - group: E2E
    key: e2e
    steps:
    - id: cloud-canary
      label: "Canary Deploy in Staging Cloud"
      depends_on: build-aarch64
      timeout_in_minutes: 60
      concurrency: 1
      concurrency_group: 'cloud-canary'
      agents:
        queue: linux-aarch64-small
      plugins:
        - ./ci/plugins/mzcompose:
            composition: cloud-canary
      branches: "main v*.* *cloud* *canar*"

    - id: mz-e2e
      label: "Mz E2E Test"
      depends_on: build-aarch64
      timeout_in_minutes: 60
      concurrency: 1
      concurrency_group: 'mz-e2e-test'
      agents:
        # Requires real Mz access, CONFLUENT_CLOUD_QA_CANARY_KAFKA_USERNAME, etc.
        queue: linux-aarch64-small
      plugins:
        - ./ci/plugins/mzcompose:
            composition: mz-e2e

    - id: terraform-aws
      topics: [self-managed]
      label: "Terraform + Helm Chart E2E on AWS"
      artifact_paths: [test/terraform/aws-temporary/terraform.tfstate, "mz_debug_*.zip"]
      depends_on: devel-docker-tags
      # Setup and tests get 60 minutes. Cleanup gets the remaining 30 minutes.
      timeout_in_minutes: 90
      concurrency: 1
      concurrency_group: 'terraform-aws'
      agents:
        queue: linux-aarch64-small
      plugins:
        - ./ci/plugins/scratch-aws-access: ~
        - ./ci/plugins/mzcompose:
            composition: terraform
            run: aws-temporary
            # Cleanup runs in pre-exit hook
            args: [--no-cleanup]
            ci-builder: stable
            run-timeout: 60m
      branches: "main v*.* *aws* *tf* *terraform* *helm* *self-managed* *orchestratord*"

    - id: terraform-aws-upgrade
      topics: [self-managed, upgrade]
      label: "Terraform + Helm Chart Upgrade on AWS"
      artifact_paths: [test/terraform/aws-upgrade/terraform.tfstate, "mz_debug_*.zip"]
      depends_on: devel-docker-tags
      timeout_in_minutes: 120
      concurrency: 1
      concurrency_group: 'terraform-upgrade-aws'
      agents:
        queue: linux-aarch64-small
      # storage is (re)initializing: TooManyRequests, fixed in new version, but not old
      retry:
        automatic:
          - exit_status: 1
            limit: 3
      plugins:
        - ./ci/plugins/scratch-aws-access: ~
        - ./ci/plugins/mzcompose:
            composition: terraform
            run: aws-upgrade
            # Historical releases can log recovered failures that are fixed in
            # the current build. Scan from the final upgrade for regressions.
            log-start-at-last: "--- Upgrading to"
            # Cleanup runs in pre-exit hook
            args: [--no-cleanup]
            ci-builder: stable
            run-timeout: 90m
      branches: "main v*.* *aws* *tf* *terraform* *helm* *self-managed* *orchestratord*"

    - id: terraform-gcp
      topics: [self-managed]
      label: "Terraform + Helm Chart E2E on GCP"
      artifact_paths: [test/terraform/gcp-temporary/terraform.tfstate, "mz_debug_*.zip"]
      depends_on: devel-docker-tags
      # Setup and tests get 60 minutes. Cleanup gets the remaining 30 minutes.
      timeout_in_minutes: 90
      concurrency: 1
      concurrency_group: 'terraform-gcp'
      agents:
        queue: linux-aarch64-small
      plugins:
        - ./ci/plugins/mzcompose:
            composition: terraform
            run: gcp-temporary
            # Cleanup runs in pre-exit hook
            args: [--no-cleanup]
            ci-builder: stable
            run-timeout: 60m
      branches: "main v*.* *gcp* *tf* *terraform* *helm* *self-managed* *orchestratord*"
      skip: "materialize-terraform-self-managed#157"

    - id: terraform-azure
      topics: [self-managed]
      label: "Terraform + Helm Chart E2E on Azure"
      artifact_paths: [test/terraform/azure-temporary/terraform.tfstate, "mz_debug_*.zip"]
      depends_on: devel-docker-tags
      # Setup and tests get 60 minutes. Cleanup gets the remaining 30 minutes.
      timeout_in_minutes: 90
      concurrency: 1
      concurrency_group: 'terraform-azure'
      agents:
        queue: linux-aarch64-small
      plugins:
        - ./ci/plugins/mzcompose:
            composition: terraform
            run: azure-temporary
            # Cleanup runs in pre-exit hook
            args: [--no-cleanup]
            ci-builder: stable
            run-timeout: 60m
      branches: "main v*.* *azure* *tf* *terraform* *helm* *self-managed* *orchestratord*"
      skip: "Not enough capacity on Azure currently, see #operations"
      # Unreliable port-forward to Azure
      retry:
        automatic:
          - exit_status: 1
            limit: 1

