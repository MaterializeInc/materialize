  - group: "Platform checks"
    key: platform-checks
    steps:
      - id: checks-restart-environmentd-clusterd-storage
        label: "Checks + restart of environmentd & storage clusterd"
        depends_on: build-x86_64
        inputs: [misc/python/materialize/checks]
        timeout_in_minutes: 45
        parallelism: 2
        agents:
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args:
                [
                  --scenario=RestartEnvironmentdClusterdStorage,
                  --default-replication-factor=1, # faster
                  "--seed=$BUILDKITE_JOB_ID",
                ]

      - id: checks-restart-environmentd-clusterd-storage-azurite
        label: "Checks + restart of environmentd & storage clusterd with :azure: blob store"
        depends_on: build-x86_64
        inputs: [misc/python/materialize/checks]
        timeout_in_minutes: 45
        parallelism: 2
        agents:
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args:
                [
                  --scenario=RestartEnvironmentdClusterdStorage,
                  "--seed=$BUILDKITE_JOB_ID",
                  --features=azurite,
                ]

      - id: checks-restart-cockroach
        label: "Checks + restart Cockroach"
        depends_on: build-x86_64
        timeout_in_minutes: 180
        parallelism: 2
        agents:
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args: [--scenario=RestartCockroach, "--seed=$BUILDKITE_JOB_ID"]

      - id: checks-backup-restore-before-manipulate
        label: "Checks backup + restore between the two manipulate()"
        depends_on: build-x86_64
        timeout_in_minutes: 60
        parallelism: 2
        agents:
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args: [--scenario=BackupAndRestoreBeforeManipulate, "--seed=$BUILDKITE_JOB_ID"]
        skip: "Too flaky"

      - id: checks-backup-restore-after-manipulate
        label: "Checks backup + restore after manipulate()"
        depends_on: build-x86_64
        timeout_in_minutes: 60
        parallelism: 2
        agents:
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args: [--scenario=BackupAndRestoreAfterManipulate, "--seed=$BUILDKITE_JOB_ID"]
        skip: "Too flaky"

      - id: checks-backup-multi
        label: "Checks + multiple backups/restores"
        depends_on: build-x86_64
        timeout_in_minutes: 60
        parallelism: 2
        agents:
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args: [--scenario=BackupAndRestoreMulti, "--seed=$BUILDKITE_JOB_ID"]
        skip: "Too flaky"

      - id: checks-upgrade-entire-mz-two-versions
        label: "Checks upgrade across two versions"
        depends_on: build-x86_64
        timeout_in_minutes: 180
        parallelism: 2
        agents:
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args: [--scenario=UpgradeEntireMzTwoVersions, "--seed=$BUILDKITE_JOB_ID"]

      - id: checks-upgrade-entire-mz-four-versions
        label: "Checks upgrade across four versions"
        depends_on: build-x86_64
        timeout_in_minutes: 180
        parallelism: 2
        agents:
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args: [--scenario=UpgradeEntireMzFourVersions, "--seed=$BUILDKITE_JOB_ID"]

      - id: checks-preflight-check-continue
        label: "Checks preflight-check and continue upgrade"
        depends_on: build-x86_64
        timeout_in_minutes: 180
        parallelism: 2
        agents:
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args: [--scenario=PreflightCheckContinue, "--seed=$BUILDKITE_JOB_ID"]

      - id: checks-upgrade-clusterd-compute-first
        label: "Platform checks upgrade, restarting compute clusterd first"
        depends_on: build-x86_64
        timeout_in_minutes: 180
        parallelism: 2
        agents:
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args: [--scenario=UpgradeClusterdComputeFirst, "--seed=$BUILDKITE_JOB_ID"]

      - id: checks-upgrade-clusterd-compute-last
        label: "Platform checks upgrade, restarting compute clusterd last"
        depends_on: build-x86_64
        timeout_in_minutes: 180
        parallelism: 2
        agents:
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args: [--scenario=UpgradeClusterdComputeLast, "--seed=$BUILDKITE_JOB_ID"]

      - id: checks-kill-clusterd-storage
        label: "Checks + kill storage clusterd"
        depends_on: build-x86_64
        timeout_in_minutes: 180
        parallelism: 2
        agents:
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args: [--scenario=KillClusterdStorage, "--seed=$BUILDKITE_JOB_ID"]

      - id: checks-restart-source-postgres
        label: "Checks + restart source Postgres"
        depends_on: build-x86_64
        timeout_in_minutes: 180
        parallelism: 2
        agents:
          queue: hetzner-x86-64-8cpu-16gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args: [--scenario=RestartSourcePostgres, --check=PgCdc, --check=PgCdcNoWait, --check=PgCdcMzNow, --check=SshPg]

      - id: checks-restart-clusterd-compute
        label: "Checks + restart clusterd compute"
        depends_on: build-x86_64
        timeout_in_minutes: 180
        parallelism: 2
        agents:
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args: [--scenario=RestartClusterdCompute, "--seed=$BUILDKITE_JOB_ID"]

      - id: checks-drop-create-default-replica
        label: "Checks + DROP/CREATE replica"
        depends_on: build-x86_64
        timeout_in_minutes: 180
        parallelism: 2
        agents:
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args: [--scenario=DropCreateDefaultReplica, "--seed=$BUILDKITE_JOB_ID"]

      - id: checks-0dt-restart-entire-mz
        label: "Checks 0dt restart of the entire Mz"
        depends_on: build-x86_64
        timeout_in_minutes: 120
        parallelism: 2
        agents:
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args: [--scenario=ZeroDowntimeRestartEntireMz, "--seed=$BUILDKITE_JOB_ID"]

      - id: checks-self-managed-linear-upgrade-path-manipulate-before-upgrade
        label: "Checks Self-Managed upgrade across all supported patch releases, manipulate before upgrade"
        depends_on: build-x86_64
        timeout_in_minutes: 240
        parallelism: 2
        agents:
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args: [--scenario=SelfManagedLinearUpgradePathManipulateBeforeUpgrade, "--seed=$BUILDKITE_JOB_ID"]

      - id: checks-self-managed-linear-upgrade-path-manipulate-during-upgrade
        label: "Checks Self-Managed upgrade across all supported patch releases, manipulate during upgrade"
        depends_on: build-x86_64
        timeout_in_minutes: 240
        parallelism: 2
        agents:
          queue: hetzner-x86-64-12cpu-24gb
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args: [--scenario=SelfManagedLinearUpgradePathManipulateDuringUpgrade, "--seed=$BUILDKITE_JOB_ID"]

      - id: checks-0dt-bump-version
        label: "Checks 0dt upgrade to a bumped version"
        depends_on: build-x86_64
        timeout_in_minutes: 240
        agents:
          # building is expensive
          queue: hetzner-x86-64-16cpu-32gb
        env:
          # New versions of Docker don't work with GHCR + local builds
          MZ_GHCR: 0
        plugins:
          - ./ci/plugins/mzcompose:
              composition: platform-checks
              args: [--scenario=ZeroDowntimeBumpedVersion, "--seed=$BUILDKITE_JOB_ID"]
              ci-builder: stable

  - id: limits
    label: "Product limits (finding new limits)"
    depends_on: build-x86_64
    agents:
      queue: hetzner-x86-64-12cpu-24gb
    plugins:
      - ./ci/plugins/mzcompose:
          composition: limits
          run: main
          args: [--find-limit]
    timeout_in_minutes: 3600
    parallelism: 20

  - group: Large Scale Ingestions
    key: large-scale-ingestions
    steps:
      - id: mysql-cdc-large-scale
        label: MySQL CDC large scale ingestion
        depends_on: build-x86_64
        timeout_in_minutes: 3600
        plugins:
          - ./ci/plugins/mzcompose:
              composition: mysql-cdc
              run: large-scale
        agents:
          queue: hetzner-x86-64-dedi-48cpu-192gb # 1 TB disk

      - id: pg-cdc-large-scale
        label: Postgres CDC large scale ingestion
        depends_on: build-x86_64
        timeout_in_minutes: 3600
        plugins:
          - ./ci/plugins/mzcompose:
              composition: pg-cdc
              run: large-scale
        agents:
          queue: hetzner-x86-64-dedi-48cpu-192gb # 1 TB disk

      - id: sql-server-cdc-large-scale
        label: SQL Server CDC large scale ingestion
        depends_on: build-x86_64
        timeout_in_minutes: 3600
        plugins:
          - ./ci/plugins/mzcompose:
              composition: sql-server-cdc
              run: large-scale
        agents:
          queue: hetzner-x86-64-dedi-48cpu-192gb # 1 TB disk

      - id: upsert-large-scale
        label: Upsert large scale ingestion
        depends_on: build-aarch64
        timeout_in_minutes: 3600
        plugins:
