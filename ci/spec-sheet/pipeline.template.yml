priority: 40

steps:
  - group: Builds
    key: builds
    steps:
      - id: build-x86_64
        label: ":rust: Build x86_64"
        command: bin/ci-builder run stable bin/pyactivate -m ci.test.build
        inputs:
          - "*"
        depends_on: []
        timeout_in_minutes: 60
        agents:
          queue: l-builder-linux-x86_64

      - id: build-aarch64
        label: ":rust: Build aarch64"
        command: bin/ci-builder run stable bin/pyactivate -m ci.test.build
        inputs:
          - "*"
        depends_on: []
        timeout_in_minutes: 60
        agents:
          queue: l-builder-linux-aarch64

      - id: build-x86_64-asan
        label: ":rust: Build x86_64 (ASan)"
        command: bin/ci-builder run min bin/pyactivate -m ci.test.build
        inputs:
          - "*"
        depends_on: []
        timeout_in_minutes: 60
        agents:
          queue: builder-linux-x86_64
        env:
          CI_SANITIZER: address

        sanitizer: skip
        branches: "main"
        skip: "currently broken"

      - id: build-aarch64-asan
        label: ":rust: Build aarch64 (ASan)"
        command: bin/ci-builder run min bin/pyactivate -m ci.test.build
        inputs:
          - "*"
        depends_on: []
        timeout_in_minutes: 60
        agents:
          queue: builder-linux-aarch64-mem
        env:
          CI_SANITIZER: address
        sanitizer: skip
        branches: "main"
        skip: "currently broken"

      - id: devel-docker-tags
        label: Tag development docker images
        command: bin/ci-builder run min bin/pyactivate -m ci.test.dev_tag
        inputs:
          - "*"
        depends_on:
          - build-x86_64
          - build-aarch64
        timeout_in_minutes: 20
        agents:
          queue: linux-aarch64-small
        coverage: skip
        # Fortify against intermittent DockerHub/GHCR issues
        retry:
          automatic:
            - exit_status: 1
              limit: 2

  - id: cluster-spec-sheet-cluster
    label: "Cluster spec sheet: Cluster (against Production)"
    timeout_in_minutes: 3600
    depends_on: devel-docker-tags
    concurrency: 1
    concurrency_group: 'cluster-spec-sheet'
    plugins:
      - ./ci/plugins/mzcompose:
          composition: cluster-spec-sheet
          run: default
          args: [--cleanup, --target=cloud-production, cluster_compute]
    agents:
      queue: linux-aarch64-small

  - id: cluster-spec-sheet-source-ingestion
    label: "Cluster spec sheet: Source Ingestion (against Production)"
    timeout_in_minutes: 3600
    depends_on: devel-docker-tags
    concurrency: 1
    concurrency_group: 'cluster-spec-sheet'
    plugins:
      - ./ci/plugins/mzcompose:
          composition: cluster-spec-sheet
          run: default
          args: [--cleanup, --target=cloud-production, source_ingestion]
    agents:
      queue: linux-aarch64-small

  - id: cluster-spec-sheet-staging
    label: "Cluster spec sheet: Staging"
    timeout_in_minutes: 3600
    depends_on: devel-docker-tags
    parallelism: 7
    concurrency: 1
    # Each slot is one dedicated staging account from the e2e pool of 20
    # (see staging_credentials in the composition). mkpipeline rotates the
    # 7-shard window over the pool per build, so concurrent builds use
    # disjoint accounts instead of queueing on the previous build's shards.
    concurrency_group: "cluster-spec-sheet-account-$$CI_CONCURRENCY_POOL_SLOT"
    concurrency_pool: 20
    plugins:
      - ./ci/plugins/mzcompose:
          composition: cluster-spec-sheet
          run: default
          args:
            - --cleanup
            - --target=cloud-staging
            - envd_qps_scalability
            - envd_objects_scalability
            - cluster_object_limits
    agents:
      queue: linux-aarch64-small
