- name: "syntax"
  code: |
    CREATE CLUSTER <cluster_name> (
        SIZE = <text>
        [, REPLICATION FACTOR = <int>]
        [, MANAGED = <bool>]
        [, AUTO SCALING STRATEGY = (
            ON HYDRATION (
                HYDRATION SIZE = <text>
                [, LINGER DURATION = <interval>]
            )
        )]
    );
  syntax_elements:
    - name: "`<cluster_name>`"
      description: |
        A name for the cluster.
    - name: "`SIZE`"
      description: |
        The size of the resource allocations for the cluster.

        For valid size values, see [Available sizes](#available-sizes).
    - name: "`REPLICATION FACTOR`"
      description: |
        Optional. The number of replicas to provision for the cluster. See
        [Replication factor](#replication-factor) for details.

        Default: `1`
    - name: "`MANAGED`"
      description: |
        Optional. Whether to automatically manage the cluster's replicas based on the
        configured size and replication factor.

        <a name="unmanaged-clusters"></a>

        Specify `FALSE` to create an **unmanaged** cluster. With unmanaged
        clusters, you need to manually manage the cluster's replicas using the
        the [`CREATE CLUSTER REPLICA`](/sql/create-cluster-replica) and [`DROP
        CLUSTER REPLICA`](/sql/drop-cluster-replica) commands. When creating an
        unmanaged cluster, you must specify the `REPLICAS` option as well.

        {{< tip >}}
        When getting started with Materialize, we recommend starting with managed
        clusters.
        {{</ tip >}}

        Default: `TRUE`
    - name: "`AUTO SCALING STRATEGY`"
      description: |
        Optional. Lets the cluster temporarily burst to a larger size while it
        has un-hydrated objects, to speed up hydration. Only available on managed
        clusters.
