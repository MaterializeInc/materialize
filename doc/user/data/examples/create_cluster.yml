- name: "syntax"
  code: |
    CREATE CLUSTER <cluster_name> (
        SIZE = <text>
        [, REPLICATION FACTOR = <int>]
        [, MANAGED = <bool>]
        [, AUTO SCALING STRATEGY = (
            ON HYDRATION (
                HYDRATION SIZE = <text>
                [, LINGER DURATION = <interval>]
            )
        )]
    );
  syntax_elements:
    - name: "`<cluster_name>`"
      description: |
        A name for the cluster.
    - name: "`SIZE`"
      description: |
        The size of the resource allocations for the cluster.

        For valid size values, see [Available sizes](#available-sizes).
    - name: "`REPLICATION FACTOR`"
      description: |
        Optional. The number of replicas to provision for the cluster. See
        [Replication factor](#replication-factor) for details.

        Default: `1`
    - name: "`MANAGED`"
      description: |
        Optional. Whether to automatically manage the cluster's replicas based on the
        configured size and replication factor.

        <a name="unmanaged-clusters"></a>

        Specify `FALSE` to create an **unmanaged** cluster. With unmanaged
        clusters, you need to manually manage the cluster's replicas using the
        the [`CREATE CLUSTER REPLICA`](/sql/create-cluster-replica) and [`DROP
        CLUSTER REPLICA`](/sql/drop-cluster-replica) commands. When creating an
        unmanaged cluster, you must specify the `REPLICAS` option as well.

        {{< tip >}}
        When getting started with Materialize, we recommend starting with managed
        clusters.
        {{</ tip >}}

        Default: `TRUE`
    - name: "`AUTO SCALING STRATEGY`"
      description: |
        Optional. While the cluster has un-hydrated objects, provisions an extra
        burst replica at a larger size to speed up hydration. The steady-size
        replicas will continue to run, and hydrate in parallel. Once a
        steady-size replica hydrates and catches up with the burst, the burst
        replica is retired. This helps optimize costs while speeding up
        hydration. Only available on managed clusters.

        Specify a single `ON HYDRATION` sub-policy, which supports the following
        options:

        | Option | Description |
        |--------|-------------|
        | `HYDRATION SIZE` | The size of the burst replica provisioned while the cluster has un-hydrated objects. Must differ from the cluster's steady `SIZE`. Choose a larger size to speed up hydration. For valid size values, see [Available sizes](#available-sizes). |
        | `LINGER DURATION` | Optional. How long the burst replica lingers after a steady-size replica catches up, before it is removed. Default: `0s`. |
