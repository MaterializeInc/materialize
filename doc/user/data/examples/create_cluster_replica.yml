- name: "syntax"
  code: |
    CREATE CLUSTER REPLICA <cluster_name>.<replica_name> (
        SIZE = <text>
    );
  syntax_elements:
    - name: "`<cluster_name>`"
      description: |
        The cluster you want to attach a replica to.
    - name: "`<replica_name>`"
      description: |
        A name for this replica.
    - name: "`SIZE`"
      description: |
        The size of the resource allocations for the cluster.

        For valid size values, see [Available sizes](#available-sizes).
