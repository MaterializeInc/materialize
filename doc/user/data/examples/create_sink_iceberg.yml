- name: "syntax-upsert"
  code: |
    CREATE SINK [IF NOT EXISTS] <sink_name>
    [IN CLUSTER <cluster_name>]
    FROM <item_name>
    INTO ICEBERG CATALOG CONNECTION <catalog_connection> (
      NAMESPACE = '<namespace>',
      TABLE = '<table>'
    )
    KEY ( <key_col> [, ...] ) [NOT ENFORCED]
    MODE UPSERT
    WITH (COMMIT INTERVAL = '<interval>')
  syntax_elements:
    - name: "`<sink_name>`"
      description: |
        The name for the sink.
    - name: "**IF NOT EXISTS**"
      description: |
        Optional. If specified, do not throw an error if a sink with the same name already exists.
    - name: "**IN CLUSTER** `<cluster_name>`"
      description: |
        Optional. The [cluster](/sql/create-cluster) to maintain this sink. If
        unspecified, defaults to the active cluster.
    - name: "`<item_name>`"
      description: |
        The name of the source, table, or materialized view to sink.
    - name: "**ICEBERG CATALOG CONNECTION** `<catalog_connection>`"
      description: |
        The name of the [Iceberg catalog connection](/sql/create-connection/#iceberg-catalog) to use.
    - name: "**NAMESPACE** `'<namespace>'`"
      description: |
        The Iceberg namespace (database) containing the table.
    - name: "**TABLE** `'<table>'`"
      description: |
        The name of the unpartitioned Iceberg table to write to. If the table
        doesn't exist, Materialize creates it automatically. For details, see
        [Iceberg table
        creation](/sql/create-sink/iceberg/#iceberg-table-creation).
    - name: "**KEY** ( `<key_col>` [, ...] )"
      description: |
        The columns that uniquely identify rows. Materialize validates that the key is unique unless `NOT ENFORCED` is specified.
    - name: "**NOT ENFORCED**"
      description: |
        Optional. Disable validation of key uniqueness. Use only when you have outside knowledge that the key is unique.
    - name: "**MODE UPSERT**"
      description: |
        Indicates that the sink uses upsert semantics based on the `KEY`.
    - name: "**COMMIT INTERVAL** `'<interval>'`"
      description: |
        How frequently to commit snapshots to Iceberg (e.g., `'60s'`, `'5m'`). See [Commit interval tradeoffs](#commit-interval-tradeoffs).

- name: "syntax-append"
  code: |
    CREATE SINK [IF NOT EXISTS] <sink_name>
    [IN CLUSTER <cluster_name>]
    FROM <item_name>
    INTO ICEBERG CATALOG CONNECTION <catalog_connection> (
      NAMESPACE = '<namespace>',
      TABLE = '<table>'
    )
    MODE APPEND
    WITH (COMMIT INTERVAL = '<interval>')
  syntax_elements:
    - name: "`<sink_name>`"
      description: |
        The name for the sink.
    - name: "**IF NOT EXISTS**"
      description: |
        Optional. If specified, do not throw an error if a sink with the same name already exists.
    - name: "**IN CLUSTER** `<cluster_name>`"
      description: |
        Optional. The [cluster](/sql/create-cluster) to maintain this sink. If
        unspecified, defaults to the active cluster.
    - name: "`<item_name>`"
      description: |
        The name of the source, table, or materialized view to sink.
    - name: "**ICEBERG CATALOG CONNECTION** `<catalog_connection>`"
      description: |
        The name of the [Iceberg catalog connection](/sql/create-connection/#iceberg-catalog) to use.
    - name: "**NAMESPACE** `'<namespace>'`"
      description: |
        The Iceberg namespace (database) containing the table.
    - name: "**TABLE** `'<table>'`"
      description: |
        The name of the unpartitioned Iceberg table to write to. If the table
        doesn't exist, Materialize creates it automatically. For details, see
        [Iceberg table
        creation](/sql/create-sink/iceberg/#iceberg-table-creation).
    - name: "**MODE APPEND**"
      description: |
        Writes all changes as data rows instead of using Iceberg delete files.
        Two extra columns are appended to the Iceberg table: `_mz_diff` (`int`,
        `+1` for inserts, `-1` for deletes) and `_mz_timestamp` (`long`). An
        update produces two rows: one with `_mz_diff = -1` (old values) and one
        with `_mz_diff = +1` (new values). No `KEY` clause is permitted. See
        [Append mode](#append-mode).
    - name: "**COMMIT INTERVAL** `'<interval>'`"
      description: |
        How frequently to commit snapshots to Iceberg (e.g., `'60s'`, `'5m'`). See [Commit interval tradeoffs](#commit-interval-tradeoffs).

- name: "example-create-iceberg-sink"
  description: |
    Using the previously created AWS and Iceberg catalog connection, the
    following example creates an Iceberg sink with a composite key:
  code: |
    CREATE SINK user_events_iceberg
      IN CLUSTER analytics_cluster
      FROM user_events
      INTO ICEBERG CATALOG CONNECTION iceberg_catalog_connection (
        NAMESPACE = 'events',
        TABLE = 'user_events'
      )
      KEY (user_id, event_timestamp)
      MODE UPSERT
      WITH (COMMIT INTERVAL = '1m');
  testable: false

- name: "example-create-iceberg-sink-append"
  description: |
    Create an Iceberg sink in append mode. All changes are written as data
    rows with `_mz_diff` and `_mz_timestamp` columns:
  code: |
    CREATE SINK events_log_iceberg
      IN CLUSTER analytics_cluster
      FROM user_events
      INTO ICEBERG CATALOG CONNECTION iceberg_catalog_connection (
        NAMESPACE = 'events',
        TABLE = 'user_events_log'
      )
      MODE APPEND
      WITH (COMMIT INTERVAL = '1m');
  testable: false

- name: "tutorial-create-sink-intro"
  description: |
    In Materialize, you can sink from a materialized view, table, or source. Use
    [`CREATE SINK`](/sql/create-sink/iceberg) to create an Iceberg sink, replacing:

    - `<sink_name>` with a name for your sink.
    - `<sink_cluster>` with the name of your sink cluster.
    - `<my_materialize_object>` with the name of your materialized view, table, or source.
    - `<my_iceberg_namespace>` with your catalog namespace.
    - `<my_iceberg_table>` with the name of your Iceberg table. If the Iceberg table
      does not exist, Materialize creates the table. For details, see [`CREATE SINK`
      reference page](/sql/create-sink/iceberg/#iceberg-table-creation).
    - `<commit_interval>` with your commit interval (e.g., `60s`). The commit
      interval specifies how frequently Materialize commits snapshots to Iceberg.
      The minimum commit interval is `1s`. See [Commit interval
      tradeoffs](#commit-interval-tradeoffs) below.

    For the full list of syntax options, see the [`CREATE SINK` reference](/sql/create-sink/iceberg).

- name: "tutorial-create-sink-upsert-mode"
  description: |
    In upsert mode, replace `<key>` with the column(s) that uniquely identify rows.
  code: |
    CREATE SINK <sink_name>
      IN CLUSTER <sink_cluster>
      FROM <my_materialize_object>
      INTO ICEBERG CATALOG CONNECTION iceberg_catalog_connection (
        NAMESPACE = '<my_iceberg_namespace>',
        TABLE = '<my_iceberg_table>'
      )
      KEY (<key>)
      MODE UPSERT
      WITH (COMMIT INTERVAL = '<commit_interval>');
  testable: false

- name: "tutorial-create-sink-append-mode"
  description: |
    In append mode, no `KEY` clause is used. The Iceberg table includes all source
    columns plus `_mz_diff` (`int`) and `_mz_timestamp` (`long`).
  code: |
    CREATE SINK <sink_name>
      IN CLUSTER <sink_cluster>
      FROM <my_materialize_object>
      INTO ICEBERG CATALOG CONNECTION iceberg_catalog_connection (
        NAMESPACE = '<my_iceberg_namespace>',
        TABLE = '<my_iceberg_table>'
      )
      MODE APPEND
      WITH (COMMIT INTERVAL = '<commit_interval>');
  testable: false

- name: "restrictions-limitations-regions"
  content: |
    Your S3 Tables bucket must be in the same AWS region as your Materialize
    deployment.

- name: "restrictions-limitations-partitioned-tables"
  content: |
    Partitioned tables are not supported.

- name: "restrictions-limitations-schema-evolution"
  content: |
    Schema evolution of an Iceberg table is not supported. If the `SINK FROM` object's schema changes, you must drop and recreate the sink.

- name: "restrictions-limitations-gcp-maintenance-lakehouse"
  content: |
    [Iceberg tables managed by the Lakehouse runtime catalog (BigLake API)](https://docs.cloud.google.com/lakehouse/docs/key-concepts#metastore-iceberg)
    do not receive automated maintenance like expiring old snapshots and compacting manifests and data files.

    Without table maintenance, table metadata grows over time and will eventually exceed BigLake's allowed limit.
    This will prevent Materialize Iceberg sinks from committing new data.

- name: "restrictions-limitations-gcp-maintenance-bigquery"
  content: |
    [Iceberg tables managed by BigQuery](https://docs.cloud.google.com/lakehouse/docs/key-concepts#iceberg-managed-tables)
    do receive automated maintenance, but only BigQuery can write to them.

- name: "exactly-once-delivery"
  content: |
    Iceberg sinks provide **exactly-once delivery**. After a restart,
    Materialize resumes from the last committed snapshot without duplicating
    data.

    Materialize stores progress information in Iceberg snapshot metadata
    properties (`mz-frontier` and `mz-sink-version`).
