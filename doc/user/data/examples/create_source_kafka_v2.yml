    [INCLUDE
        KEY [AS <name>]
      | PARTITION [AS <name>]
      | OFFSET [AS <name>]
      | TIMESTAMP [AS <name>]
      | HEADERS [AS <name>]
      | HEADER '<key>' AS <name> [BYTES]
