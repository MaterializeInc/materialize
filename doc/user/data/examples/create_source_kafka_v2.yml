- name: "syntax-protobuf"
  code: |
    CREATE SOURCE [IF NOT EXISTS] <src_name>
    [IN CLUSTER <cluster_name>]
    FROM KAFKA CONNECTION <connection_name> (
      TOPIC '<topic>'
      [, GROUP ID PREFIX '<group_id_prefix>']
