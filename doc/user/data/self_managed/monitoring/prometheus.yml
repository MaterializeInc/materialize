global:
  evaluation_interval: 1m
  scrape_interval: 1m
  scrape_timeout: 10s
scrape_configs:
- job_name: podMonitor/clusterd/0
  metrics_path: /metrics
  kubernetes_sd_configs:
  - role: pod
  relabel_configs:
  - source_labels:
    - __meta_kubernetes_pod_label_cluster_environmentd_materialize_cloud_type
    - __meta_kubernetes_pod_labelpresent_cluster_environmentd_materialize_cloud_type
    regex: (cluster);true
    action: keep
  - source_labels:
    - __meta_kubernetes_pod_container_port_name
    regex: internal-http
    action: keep
  - source_labels:
    - __meta_kubernetes_namespace
    target_label: namespace
  - source_labels:
    - __meta_kubernetes_pod_container_name
    target_label: container
  - source_labels:
    - __meta_kubernetes_pod_name
    target_label: pod
- job_name: podMonitor/environmentd/0
  metrics_path: /metrics
  kubernetes_sd_configs:
  - role: pod
  relabel_configs:
  - source_labels:
    - __meta_kubernetes_pod_label_app_kubernetes_io_name
    - __meta_kubernetes_pod_labelpresent_app_kubernetes_io_name
    regex: (environmentd);true
    action: keep
  - source_labels:
    - __meta_kubernetes_pod_container_port_name
    regex: internal-http
    action: keep
  - source_labels:
    - __meta_kubernetes_namespace
    target_label: namespace
  - source_labels:
    - __meta_kubernetes_pod_container_name
    target_label: container
  - source_labels:
    - __meta_kubernetes_pod_name
    target_label: pod
- job_name: podMonitor/materialize-operator/0
  metrics_path: /metrics
  kubernetes_sd_configs:
  - role: pod
  relabel_configs:
  - source_labels:
    - __meta_kubernetes_pod_label_app_kubernetes_io_name
    - __meta_kubernetes_pod_labelpresent_app_kubernetes_io_name
    regex: (materialize-operator);true
    action: keep
  - source_labels:
    - __meta_kubernetes_pod_container_port_name
    regex: metrics
    action: keep
  - source_labels:
    - __meta_kubernetes_namespace
    target_label: namespace
  - source_labels:
    - __meta_kubernetes_pod_container_name
    target_label: container
  - source_labels:
    - __meta_kubernetes_pod_name
    target_label: pod
- job_name: podMonitor/materialize-sql/0
  metrics_path: /metrics/mz_compute
  kubernetes_sd_configs:
  - role: pod
  relabel_configs:
