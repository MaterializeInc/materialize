    - __meta_kubernetes_pod_labelpresent_app_kubernetes_io_name
    regex: (environmentd);true
    action: keep
  - source_labels:
    - __meta_kubernetes_pod_container_port_name
    regex: internal-http
    action: keep
  - source_labels:
    - __meta_kubernetes_namespace
    target_label: namespace
  - source_labels:
    - __meta_kubernetes_pod_container_name
    target_label: container
  - source_labels:
    - __meta_kubernetes_pod_name
    target_label: pod
- job_name: podMonitor/materialize-sql/1
  metrics_path: /metrics/mz_frontier
  kubernetes_sd_configs:
  - role: pod
  relabel_configs:
  - source_labels:
    - __meta_kubernetes_pod_label_app_kubernetes_io_name
    - __meta_kubernetes_pod_labelpresent_app_kubernetes_io_name
    regex: (environmentd);true
    action: keep
  - source_labels:
    - __meta_kubernetes_pod_container_port_name
    regex: internal-http
    action: keep
  - source_labels:
    - __meta_kubernetes_namespace
    target_label: namespace
  - source_labels:
    - __meta_kubernetes_pod_container_name
    target_label: container
  - source_labels:
    - __meta_kubernetes_pod_name
    target_label: pod
- job_name: podMonitor/materialize-sql/2
  metrics_path: /metrics/mz_storage
  kubernetes_sd_configs:
  - role: pod
  relabel_configs:
  - source_labels:
    - __meta_kubernetes_pod_label_app_kubernetes_io_name
    - __meta_kubernetes_pod_labelpresent_app_kubernetes_io_name
    regex: (environmentd);true
    action: keep
  - source_labels:
    - __meta_kubernetes_pod_container_port_name
    regex: internal-http
    action: keep
  - source_labels:
    - __meta_kubernetes_namespace
    target_label: namespace
  - source_labels:
    - __meta_kubernetes_pod_container_name
    target_label: container
  - source_labels:
    - __meta_kubernetes_pod_name
    target_label: pod
- job_name: podMonitor/materialize-sql/3
  metrics_path: /metrics/mz_usage
  kubernetes_sd_configs:
  - role: pod
  relabel_configs:
  - source_labels:
    - __meta_kubernetes_pod_label_app_kubernetes_io_name
    - __meta_kubernetes_pod_labelpresent_app_kubernetes_io_name
    regex: (environmentd);true
    action: keep
  - source_labels:
    - __meta_kubernetes_pod_container_port_name
    regex: internal-http
