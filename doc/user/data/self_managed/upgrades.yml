- name: upgrades-general-rules
  content: |
    When upgrading:

    - **Always** check the [version-specific upgrade
      notes](/self-managed-deployments/upgrading/version-notes/) for your target
      version:
      - [Upgrading to `v26.30` and later versions](/self-managed-deployments/upgrading/version-notes/#upgrading-to-v2630-and-later-versions)
      - [Upgrading to `v26.1` and later versions](/self-managed-deployments/upgrading/version-notes/#upgrading-to-v261-and-later-versions)
      - [Upgrading to `v26.0`](/self-managed-deployments/upgrading/version-notes/#upgrading-to-v260)
      - [Upgrading between minor versions less than `v26`](/self-managed-deployments/upgrading/version-notes/#upgrading-between-minor-versions-less-than-v26)

    - {{< include-from-yaml data="self_managed/upgrades" name="upgrade-order-rule" >}}

- name: upgrade-order-rule
  content: |
    **Always** upgrade the Materialize Operator **before**
    upgrading the Materialize instances.

- name: syntax-helm-upgrade-operator
  code: |
    helm upgrade -n <namespace> <release-name> materialize/materialize-operator \
      --version <new_version> \
      -f <your-custom-values.yml>
  syntax_elements:
    - name: "`<namespace>`"
      description: |
        The namespace where the Operator is running. (e.g., `materialize`)
    - name: "`<release-name>`"
      description: |
        The release name. You can use `helm list -n <namespace>` to find your release name.
    - name: "`<new_version>`"
      description: |
        The upgrade version.
    - name: "`<your-custom-values.yml>`"
      description: |
        The name of your customization file, if using. If you are configuring using `\-\-set key=value` options, include them as well.

- name: upgrade-landing-guides-helm
  content: |

    #### Upgrade using Helm Commands

    |  Guide         | Description  |
    | ------------- | -------|
    | [Upgrade on Kind](/self-managed-deployments/upgrading/upgrade-on-kind/) | Uses standard Helm commands to upgrade Materialize on a Kind cluster in Docker.


- name: upgrade-landing-guides-unified
  content: |
    #### Upgrade using the new Terraform Modules

    {{< tip >}}
    The Terraform modules are provided as examples. They are not required for
    upgrading Materialize.
    {{< /tip >}}

    |  Guide         | Description  |
    | -------------  | ----------- |
    | [Upgrade on AWS (Terraform)](/self-managed-deployments/upgrading/upgrade-on-aws/) | Uses the new Terraform module to deploy Materialize to AWS Elastic Kubernetes Service (EKS).
    | [Upgrade on Azure (Terraform)](/self-managed-deployments/upgrading/upgrade-on-azure/) | Uses the new Terraform module to deploy Materialize to Azure Kubernetes Service (AKS).
    | [Upgrade on GCP (Terraform)](/self-managed-deployments/upgrading/upgrade-on-gcp/) | Uses the new Terraform module to deploy Materialize to Google Kubernetes Engine (GKE).

