{{- $url := .Destination | safeURL -}}
{{- $parentPath := partial "relative-link.html" . -}}
{{- $src := "" -}}
{{- if hasPrefix $url "/" -}}
  {{- $src = printf "%s%s" $parentPath ($url | relURL) -}}
{{- else -}}
  {{- $src = $url | relURL -}}
{{- end -}}
<img src="{{ $src }}" alt="{{ .Text }}"{{ with .Title }} title="{{ . }}"{{ end }}>
{{- /* Chomp trailing newline. */ -}}
