  {{ if not (.Params.disable_toc) }}
  <div class="toc">
    <h2 class="gradient_text dark">On this page</h2>
    <nav id="TableOfContents">{{ .TableOfContents }}</nav>
  </div>
  {{end}}
</aside>

<script>
  // Regenerate TOC to include headings from tab-panes
  document.addEventListener("DOMContentLoaded", function() {
    // Wait for tabs to be initialized first
    setTimeout(function() {
      const tocNav = document.getElementById("TableOfContents");
      if (!tocNav) return;

      // Find all h2, h3, and h4 headings in the main content, including those in tab-panes
      const headings = document.querySelectorAll(".content h2, .content h3, .content h4");
      if (headings.length === 0) return;

      // Build a hierarchical structure
      const tocItems = [];
      let currentH2 = null;
      let currentH3 = null;

      headings.forEach(heading => {
        if (!heading.id) return; // Skip headings without IDs

        const level = heading.tagName.toLowerCase();
        const item = {
          id: heading.id,
          text: heading.textContent,
          level: level
        };

        if (level === 'h2') {
          currentH2 = { ...item, children: [] };
          currentH3 = null;
          tocItems.push(currentH2);
        } else if (level === 'h3' && currentH2) {
          currentH3 = { ...item, children: [] };
          currentH2.children.push(currentH3);
        } else if (level === 'h4' && currentH3) {
          currentH3.children.push(item);
        } else if (level === 'h4' && currentH2 && !currentH3) {
          // h4 directly under h2 (no h3 in between)
          currentH2.children.push(item);
        }
      });

      // Build the TOC as DOM nodes rather than an HTML string, so heading text
      // is escaped automatically. A heading containing `<`, `>`, or `&` (e.g. a
      // generics or comparison example) would otherwise corrupt the markup.
      if (tocItems.length > 0) {
        const buildNode = (item) => {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.setAttribute("href", `#${item.id}`);
          a.textContent = item.text;
          li.appendChild(a);
          if (item.children && item.children.length > 0) {
            const ul = document.createElement("ul");
            item.children.forEach(child => ul.appendChild(buildNode(child)));
            li.appendChild(ul);
          }
          return li;
        };

        const rootUl = document.createElement("ul");
        tocItems.forEach(item => rootUl.appendChild(buildNode(item)));
        tocNav.replaceChildren(rootUl);
      }
    }, 50);
  });

  // A custom "scrollspy" plugin that highlights the TOC link for the
  // currently-visible section.

  /// Computes the absolute offset of each heading from the top of the page.
  /// Offsets are massaged so that headings beyond the maximum scroll offset
  /// of the page are reassigned a reasonable and unique offset within the
  /// page's scroll boundaries. This makes it possible to distinguish headings
  /// that would otherwise all require scrolling to the very end of the
  /// viewport.

  /// The header now has a fixed position. The _base.scss defines header height.

  function headingOffsets() {
    const SLOP = 100;
    const headings = $(".content h2, .content h3, .content h4");

    // Filter out headings that are inside inactive tab-panes
    const visibleHeadings = headings.toArray().filter((h) => {
      const tabPane = h.closest('.tab-pane');
      // Include if not in a tab-pane, or if in an active tab-pane
      return !tabPane || tabPane.classList.contains('active');
    });

    let offsets = visibleHeadings.map((h) => {
      // Calculate absolute position from top of document
      const rect = h.getBoundingClientRect();
      const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
      return {
        id: h.id,
        offset: rect.top + scrollTop - 125,  // 65px banner + 60px menubar = 125px total
      };
    });
    const cutoff = $(document).height() - $(window).height() - SLOP;
    const firstBad = offsets.findIndex((o) => o.offset > cutoff);

    if (firstBad === -1 || firstBad === offsets.length - 1) return offsets;
    const allotment = SLOP / (offsets.length - firstBad);
    for (var i = firstBad; i < offsets.length; i++)
      offsets[i].offset = cutoff + (i - firstBad + 1) * allotment;
    return offsets;
  }

  // Update the active TOC link on every scroll event.
  $(window).scroll(() => {
    const scroll = $(window).scrollTop();
    const offsets = headingOffsets();
    let activeId = null;

    // Don't highlight anything if we're at the very top of the page
    // This prevents the first tab's heading from being highlighted on page load
    if (scroll > 50) {
      // Find the last heading we've scrolled past
      // This ensures we prefer headings in document order
      for (let i = offsets.length - 1; i >= 0; i--) {
        const headingScrollPosition = offsets[i].offset - 30; // 30px to account for the fixed header

        // A heading is "active" when its position is above current scroll
        if (headingScrollPosition <= scroll) {
          activeId = offsets[i].id;
          break;
        }
      }
    }

    $(".toc .active").removeClass("active");
    if (activeId) $(`.toc [href="#${activeId}"]`).addClass("active");
  });

  // Fixed header height used to offset every scroll target: 65px banner + 60px
  // menubar. Kept in one constant so hashchange and TOC-click paths land
  // headings at the same position. NOTE: assumes the banner is present.
  const HEADER_OFFSET = 125;

  function scrollToHeading(el) {
    const rect = el.getBoundingClientRect();
    const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    window.scrollTo({ top: rect.top + scrollTop - HEADER_OFFSET, behavior: "smooth" });
  }

  // Activate the tab that directly owns `pane`, mirroring the class toggling in
  // the tab initializer (head.html): within a `.code-tabs` group the nav items
  // and panes share an index.
  function activatePane(pane) {
    const group = pane.closest(".code-tabs");
    if (!group) return;
    const navTabs = group.querySelector(".nav-tabs");
    const tabContent = group.querySelector(".tab-content");
    if (!navTabs || !tabContent) return;

    const siblingPanes = Array.from(tabContent.children).filter(c =>
      c.classList.contains("tab-pane")
    );
    const index = siblingPanes.indexOf(pane);
    if (index === -1) return;

    siblingPanes.forEach(p => p.classList.remove("active"));
    Array.from(navTabs.children).forEach(item => item.classList.remove("active"));
    pane.classList.add("active");
    if (navTabs.children[index]) navTabs.children[index].classList.add("active");
  }

  // Reveal `el` by activating every tab-pane on the path down to it. Handles
  // nested tab groups: an inner heading is only visible once its outer pane is
  // active too. A no-op when `el` is not inside any tab.
  function activateTabsFor(el) {
    const panes = [];
    let pane = el.closest(".tab-pane");
    while (pane) {
      panes.push(pane);
      pane = pane.parentElement ? pane.parentElement.closest(".tab-pane") : null;
    }
    // Outermost first, so each pane is shown before we descend into it.
    panes.reverse().forEach(activatePane);
  }

  // Navigate to a heading by id: reveal its tab(s), then scroll. Shared by
  // hashchange (deep links, back/forward) and TOC clicks so both paths behave
  // identically, including for headings inside non-default or nested tabs.
  function navigateToHeading(targetId) {
    const targetElement = document.getElementById(targetId);
    if (!targetElement) return;

    activateTabsFor(targetElement);
    // Activation toggles `display`, so wait one frame for layout to settle
    // before measuring the heading's position.
    requestAnimationFrame(() => {
      scrollToHeading(targetElement);
      $(window).trigger("scroll");
    });
  }

  // Scroll to our massaged offsets on a hashchange event, to override the
  // browser's automatic scroll to the unmassaged offset.
  $(window).on("hashchange", function () {
    if (window.location.hash) navigateToHeading(window.location.hash.substring(1));
  });

  // Trigger an initial hash change event to handle scrolling to the page's
  // initial hash, but only if there's actually a hash in the URL.
  $(() => {
    if (window.location.hash) $(window).trigger("hashchange");
  });

  // Handle TOC link clicks: prevent the default jump, reveal any containing
  // tab, update the URL, then scroll manually to account for the fixed header.
  $(document).on("click", ".toc a", function (e) {
    const href = $(this).attr("href");
    if (!href || !href.startsWith("#")) return;
    if (!document.getElementById(href.substring(1))) return;

    e.preventDefault();
    history.pushState(null, null, href);
    navigateToHeading(href.substring(1));
  });
</script>
