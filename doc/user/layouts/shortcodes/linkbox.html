<div class="linkbox{{ with .Get "category" }} linkbox--{{ . }}{{ end }}{{ with .Get "icon" }} {{ . }}{{ end }}">
  <div class="linkbox__header">
    {{ with .Get "category" }}
    <span class="linkbox__category-icon linkbox__category-icon--{{ . }}" aria-hidden="true"></span>
    {{ end }}
    <div class="title">{{ .Get "title" }}</div>
  </div>
  <div class="linkbox__body">
    {{ .Inner | $.Page.RenderString }}
  </div>
</div>
