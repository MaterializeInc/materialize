<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 340" role="img" aria-label="Single-tier cluster architecture">
  <style>
    :root { color-scheme: light dark; }
    text { font-family: ui-sans-serif, system-ui, sans-serif; }
    .label { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; font-weight: 500; }
    @media (prefers-color-scheme: light) {
      .compute-label { fill: #00857a; }
      .card { fill: #fff; stroke: #9fe8dc; stroke-width: 1.5; }
      .stack { fill: #ecfdf9; stroke: #9fe8dc; stroke-width: 1; opacity: .55; }
      .kw { fill: #6d28d9; font-weight: 600; } .fn { fill: #00857a; font-weight: 600; }
      .txt { fill: #4b5563; } .var { fill: #374151; } .punct { fill: #6e7781; }
    }
    @media (prefers-color-scheme: dark) {
      .compute-label { fill: #2bddc2; }
      .card { fill: #222230; stroke: rgb(43 221 194 / 28%); stroke-width: 1.5; }
      .stack { fill: rgb(43 221 194 / 10%); stroke: rgb(43 221 194 / 28%); stroke-width: 1; opacity: .55; }
      .kw { fill: #c4b5fd; font-weight: 600; } .fn { fill: #2bddc2; font-weight: 600; }
      .txt { fill: #cbd5e1; } .var { fill: #e2e8f0; } .punct { fill: #94a3b8; }
    }
  </style>
  <g transform="translate(70 0)">
    <text x="145" y="24" text-anchor="middle" class="label compute-label">ALL-IN-ONE CLUSTER(S)</text>
    <rect x="18" y="52" width="290" height="268" rx="14" class="stack" />
    <rect x="9" y="44" width="290" height="268" rx="14" class="stack" />
    <rect x="0" y="36" width="290" height="268" rx="14" class="card" />
    <text x="18" y="106" class="code"><tspan class="kw">SET</tspan><tspan class="txt"> CLUSTER = </tspan><tspan class="var">&lt;cluster&gt;</tspan><tspan class="punct">;</tspan></text>
    <text x="18" y="129" class="code"><tspan class="kw">CREATE</tspan><tspan class="fn"> SOURCE</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
    <text x="18" y="152" class="code"><tspan class="kw">CREATE</tspan><tspan class="fn"> SOURCE</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
    <text x="18" y="175" class="code"><tspan class="kw">CREATE</tspan><tspan class="fn"> VIEW</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
    <text x="18" y="198" class="code"><tspan class="kw">CREATE</tspan><tspan class="fn"> VIEW</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
    <text x="18" y="221" class="code"><tspan class="kw">CREATE</tspan><tspan class="fn"> INDEX</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
    <text x="18" y="244" class="code"><tspan class="kw">CREATE</tspan><tspan class="fn"> INDEX</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
  </g>
</svg>
