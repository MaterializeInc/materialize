<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" role="img" aria-label="Two-tier cluster architecture">
  <style>
    :root { color-scheme: light dark; }
    text { font-family: ui-sans-serif, system-ui, sans-serif; }
    .label { font-size: 12px; font-weight: 600; letter-spacing: 0.08em; }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; font-weight: 500; }
    @media (prefers-color-scheme: light) {
      .source-label { fill: #6d28d9; } .compute-label { fill: #00857a; }
      .card { fill: #fff; stroke: #ddd0ff; stroke-width: 1.5; }
      .stack { fill: #f5f0ff; stroke: #ddd0ff; stroke-width: 1; opacity: .55; }
      .stack-compute { fill: #ecfdf9; stroke: #9fe8dc; }
      .card-compute { stroke: #9fe8dc; }
      .kw { fill: #6d28d9; font-weight: 600; } .fn { fill: #00857a; font-weight: 600; }
      .txt { fill: #4b5563; } .var { fill: #374151; } .punct { fill: #6e7781; }
      .flow { stroke: #00857a; fill: #00857a; }
    }
    @media (prefers-color-scheme: dark) {
      .source-label { fill: #c4b5fd; } .compute-label { fill: #2bddc2; }
      .card { fill: #222230; stroke: rgb(196 181 253 / 28%); stroke-width: 1.5; }
      .stack { fill: rgb(196 181 253 / 10%); stroke: rgb(196 181 253 / 28%); stroke-width: 1; opacity: .55; }
      .stack-compute { fill: rgb(43 221 194 / 10%); stroke: rgb(43 221 194 / 28%); }
      .card-compute { stroke: rgb(43 221 194 / 28%); }
      .kw { fill: #c4b5fd; font-weight: 600; } .fn { fill: #2bddc2; font-weight: 600; }
      .txt { fill: #cbd5e1; } .var { fill: #e2e8f0; } .punct { fill: #94a3b8; }
      .flow { stroke: #2bddc2; fill: #2bddc2; }
    }
  </style>
  <g transform="translate(80 0)">
    <text x="145" y="24" text-anchor="middle" class="label source-label">SOURCE CLUSTER(S)</text>
    <rect x="18" y="52" width="290" height="268" rx="14" class="stack" />
    <rect x="9" y="44" width="290" height="268" rx="14" class="stack" />
    <rect x="0" y="36" width="290" height="268" rx="14" class="card" />
    <text x="18" y="106" class="code"><tspan class="kw">SET</tspan><tspan class="txt"> CLUSTER = </tspan><tspan class="var">&lt;source_cluster&gt;</tspan><tspan class="punct">;</tspan></text>
    <text x="18" y="132" class="code"><tspan class="kw">CREATE</tspan><tspan class="fn"> SOURCE</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
    <text x="18" y="158" class="code"><tspan class="kw">CREATE</tspan><tspan class="fn"> SOURCE</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
  </g>
  <path d="M398 170 H444" class="flow" stroke-width="2" fill="none" marker-end="url(#a)" />
  <g transform="translate(462 0)">
    <text x="145" y="16" text-anchor="middle" class="label compute-label">COMPUTE / TRANSFORM +</text>
    <text x="145" y="30" text-anchor="middle" class="label compute-label">SERVING CLUSTER(S)</text>
    <rect x="18" y="52" width="290" height="268" rx="14" class="stack stack-compute" />
    <rect x="9" y="44" width="290" height="268" rx="14" class="stack stack-compute" />
    <rect x="0" y="36" width="290" height="268" rx="14" class="card card-compute" />
    <text x="18" y="106" class="code"><tspan class="kw">SET</tspan><tspan class="txt"> CLUSTER = </tspan><tspan class="var">&lt;other_cluster&gt;</tspan><tspan class="punct">;</tspan></text>
    <text x="18" y="129" class="code"><tspan class="kw">CREATE</tspan><tspan class="fn"> VIEW</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
    <text x="18" y="152" class="code"><tspan class="kw">CREATE</tspan><tspan class="fn"> VIEW</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
    <text x="18" y="175" class="code"><tspan class="kw">CREATE</tspan><tspan class="fn"> INDEX</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
    <text x="18" y="198" class="code"><tspan class="kw">CREATE</tspan><tspan class="fn"> INDEX</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
  </g>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" class="flow" />
    </marker>
  </defs>
</svg>
