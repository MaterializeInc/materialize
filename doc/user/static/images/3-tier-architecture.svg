<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 340" role="img" aria-label="Three-tier cluster architecture">
  <style>
    :root { color-scheme: light dark; }
    text { font-family: ui-sans-serif, system-ui, sans-serif; }
    .label { font-size: 15px; font-weight: 600; }
    .code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; font-weight: 500; }
    @media (prefers-color-scheme: light) {
      .source-label { fill: #6d28d9; } .compute-label { fill: #00857a; } .serving-label { fill: #0969da; }
      .card { fill: #fff; stroke: #ddd0ff; stroke-width: 1.5; }
      .stack { fill: #f5f0ff; stroke: #ddd0ff; stroke-width: 1; opacity: .55; }
      .kw { fill: #6d28d9; font-weight: 600; } .fn { fill: #00857a; font-weight: 600; }
      .txt { fill: #4b5563; } .var { fill: #374151; } .punct { fill: #0550ae; }
      .flow { stroke: #00857a; fill: #00857a; }
    }
    @media (prefers-color-scheme: dark) {
      .source-label { fill: #c4b5fd; } .compute-label { fill: #2bddc2; } .serving-label { fill: #7dcfff; }
      .card { fill: #222230; stroke: rgb(196 181 253 / 28%); stroke-width: 1.5; }
      .stack { fill: rgb(196 181 253 / 10%); stroke: rgb(196 181 253 / 28%); stroke-width: 1; opacity: .55; }
      .kw { fill: #c4b5fd; font-weight: 600; } .fn { fill: #2bddc2; font-weight: 600; }
      .txt { fill: #cbd5e1; } .var { fill: #e2e8f0; } .punct { fill: #89ddff; }
      .flow { stroke: #2bddc2; fill: #2bddc2; }
    }
  </style>
  <g transform="translate(24 0)">
    <text x="162" y="28" text-anchor="middle" class="label source-label">Source Cluster(s)</text>
    <rect x="18" y="52" width="324" height="268" rx="16" class="stack" />
    <rect x="9" y="44" width="324" height="268" rx="16" class="stack" />
    <rect x="0" y="36" width="324" height="268" rx="16" class="card" />
    <text x="20" y="78" class="code"><tspan class="kw">SET</tspan><tspan class="txt"> CLUSTER = </tspan><tspan class="var">&lt;source_cluster&gt;</tspan><tspan class="punct">;</tspan></text>
    <text x="20" y="104" class="code"><tspan class="kw">CREATE</tspan><tspan class="txt"> </tspan><tspan class="fn">SOURCE</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
    <text x="20" y="130" class="code"><tspan class="kw">CREATE</tspan><tspan class="txt"> </tspan><tspan class="fn">SOURCE</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
  </g>
  <path d="M384 170 H432" class="flow" stroke-width="2" fill="none" marker-end="url(#a)" />
  <g transform="translate(424 0)">
    <text x="162" y="28" text-anchor="middle" class="label compute-label">Compute / Transform Cluster(s)</text>
    <rect x="18" y="52" width="324" height="268" rx="16" class="stack" />
    <rect x="9" y="44" width="324" height="268" rx="16" class="stack" />
    <rect x="0" y="36" width="324" height="268" rx="16" class="card" />
    <text x="20" y="78" class="code"><tspan class="kw">SET</tspan><tspan class="txt"> CLUSTER = </tspan><tspan class="var">&lt;compute_cluster&gt;</tspan><tspan class="punct">;</tspan></text>
    <text x="20" y="104" class="code"><tspan class="kw">CREATE</tspan><tspan class="txt"> </tspan><tspan class="fn">MATERIALIZED VIEW</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
    <text x="20" y="130" class="code"><tspan class="kw">CREATE</tspan><tspan class="txt"> </tspan><tspan class="fn">MATERIALIZED VIEW</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
  </g>
  <path d="M784 170 H832" class="flow" stroke-width="2" fill="none" marker-end="url(#a)" />
  <g transform="translate(800 0)">
    <text x="162" y="28" text-anchor="middle" class="label serving-label">Serving Cluster(s)</text>
    <rect x="18" y="52" width="324" height="268" rx="16" class="stack" />
    <rect x="9" y="44" width="324" height="268" rx="16" class="stack" />
    <rect x="0" y="36" width="324" height="268" rx="16" class="card" />
    <text x="20" y="78" class="code"><tspan class="kw">SET</tspan><tspan class="txt"> CLUSTER = </tspan><tspan class="var">&lt;serving_cluster&gt;</tspan><tspan class="punct">;</tspan></text>
    <text x="20" y="104" class="code"><tspan class="kw">CREATE</tspan><tspan class="txt"> </tspan><tspan class="fn">INDEX</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
    <text x="20" y="130" class="code"><tspan class="kw">CREATE</tspan><tspan class="txt"> </tspan><tspan class="fn">INDEX</tspan><tspan class="txt"> ... </tspan><tspan class="punct">;</tspan></text>
  </g>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" class="flow" />
    </marker>
  </defs>
</svg>
