        <!-- bar chart -->
        <g transform="translate(124 22) scale(1.08)">
          <line x1="2" y1="13" x2="14" y2="13"/>
          <line x1="4.1" y1="13" x2="4.1" y2="8"/>
          <line x1="8.1" y1="13" x2="8.1" y2="4"/>
          <line x1="12.1" y1="13" x2="12.1" y2="9"/>
        </g>
        <!-- table -->
        <g transform="translate(68 102) scale(1.08)">
