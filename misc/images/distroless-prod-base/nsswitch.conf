# Overrides the glibc example config that the distroless base ships, which
# routes passwd/group lookups through the `compat` NSS backend. `compat` is
# not built into glibc, so a lookup dlopens the image's libnss_compat.so.2.
# For the statically-linked `ssh` that module belongs to a different glibc
# than the one embedded in the binary, and the mismatch segfaults. `files`
# and `dns` are built into glibc (2.33+), so lookups below never dlopen.
passwd:         files
group:          files
shadow:         files
hosts:          files dns
networks:       files
protocols:      files
services:       files
ethers:         files
rpc:            files
