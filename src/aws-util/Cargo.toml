[package]
name = "mz-aws-util"
description = "AWS utilities."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow = "1.0.102"
aws-config = { version = "1.8.13", default-features = false, features = ["default-https-client", "rt-tokio"] }
aws-sdk-s3 = { version = "1.122.0", default-features = false, features = [
    "rt-tokio",
], optional = true }
aws-smithy-types = { version = "1.1.8", features = ["byte-stream-poll-next"] }
aws-types = "1.3.9"
bytes = "1.11.1"
bytesize = "2.1.0"
futures = "0.3.32"
http = "1.4.0"
mz-ore = { path = "../ore", features = ["async"], default-features = false }
pin-project = "1.1.11"
thiserror = "2.0.18"
tokio = { version = "1.49.0", default-features = false, features = ["macros"] }
uuid = { version = "1.19.0", features = ["v4"] }

[dev-dependencies]
mz-ore = { path = "../ore", default-features = false, features = ["test"] }

[features]
default = []
s3 = ["aws-sdk-s3"]
