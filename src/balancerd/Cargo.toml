[package]
name = "mz-balancerd"
description = "Balancer service."
version = "26.21.0-dev.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
axum.workspace = true
bytes.workspace = true
bytesize.workspace = true
chrono = { workspace = true, features = ["std"], default-features = false }
clap = { workspace = true, features = ["derive", "env"] }
domain = { workspace = true, features = ["resolv"], default-features = false }
futures.workspace = true
humantime.workspace = true
hyper = { workspace = true, features = ["http1", "server"] }
hyper-util.workspace = true
jsonwebtoken = { workspace = true, features = ["aws_lc_rs"] }
launchdarkly-server-sdk = { workspace = true, features = ["hyper-rustls-webpki-roots", "crypto-aws-lc-rs"], optional = true, default-features = false }
mz-alloc = { path = "../alloc" }
mz-alloc-default = { path = "../alloc-default", optional = true }
mz-build-info = { path = "../build-info" }
mz-dyncfg-launchdarkly = { path = "../dyncfg-launchdarkly", optional = true }
mz-dyncfg-file= { path = "../dyncfg-file" }
mz-dyncfg = { path = "../dyncfg" }
mz-frontegg-auth = { path = "../frontegg-auth" }
mz-http-util = { path = "../http-util" }
mz-orchestrator-tracing = { path = "../orchestrator-tracing" }
mz-ore = { path = "../ore", default-features = false, features = ["crypto", "id_gen"]}
mz-server-core = { path = "../server-core" }
mz-tracing = { path = "../tracing" }
mz-pgwire-common = { path = "../pgwire-common" }
num_cpus.workspace = true
prometheus = { workspace = true, default-features = false }
rustls = { workspace = true, features = ["aws_lc_rs"], default-features = false }
proxy-header.workspace = true
semver.workspace = true
tokio = { workspace = true }
tokio-rustls = { workspace = true, default-features = false }
tokio-postgres.workspace = true
tokio-util = { workspace = true, features = ["codec"] }
tokio-metrics.workspace = true
tower.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
uuid.workspace = true

[dev-dependencies]
mz-environmentd = { path = "../environmentd", default-features = false, features = ["test"] }
mz-frontegg-mock = { path = "../frontegg-mock" }
postgres.workspace = true
reqwest = { workspace = true, features = ["rustls-tls-webpki-roots-no-provider"], default-features = false }
tempfile.workspace = true

[features]
default = ["mz-alloc-default", "telemetry"]
# Third-party telemetry SDKs. Disabled in FIPS builds.
telemetry = ["dep:launchdarkly-server-sdk", "dep:mz-dyncfg-launchdarkly"]
jemalloc = ["mz-alloc/jemalloc"]

[package.metadata.cargo-udeps.ignore]
normal = ["mz-alloc-default"]
