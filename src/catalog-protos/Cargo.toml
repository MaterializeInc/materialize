[package]
name = "mz-catalog-protos"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
mz-audit-log = { path = "../audit-log" }
mz-cluster-types = { path = "../cluster-types" }
mz-controller-types = { path = "../controller-types" }
mz-proto = { path = "../proto" }
mz-repr = { path = "../repr" }
mz-sql-types = { path = "../sql-types" }
mz-storage-types = { path = "../storage-types" }
num_enum.workspace = true
proptest = { workspace = true, optional = true }
proptest-derive = { workspace = true, optional = true }
serde.workspace = true
serde_repr.workspace = true

[dev-dependencies]
mz-catalog-protos = { path = ".", features = ["proptest"] }
mz-expr = { path = "../expr" }
mz-ore = { path = "../ore", features = ["test"] }
proptest.workspace = true
proptest-derive.workspace = true
serde_json.workspace = true
similar-asserts.workspace = true

[build-dependencies]
anyhow.workspace = true
md-5.workspace = true
serde.workspace = true
serde_json.workspace = true

[features]
default = []
proptest = ["dep:proptest", "dep:proptest-derive"]
