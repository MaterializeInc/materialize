# Fuzz crate for mz-catalog-protos serde round-trip properties. Catalog
# state is durable on-disk data, so a decoder bug here is a catalog-corruption
# risk. mz-catalog-protos uses serde (not prost) for the on-wire form, so
# the fuzz target is a serde_json round-trip rather than a proto one.

[package]
name = "mz-catalog-protos-fuzz"
version = "0.0.0"
publish = false
edition = "2021"

[package.metadata]
cargo-fuzz = true

[workspace]

[dependencies]
libfuzzer-sys = "0.4"
mz-catalog-protos = { path = "..", features = ["proptest"] }
proptest = "1"
serde = "1.0"
serde_json = "1.0"

[[bin]]
name = "catalog_objects_serde_roundtrip"
path = "fuzz_targets/catalog_objects_serde_roundtrip.rs"
test = false
doc = false
bench = false

# The fuzz crate has its own `[workspace]` so it must duplicate the root's
# `[patch.crates-io]`. Keep in sync with the root `Cargo.toml`.
[patch.crates-io]
tokio-postgres = { git = "https://github.com/MaterializeInc/rust-postgres" }
postgres-protocol = { git = "https://github.com/MaterializeInc/rust-postgres" }
postgres-types = { git = "https://github.com/MaterializeInc/rust-postgres" }
serde-value = { git = "https://github.com/MaterializeInc/serde-value.git" }
rdkafka = { git = "https://github.com/MaterializeInc/rust-rdkafka.git" }
rdkafka-sys = { git = "https://github.com/MaterializeInc/rust-rdkafka.git" }
tiberius = { git = "https://github.com/MaterializeInc/tiberius", rev = "64ca594cc22ed67d072c2d0110455da50539e1cd" }
iceberg = { git = "https://github.com/MaterializeInc/iceberg-rust.git", rev = "c31a98afe789" }
iceberg-catalog-rest = { git = "https://github.com/MaterializeInc/iceberg-rust.git", rev = "c31a98afe789" }
