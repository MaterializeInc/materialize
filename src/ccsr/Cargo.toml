[package]
name = "mz-ccsr"
description = "Confluent-compatible schema registry API client."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow = "1.0.102"
base64 = "0.22.1"
reqwest = { version = "0.12.28", features = [
    "blocking",
    "json",
    "native-tls-vendored",
    "rustls-tls-webpki-roots-no-provider",
] }
mz-tls-util = { path = "../tls-util" }
proptest = { version = "1.10.0", default-features = false, features = ["std"] }
proptest-derive = { version = "0.8.0" }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.149"
url = { version = "2.5.8", features = ["serde"] }

[dev-dependencies]
hyper = { version = "1.4.1", features = ["server"] }
hyper-util = "0.1.20"
mz-ore = { path = "../ore", features = ["async", "test"] }
serde_json = "1.0.149"
tokio = { version = "1.49.0", features = ["macros"] }
tracing = "0.1.44"

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false }
prost-build = "0.14.3"

[features]
default = ["mz-build-tools/default"]
