[package]
name = "mz-cloud-api"
description = "API interfaces to Cloud."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
chrono = { workspace = true, features = ["std"], default-features = false }
reqwest = { workspace = true, features = ["json", "rustls-tls-webpki-roots-no-provider"], default-features = false }
serde = { workspace = true, features = ["derive"] }
url.workspace = true
thiserror.workspace = true
tokio.workspace = true
mz-frontegg-client = { path = "../frontegg-client" }
mz-frontegg-auth = { path = "../frontegg-auth" }

[features]
default = []
