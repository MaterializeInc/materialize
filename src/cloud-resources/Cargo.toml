[package]
name = "mz-cloud-resources"
description = "Controller for cloud resources."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[[bin]]
name = "crd-writer"
path = "src/bin/crd_writer.rs"

[dependencies]
anyhow.workspace = true
chrono.workspace = true
futures.workspace = true
indexmap = { version = "2.10.0", default-features = false, features = ["std"] }
k8s-openapi = { version = "0.27.0", features = ["schemars", "v1_32"] }
kube = { version = "3.0.1", default-features = false, features = ["client", "derive", "openssl-tls", "ws", "runtime"] }
mz-ore = { path = "../ore", default-features = false, features = ["async"] }
mz-server-core = { path = "../server-core", default-features = false }
rand.workspace = true
schemars = { version = "1.2.1", features = ["uuid1"] }
semver.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
uuid = { workspace = true, features = ["serde", "v4"] }

async-trait = { workspace = true, optional = true }
mz-repr = { path = "../repr", default-features = false, optional = true }

[dev-dependencies]
mz-ore = { path = "../ore", default-features = false, features = ["test"] }

[features]
default = ["vpc-endpoints"]
vpc-endpoints = ["async-trait", "mz-repr"]
