[package]
name = "mz-cloud-resources"
description = "Controller for cloud resources."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[[bin]]
name = "crd-writer"
path = "src/bin/crd_writer.rs"

[dependencies]
anyhow.workspace = true
chrono = { workspace = true, default-features = false }
futures.workspace = true
indexmap = { workspace = true, features = ["std"], default-features = false }
k8s-openapi = { workspace = true, features = ["schemars", "v1_32"] }
kube = { workspace = true, features = ["client", "derive", "rustls-tls", "aws-lc-rs", "ws", "runtime"], default-features = false }
mz-ore = { path = "../ore", default-features = false, features = ["async"] }
mz-server-core = { path = "../server-core", default-features = false }
rand.workspace = true
schemars = { workspace = true, features = ["uuid1"] }
semver.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true
uuid = { workspace = true, features = ["serde", "v4"] }

async-trait = { workspace = true, optional = true }
mz-repr = { path = "../repr", default-features = false, optional = true }

[dev-dependencies]
mz-ore = { path = "../ore", default-features = false, features = ["test"] }

[features]
default = ["vpc-endpoints"]
vpc-endpoints = ["async-trait", "mz-repr"]
