[package]
name = "mz-cluster"
description = "Tools for storage and compute."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow = "1.0.102"
async-trait = "0.1.89"
differential-dataflow = "0.21.1"
futures = "0.3.32"
lgalloc = "0.6.0"
mz-cluster-client = { path = "../cluster-client" }
mz-ore = { path = "../ore", features = ["async", "process", "tracing"] }
mz-service = { path = "../service" }
rand = "0.9.2"
regex = "1.12.3"
timely = "0.28.0"
tokio = { version = "1.49.0", features = ["fs", "rt", "sync", "net"] }
tracing = "0.1.44"
uuid = "1.19.0"

[dev-dependencies]
mz-ore = { path = "../ore", features = ["turmoil"] }
tracing-subscriber = "0.3.23"
turmoil = "0.7.1"

[package.metadata.cargo-udeps.ignore]
# only used on linux

[features]
default = []
