[package]
name = "mz-cluster"
description = "Tools for storage and compute."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
differential-dataflow.workspace = true
futures.workspace = true
lgalloc.workspace = true
lgalloc_07.workspace = true
mz-cluster-client = { path = "../cluster-client" }
mz-ore = { path = "../ore", features = ["async", "process", "tracing"] }
mz-service = { path = "../service" }
rand.workspace = true
regex.workspace = true
timely.workspace = true
tokio.workspace = true
tracing.workspace = true
uuid.workspace = true

[dev-dependencies]
mz-ore = { path = "../ore", features = ["turmoil"] }
tracing-subscriber.workspace = true
