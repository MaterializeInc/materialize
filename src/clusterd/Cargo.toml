[package]
name = "mz-clusterd"
description = "Materialize's cluster server."
version = "26.21.0-dev.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
axum.workspace = true
clap = { workspace = true, features = ["env"] }
fail.workspace = true
futures.workspace = true
hyper.workspace = true
hyper-util.workspace = true
libc.workspace = true
mz-alloc = { path = "../alloc" }
mz-alloc-default = { path = "../alloc-default", optional = true }
mz-build-info = { path = "../build-info" }
mz-cloud-resources = { path = "../cloud-resources" }
mz-cluster = { path = "../cluster" }
mz-cluster-client = { path = "../cluster-client" }
mz-compute = { path = "../compute", default-features = false }
mz-compute-client = { path = "../compute-client" }
mz-dyncfgs = { path = "../dyncfgs" }
mz-http-util = { path = "../http-util" }
mz-metrics = { path = "../metrics" }
mz-orchestrator-tracing = { path = "../orchestrator-tracing" }
mz-ore = { path = "../ore", features = ["async", "panic", "tracing"] }
mz-persist-client = { path = "../persist-client" }
mz-prof-http = { path = "../prof-http" }
mz-service = { path = "../service" }
mz-storage = { path = "../storage" }
mz-storage-client = { path = "../storage-client" }
mz-storage-types = { path = "../storage-types" }
mz-timely-util = { path = "../timely-util" }
mz-txn-wal = { path = "../txn-wal" }
nix.workspace = true
num_cpus.workspace = true
serde.workspace = true
tokio.workspace = true
tower.workspace = true
tracing.workspace = true

[build-dependencies]
custom-labels.workspace = true

[features]
default = ["tokio-console", "mz-alloc-default"]
jemalloc = ["mz-alloc/jemalloc"]
tokio-console = ["mz-ore/tokio-console"]
foundationdb = ["mz-persist-client/foundationdb"]

[package.metadata.cargo-udeps.ignore]
normal = ["mz-alloc-default"]
