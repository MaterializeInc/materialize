[package]
name = "mz-compute-types"
description = "Shared types for the `mz-compute*` crates"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
columnar.workspace = true
columnation.workspace = true
differential-dataflow.workspace = true
itertools.workspace = true
mz-dyncfg = { path = "../dyncfg" }
mz-expr = { path = "../expr" }
mz-ore = { path = "../ore", features = ["tracing", "metrics"] }
mz-repr = { path = "../repr", features = ["tracing"] }
mz-storage-types = { path = "../storage-types" }
serde.workspace = true
timely.workspace = true
tracing.workspace = true

[features]
default = []
