[package]
name = "mz-durable-cache"
description = "A durable cache built on top of a persist shard"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
async-trait = "0.1.89"
bytes = { version = "1.11.1" }
differential-dataflow = "0.21.1"
futures = "0.3.32"
itertools = { version = "0.14.0" }
mz-ore = { path = "../ore", features = ["process"] }
mz-dyncfg = { path = "../dyncfg" }
mz-persist-types = { path = "../persist-types" }
mz-persist-client = { path = "../persist-client" }
mz-timely-util = { path = "../timely-util" }
prometheus = { version = "0.14.0", default-features = false }
prost = { version = "0.14.3", features = ["no-recursion-limit"] }
serde = { version = "1.0.219", features = ["derive", "rc"] }
timely = "0.28.0"
tokio = { version = "1.49.0", default-features = false, features = ["rt", "rt-multi-thread"] }
tracing = "0.1.44"
uuid = { version = "1.19.0", features = ["v4"] }

[features]
default = []
