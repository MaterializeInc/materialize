[package]
name = "mz-environmentd"
description = "Manages a single Materialize environment."
version = "26.20.0-dev.0"
authors = ["Materialize, Inc."]
license = "proprietary"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
askama = { version = "0.12.1", default-features = false, features = ["config", "serde-json"] }
async-trait.workspace = true
axum = { version = "0.8.8", features = ["ws"] }
axum-extra = { version = "0.12.5", features = ["typed-header"] }
base64.workspace = true
bytes.workspace = true
bytesize.workspace = true
chrono.workspace = true
clap = { workspace = true, features = ["env", "wrap_help"] }
derivative.workspace = true
fail.workspace = true
futures.workspace = true
headers = "0.4.1"
http.workspace = true
humantime = "2.3.0"
hyper = { version = "1.4.1", features = ["http1", "server"] }
hyper-openssl = "0.10.2"
hyper-tls = "0.6.0"
hyper-util = "0.1.20"
include_dir = "0.7.4"
ipnet = "2.12.0"
itertools.workspace = true
jsonwebtoken = { version = "10.3.0", features = ["aws_lc_rs"] }
libc = "0.2.184"
maplit.workspace = true
mime = "0.3.16"
mz-alloc = { path = "../alloc" }
mz-alloc-default = { path = "../alloc-default", optional = true }
mz-auth = { path = "../auth", default-features = false }
mz-authenticator = { path = "../authenticator" }
mz-aws-secrets-controller = { path = "../aws-secrets-controller" }
mz-build-info = { path = "../build-info" }
mz-adapter = { path = "../adapter", default-features = false }
mz-adapter-types = { path = "../adapter-types" }
mz-catalog = { path = "../catalog" }
mz-cloud-resources = { path = "../cloud-resources" }
mz-controller = { path = "../controller" }
mz-controller-types = { path = "../controller-types" }
mz-dyncfg = { path = "../dyncfg" }
mz-dyncfgs = { path = "../dyncfgs" }
mz-frontegg-auth = { path = "../frontegg-auth" }
mz-frontegg-mock = { path = "../frontegg-mock", optional = true }
mz-http-util = { path = "../http-util" }
mz-interchange = { path = "../interchange" }
mz-license-keys = { path = "../license-keys" }
mz-metrics = { path = "../metrics" }
mz-orchestrator = { path = "../orchestrator" }
mz-orchestrator-kubernetes = { path = "../orchestrator-kubernetes" }
mz-orchestrator-process = { path = "../orchestrator-process" }
mz-orchestrator-tracing = { path = "../orchestrator-tracing" }
mz-orchestratord = { path = "../orchestratord", default-features = false }
mz-ore = { path = "../ore", features = ["async", "panic", "process", "tracing", "id_gen"] }
mz-persist-client = { path = "../persist-client" }
mz-pgrepr = { path = "../pgrepr" }
mz-pgwire = { path = "../pgwire" }
mz-pgwire-common = { path = "../pgwire-common" }
mz-prof-http = { path = "../prof-http" }
mz-repr = { path = "../repr" }
mz-secrets = { path = "../secrets" }
mz-segment = { path = "../segment" }
mz-server-core = { path = "../server-core" }
mz-service = { path = "../service" }
mz-sql = { path = "../sql" }
mz-sql-parser = { path = "../sql-parser" }
mz-storage-types = { path = "../storage-types" }
mz-tracing = { path = "../tracing", optional = true }
nix = { version = "0.30.1", features = ["signal"] }
num_cpus.workspace = true
openssl.workspace = true
openssl-sys = { version = "0.9.108", features = ["vendored"] }
opentelemetry = { version = "0.31.0", features = ["trace"] }
opentelemetry_sdk = { version = "0.31.0", features = ["rt-tokio"] }
pin-project.workspace = true
postgres = { version = "0.19.12", optional = true }
postgres-openssl = { version = "0.5.2", optional = true }
prometheus.workspace = true
rdkafka-sys = { version = "4.3.0", features = [
    "cmake-build",
    "ssl-vendored",
    "libz-static",
    "zstd",
] }
rand.workspace = true
regex = { workspace = true, optional = true }
reqwest = { version = "0.12.28", features = ["json"] }
rlimit = "0.11.0"
semver = "1.0.27"
sentry-tracing = "0.46.1"
serde.workspace = true
serde_json.workspace = true
shell-words = "1.1.1"
stacker = "0.1.23"
sysctl = "0.7.1"
tempfile = "3.23.0"
thiserror.workspace = true
tokio = { version = "1.49.0", features = ["sync"] }
tokio-postgres = { version = "0.7.15" }
tokio-stream = { version = "0.1.18", features = ["net"] }
tokio-metrics.workspace = true
tower = { version = "0.5.3", features = ["buffer", "limit", "load-shed"] }
tower-http = { version = "0.6.7", features = [
    "cors",
    "decompression-br",
    "decompression-deflate",
    "decompression-gzip",
    "decompression-zstd",
] }
tower-sessions = "0.14.0"
tower-sessions-memory-store = "0.14.0"
tracing.workspace = true
tracing-capture = { version = "0.1.0", optional = true }
tracing-opentelemetry = { version = "0.32.1" }
tracing-subscriber = "0.3.23"
tungstenite = { version = "0.28.0" }
url.workspace = true
uuid.workspace = true

[dev-dependencies]
assert_cmd = "2.1.2"
bytes.workspace = true
datadriven = "0.9.0"
fallible-iterator = "0.2.0"
flate2.workspace = true
http-body-util = "0.1.3"
insta = { version = "1.45", features = ["json"] }
itertools.workspace = true
jsonwebtoken = { version = "10.3.0", features = ["aws_lc_rs"] }
mz-environmentd = { path = "../environmentd", default-features = false, features = ["test"] }
mz-oidc-mock = { path = "../oidc-mock", default-features = false }
mz-pgrepr = { path = "../pgrepr" }
mz-pgtest = { path = "../pgtest" }
mz-repr = { path = "../repr" }
mz-sql-parser = { path = "../sql-parser" }
postgres = { version = "0.19.12", features = ["with-chrono-0_4"] }
postgres-protocol.workspace = true
postgres_array = { version = "0.11.0" }
predicates = "3.1.4"
proptest.workspace = true
rdkafka = { version = "0.29.0", features = [
    "cmake-build",
    "ssl-vendored",
    "libz-static",
    "zstd",
] }
reqwest = { version = "0.12.28", features = ["blocking"] }
serde_json.workspace = true
serde_urlencoded = "0.7.1"
similar-asserts = "1.7"
timely.workspace = true
tokio-postgres = { version = "0.7.15", features = ["with-chrono-0_4", "with-serde_json-1"] }

[build-dependencies]
anyhow.workspace = true
cc = "1.2.58"
mz-npm = { path = "../npm" }

[features]
default = ["tokio-console", "mz-alloc-default"]
# When enabled, static assets for the web UI are loaded from disk on every HTTP
# request rather than compiled into the binary. This vastly speeds up the
# iteration cycle when developing the web UI.
#
# WARNING: For development use only! When enabled, may allow unrestricted read
# access to the file system.
dev-web = []
jemalloc = ["mz-alloc/jemalloc"]
test = [
    "postgres",
    "regex",
    "postgres-openssl",
    "mz-tracing",
    "mz-frontegg-mock",
    "tracing-capture",
    "mz-orchestrator-tracing/capture",
]
tokio-console = [
    "mz-ore/tokio-console",
    "mz-orchestrator-tracing/tokio-console",
]
foundationdb = ["mz-adapter/foundationdb", "mz-persist-client/foundationdb"]

[package.metadata.cargo-udeps.ignore]
# sysctl is only used on macOS.
normal = ["mz-alloc-default", "sysctl"]
