[package]
name = "mz-expr"
description = "The core expression language for Materialize."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[[bench]]
name = "like_pattern"
harness = false

[[bench]]
name = "case_literal"
harness = false

[[bench]]
name = "window_functions"
harness = false

[[bench]]
name = "bench_binary"
harness = false

[[bench]]
name = "bench_unary"
harness = false

[[bench]]
name = "bench_variadic"
harness = false

[[bench]]
name = "bench_array"
harness = false

[dependencies]
aho-corasick.workspace = true
anyhow.workspace = true
bytes.workspace = true
bytesize.workspace = true
chrono.workspace = true
columnation.workspace = true
chrono-tz.workspace = true
crc32fast.workspace = true
csv.workspace = true
differential-dataflow.workspace = true
dec.workspace = true
derivative.workspace = true
encoding.workspace = true
enum-iterator.workspace = true
fallible-iterator.workspace = true
hex.workspace = true
hmac.workspace = true
itertools.workspace = true
md-5.workspace = true
murmur2.workspace = true
mz-expr-derive = { path = "../expr-derive", features = ["test"] }
mz-lowertest = { path = "../lowertest" }
mz-ore = { path = "../ore", features = ["network", "proptest", "id_gen"] }
mz-persist-types = { path = "../persist-types" }
mz-pgrepr = { path = "../pgrepr" }
mz-pgtz = { path = "../pgtz" }
mz-proto = { path = "../proto" }
mz-regexp = { path = "../regexp" }
mz-repr = { path = "../repr" }
mz-sql-parser = { path = "../sql-parser" }
mz-sql-pretty = { path = "../sql-pretty" }
num.workspace = true
num_enum.workspace = true
ordered-float.workspace = true
paste.workspace = true
prost.workspace = true
regex.workspace = true
regex-syntax.workspace = true
seahash.workspace = true
serde.workspace = true
serde_json.workspace = true
aws-lc-rs.workspace = true
tracing.workspace = true
uncased.workspace = true
unicode-normalization.workspace = true
uuid = { workspace = true, features = ["v5"] }
proptest.workspace = true
proptest-derive.workspace = true
smallvec.workspace = true

[dev-dependencies]
criterion.workspace = true
datadriven.workspace = true
insta.workspace = true
mz-expr-derive-impl = { path = "../expr-derive-impl", features = ["test"] }
mz-expr-test-util = { path = "../expr-test-util" }
mz-ore = { path = "../ore" }
mz-transform = { path = "../transform" }
rand.workspace = true

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true

[features]
default = ["mz-build-tools/default"]
