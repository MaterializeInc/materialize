[package]
name = "mz-expr"
description = "The core expression language for Materialize."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[[bench]]
name = "like_pattern"
harness = false

[[bench]]
name = "case_literal"
harness = false

[[bench]]
name = "window_functions"
harness = false

[dependencies]
aho-corasick = "1.1.4"
anyhow.workspace = true
bytes.workspace = true
bytesize.workspace = true
chrono.workspace = true
chrono-tz = { version = "0.8.1", features = ["serde", "case-insensitive"] }
crc32fast = "1.4.2"
csv = "1.4.0"
differential-dataflow.workspace = true
dec.workspace = true
derivative.workspace = true
encoding = "0.2.0"
enum-iterator = "2.1.0"
fallible-iterator = "0.2.0"
hex.workspace = true
hmac = "0.12.1"
itertools.workspace = true
md-5.workspace = true
murmur2 = "0.1.0"
mz-expr-derive = { path = "../expr-derive", features = ["test"] }
mz-lowertest = { path = "../lowertest" }
mz-ore = { path = "../ore", features = ["network", "proptest", "id_gen"] }
mz-persist-types = { path = "../persist-types" }
mz-pgrepr = { path = "../pgrepr" }
mz-pgtz = { path = "../pgtz" }
mz-proto = { path = "../proto" }
mz-regexp = { path = "../regexp" }
mz-repr = { path = "../repr" }
mz-sql-parser = { path = "../sql-parser" }
mz-sql-pretty = { path = "../sql-pretty" }
num = "0.4.3"
num_enum = "0.7.6"
ordered-float = { version = "5.1.0", features = ["serde"] }
paste.workspace = true
prost.workspace = true
regex.workspace = true
regex-syntax = "0.8.10"
seahash = "4.1.0"
serde.workspace = true
serde_json.workspace = true
sha1 = "0.10.6"
sha2.workspace = true
subtle = "2.6.1"
tracing.workspace = true
uncased.workspace = true
unicode-normalization = "0.1.25"
uuid = { workspace = true, features = ["v5"] }
proptest.workspace = true
proptest-derive.workspace = true
smallvec.workspace = true

[dev-dependencies]
criterion = { version = "0.8.2" }
datadriven.workspace = true
insta = "1.45"
mz-expr-derive-impl = { path = "../expr-derive-impl", features = ["test"] }
mz-expr-test-util = { path = "../expr-test-util" }
mz-ore = { path = "../ore" }
mz-transform = { path = "../transform" }
rand.workspace = true

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true

[features]
default = ["mz-build-tools/default"]
