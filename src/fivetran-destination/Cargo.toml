[package]
name = "mz-fivetran-destination"
description = "Fivetran destination for Materialize."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
async-compression = { workspace = true, features = ["gzip", "tokio", "zstd"] }
bytes.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
csv-async.workspace = true
futures.workspace = true
itertools.workspace = true
mz-ore = { path = "../ore", features = ["cli", "id_gen"], default-features = false }
mz-pgrepr = { path = "../pgrepr", default-features = false }
mz-sql-parser = { path = "../sql-parser", default-features = false }
postgres-protocol.workspace = true
rustls = { workspace = true, features = ["aws_lc_rs", "std"], default-features = false }
rustls-pki-types = { workspace = true, features = ["std"] }
prost = { workspace = true, features = ["no-recursion-limit"] }
prost-types.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
aws-lc-rs.workspace = true
socket2.workspace = true
thiserror.workspace = true
tonic = { workspace = true, features = ["gzip"] }
tonic-prost.workspace = true
tokio = { workspace = true, features = ["rt"] }
tokio-postgres.workspace = true
tokio-rustls.workspace = true
tokio-stream = { workspace = true, features = ["net"] }
tokio-util = { workspace = true, features = ["io"] }
tracing.workspace = true
tracing-core.workspace = true
tracing-subscriber.workspace = true

[dev-dependencies]
insta.workspace = true

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true
reqwest = { workspace = true, features = ["blocking", "rustls-tls-webpki-roots-no-provider"], default-features = false }
rustls = { workspace = true, features = ["aws_lc_rs"], default-features = false }
tonic-prost-build.workspace = true

[features]
default = ["mz-build-tools/default"]
