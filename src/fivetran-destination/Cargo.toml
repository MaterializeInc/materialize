[package]
name = "mz-fivetran-destination"
description = "Fivetran destination for Materialize."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
async-compression = { version = "0.4.27", features = ["gzip", "tokio", "zstd"] }
bytes.workspace = true
clap = { workspace = true, features = ["env"] }
csv-async = { version = "1.3.1", default-features = false, features = ["tokio"] }
futures.workspace = true
itertools.workspace = true
mz-ore = { path = "../ore", features = ["cli", "id_gen"], default-features = false }
mz-pgrepr = { path = "../pgrepr", default-features = false }
mz-sql-parser = { path = "../sql-parser", default-features = false }
openssl.workspace = true
postgres-openssl = "0.5.2"
postgres-protocol.workspace = true
prost.workspace = true
prost-types = { version = "0.14.3" }
serde.workspace = true
serde_json.workspace = true
sha2 = "0.10.9"
socket2 = "0.6.0"
thiserror.workspace = true
tonic = { version = "0.14.2", features = ["gzip"] }
tonic-prost = "0.14.5"
tokio = { version = "1.49.0", features = ["rt"] }
tokio-postgres = { version = "0.7.15" }
tokio-stream = { version = "0.1.18", features = ["net"] }
tokio-util = { version = "0.7.18", features = ["io"] }
tracing.workspace = true
tracing-core = "0.1.35"
tracing-subscriber = "0.3.23"

[dev-dependencies]
insta = "1.45"

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true
reqwest = { version = "0.12.28", features = ["blocking", "native-tls-vendored"] }
tonic-prost-build = "0.14.5"

[features]
default = ["mz-build-tools/default"]
