[package]
name = "mz-foundationdb"
description = "Common FoundationDB utilities for Materialize."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow = "1.0.102"
foundationdb = { version = "0.10.0", default-features = false, features = ["embedded-fdb-include", "fdb-7_3"] }
mz-ore = { path = "../ore", default-features = false, features = ["process"]}
tracing = "0.1.44"

[dev-dependencies]
mz-ore = { path = "../ore", default-features = false, features = ["test"]}

[features]
default = []
