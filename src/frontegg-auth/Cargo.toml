[package]
name = "mz-frontegg-auth"
description = "Authentication interfaces to Frontegg."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
base64.workspace = true
clap = { workspace = true, features = ["env", "wrap_help"] }
derivative.workspace = true
futures.workspace = true
jsonwebtoken = { version = "10.3.0", features = ["aws_lc_rs"] }
lru = "0.16.3"
mz-auth = { path = "../auth", default-features = false }
mz-ore = { path = "../ore", features = ["network", "metrics"] }
mz-repr = { path = "../repr" }
prometheus.workspace = true
reqwest.workspace = true
reqwest-middleware = { version = "0.4.2", features = ["json"] }
reqwest-retry = "0.8.0"
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tokio.workspace = true
tracing.workspace = true
uuid = { workspace = true, features = ["serde"] }

[dev-dependencies]
axum.workspace = true
mz-ore = { path = "../ore", features = ["network", "test"] }
tokio.workspace = true

[features]
default = []
