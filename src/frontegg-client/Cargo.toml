[package]
name = "mz-frontegg-client"
description = "Client to interact with Frontegg."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
jsonwebtoken = { workspace = true, features = ["aws_lc_rs"] }
mz-frontegg-auth = { path = "../frontegg-auth" }
mz-ore = { path = "../ore", features = ["network"] }
reqwest = { workspace = true, features = ["json", "rustls-tls-webpki-roots-no-provider"], default-features = false }
serde = { workspace = true, features = ["derive"] }
thiserror.workspace = true
tokio = { workspace = true, features = ["macros"] }
serde_json.workspace = true
uuid = { workspace = true, features = ["serde"] }
url.workspace = true

[features]
default = []
