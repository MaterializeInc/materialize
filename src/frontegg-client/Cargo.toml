[package]
name = "mz-frontegg-client"
description = "Client to interact with Frontegg."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
jsonwebtoken = { version = "10.3.0", features = ["aws_lc_rs"] }
mz-frontegg-auth = { path = "../frontegg-auth" }
mz-ore = { path = "../ore", features = ["network"] }
reqwest = { version = "0.12.28", default-features = false, features = ["json", "rustls-tls-webpki-roots-no-provider"] }
serde = { version = "1.0.219", features = ["derive"] }
thiserror = "2.0.18"
tokio = { version = "1.49.0", features = ["macros"] }
serde_json = "1.0.149"
uuid = { version = "1.19.0", features = ["serde"] }
url = "2.5.8"

[features]
default = []
