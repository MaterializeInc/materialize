[package]
name = "mz-frontegg-mock"
description = "Frontegg mock server."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
axum = "0.8.8"
axum-extra = { version = "0.12.5", features = ["typed-header"] }
base64.workspace = true
chrono = { workspace = true, default-features = false, features = ["serde"] }
clap = { workspace = true, features = ["env"] }
hyper = { version = "1.4.1", features = ["http1", "server"] }
jsonwebtoken = { version = "10.3.0", features = ["aws_lc_rs"] }
mz-frontegg-auth = { path = "../frontegg-auth" }
mz-ore = { path = "../ore", default-features = false, features = ["cli"] }
serde.workspace = true
serde_json.workspace = true
tokio = { version = "1.49.0", default-features = false }
tracing.workspace = true
tracing-subscriber = "0.3.23"
uuid.workspace = true

[dev-dependencies]
reqwest = { version = "0.12.28", features = ["json"] }
openssl.workspace = true

[features]
default = []
