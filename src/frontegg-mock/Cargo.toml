[package]
name = "mz-frontegg-mock"
description = "Frontegg mock server."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
axum.workspace = true
axum-extra = { workspace = true, features = ["typed-header"] }
base64.workspace = true
chrono = { workspace = true, features = ["serde"], default-features = false }
clap = { workspace = true, features = ["derive", "env"] }
hyper = { workspace = true, features = ["http1", "server"] }
jsonwebtoken = { workspace = true, features = ["aws_lc_rs"] }
mz-frontegg-auth = { path = "../frontegg-auth" }
mz-ore = { path = "../ore", default-features = false, features = ["cli"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tokio = { workspace = true }
tracing.workspace = true
tracing-subscriber.workspace = true
uuid.workspace = true

[dev-dependencies]
aws-lc-rs.workspace = true
base64.workspace = true
reqwest = { workspace = true, features = ["json", "rustls-tls-webpki-roots-no-provider"], default-features = false }

[features]
default = []
