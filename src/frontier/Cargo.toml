[package]
name = "mz-frontier"
description = "Frontier tracking and consolidation for Materialize's control plane."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
serde.workspace = true
smallvec = { workspace = true, features = ["serde"] }
timely = { workspace = true, optional = true }

[dev-dependencies]
bincode.workspace = true
differential-dataflow.workspace = true
proptest.workspace = true
timely.workspace = true

[features]
default = []
# Conversions between `mz_frontier::Antichain` and `timely::progress::Antichain`
# for crates that need to cross the persist/txn-wal/timely-util boundary.
timely-compat = ["dep:timely"]
