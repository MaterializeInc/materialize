[package]
name = "mz-http-util"
description = "Utilities for running HTTP servers in Materialize."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
askama = { version = "0.12.1", default-features = false, features = ["config", "serde-json"] }
axum = "0.8.8"
axum-extra = { version = "0.12.5", features = ["typed-header"] }
headers = "0.4.1"
http.workspace = true
hyper = { version = "1.4.1", features = ["http1", "server"] }
include_dir = "0.7.4"
mz-ore = { path = "../ore", default-features = false, features = ["metrics", "tracing"] }
prometheus.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio = { version = "1.49.0", features = ["macros", "rt-multi-thread"] }
tower = { version = "0.5.3", features = ["balance", "buffer", "filter", "limit", "retry", "timeout", "util"] }
tower-http = { version = "0.6.7", features = ["auth", "cors", "map-response-body", "trace", "util"] }
tracing.workspace = true
tracing-subscriber = "0.3.23"

[dev-dependencies]
mz-ore = { path = "../ore", default-features = false, features = ["test"] }

[features]
default = []

[package.metadata.cargo-udeps.ignore]
# Only used in macro generated code
normal = ["include_dir"]
