[package]
name = "mz-interchange"
description = "Translations for various data serialization formats."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[[bench]]
name = "mz-interchange-bench"
path = "benches/benches.rs"
harness = false

[dependencies]
anyhow.workspace = true
byteorder.workspace = true
bytes.workspace = true
chrono.workspace = true
clap.workspace = true
differential-dataflow.workspace = true
itertools.workspace = true
maplit.workspace = true
mz-avro = { path = "../avro", features = ["snappy"] }
mz-ccsr = { path = "../ccsr" }
mz-ore = { path = "../ore", features = ["network", "cli"] }
mz-repr = { path = "../repr" }
mz-pgrepr = { path = "../pgrepr" }
ordered-float.workspace = true
prost.workspace = true
prost-reflect = "0.16.3"
seahash = "4"
serde.workspace = true
serde_json.workspace = true
timely.workspace = true
tokio.workspace = true
tracing.workspace = true
uuid = { workspace = true, features = ["serde"] }

[dev-dependencies]
criterion.workspace = true
tokio.workspace = true

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true

[features]
default = ["mz-build-tools/default"]
