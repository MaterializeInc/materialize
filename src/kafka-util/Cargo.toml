[package]
name = "mz-kafka-util"
description = "Utilities for working with Kafka."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
aws-config = { version = "1.8.15", default-features = false, features = ["sso"] }
aws-credential-types = { version = "1.2.8" }
aws-sigv4 = { version = "1.3.6" }
aws-types.workspace = true
base64.workspace = true
chrono = { version = "0.4.39", default-features = false, features = ["std"] }
clap.workspace = true
crossbeam = "0.8.4"
fancy-regex = "0.16.2"
futures.workspace = true
itertools.workspace = true
mz-avro = { path = "../avro" }
mz-ccsr = { path = "../ccsr" }
mz-ore = { path = "../ore", features = ["cli", "network", "async"] }
mz-ssh-util = { path = "../ssh-util" }
num_cpus.workspace = true
prost.workspace = true
rand.workspace = true
rdkafka = { version = "0.29.0", features = ["cmake-build", "ssl-vendored", "libz-static", "zstd"] }
serde.workspace = true
serde_json.workspace = true
tokio = { version = "1.49.0", features = ["macros", "rt", "sync"] }
thiserror.workspace = true
tracing.workspace = true
url.workspace = true

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true

[features]
default = ["mz-build-tools/default"]
