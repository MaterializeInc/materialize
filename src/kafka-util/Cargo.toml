[package]
name = "mz-kafka-util"
description = "Utilities for working with Kafka."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
aws-config = { workspace = true, features = ["sso"], default-features = false }
aws-credential-types.workspace = true
aws-sigv4.workspace = true
aws-types.workspace = true
base64.workspace = true
chrono = { workspace = true, features = ["std"], default-features = false }
clap = { workspace = true, features = ["derive"] }
crossbeam.workspace = true
fancy-regex.workspace = true
futures.workspace = true
itertools.workspace = true
mz-avro = { path = "../avro" }
mz-ccsr = { path = "../ccsr" }
mz-ore = { path = "../ore", features = ["cli", "network", "async"] }
mz-ssh-util = { path = "../ssh-util" }
num_cpus.workspace = true
prost = { workspace = true, features = ["no-recursion-limit"] }
rand.workspace = true
rdkafka = { workspace = true, features = ["cmake-build", "ssl-awslc", "libz-static", "zstd"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tokio = { workspace = true, features = ["macros", "rt", "sync"] }
thiserror.workspace = true
tracing.workspace = true
url.workspace = true

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true

[features]
default = ["mz-build-tools/default"]
