[package]
name = "mz-license-keys"
description = "Implementation of license keys for Materialize."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[[example]]
name = "get-public-key"
required-features = ["signing"]

[[example]]
name = "sign"
required-features = ["signing"]

[dependencies]
anyhow.workspace = true
jsonwebtoken.workspace = true
serde.workspace = true

aws-sdk-kms = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
pem = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }
utoipa = { workspace = true, optional = true }
uuid = { workspace = true, optional = true, features = ["v4"] }

[dev-dependencies]
clap.workspace = true
mz-aws-util = { path = "../aws-util" }
tokio.workspace = true

[features]
default = []
signing = ["aws-sdk-kms", "base64", "pem", "serde_json", "sha2", "uuid"]
utoipa = ["dep:utoipa"]

[package.metadata.cargo-udeps.ignore]
# Used in examples only.
development = ["mz-aws-util", "tokio"]

[lints]
workspace = true
