[package]
name = "mz-license-keys"
description = "Implementation of license keys for Materialize."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[[example]]
name = "get-public-key"
required-features = ["signing"]

[[example]]
name = "sign"
required-features = ["signing"]

[dependencies]
anyhow.workspace = true
jsonwebtoken = { version = "10.3.0", features = ["aws_lc_rs"] }
serde.workspace = true

aws-sdk-kms = { version = "1.96.0", default-features = false, features = ["rt-tokio"], optional = true }
base64 = { workspace = true, optional = true }
pem = { version = "3.0.6", optional = true }
serde_json = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }
utoipa = { version = "5.4.0", optional = true }
uuid = { workspace = true, optional = true, features = ["v4"] }

[dev-dependencies]
clap.workspace = true
mz-aws-util = { path = "../aws-util" }
tokio = { version = "1.49.0", features = ["macros", "rt-multi-thread"] }

[features]
default = []
signing = ["aws-sdk-kms", "base64", "pem", "serde_json", "sha2", "uuid"]
utoipa = ["dep:utoipa"]

[package.metadata.cargo-udeps.ignore]
# Used in examples only.
development = ["mz-aws-util", "tokio"]

[lints]
workspace = true
