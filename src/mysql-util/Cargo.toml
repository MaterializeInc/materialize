[package]
name = "mz-mysql-util"
description = "MySQL utility library."
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
aws-config = { version = "1.8.15", default-features = false, features = ["sso"] }
aws-credential-types = { version = "1.2.8" }
aws-sigv4 = { version = "1.3.6" }
aws-types.workspace = true
chrono.workspace = true
indexmap = { version = "2.10.0", default-features = false, features = ["std"] }
itertools.workspace = true
maplit.workspace = true
mz-cloud-resources = { path = "../cloud-resources" }
mz-ore = { path = "../ore", features = ["async"] }
mz-proto = { path = "../proto" }
mz-repr = { path = "../repr" }
mz-ssh-util = { path = "../ssh-util" }
mysql_common = { version = "0.35.5", default-features = false, features = [
    "chrono",
] }
mysql_async = { version = "0.36.2", default-features = false, features = [
    "minimal",
    "tracing",
] }
prost.workspace = true
proptest.workspace = true
proptest-derive.workspace = true
fancy-regex = "0.16.2"
regex.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true
url.workspace = true
uuid = { workspace = true, features = ["v4"] }

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true

[features]
default = ["mz-build-tools/default"]

[dev-dependencies]
tokio = { version = "1.49.0", features = ["test-util"] }
