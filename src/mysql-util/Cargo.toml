[package]
name = "mz-mysql-util"
description = "MySQL utility library."
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
aws-config.workspace = true
aws-credential-types.workspace = true
aws-sigv4.workspace = true
aws-types.workspace = true
chrono.workspace = true
indexmap.workspace = true
itertools.workspace = true
maplit.workspace = true
mz-cloud-resources = { path = "../cloud-resources" }
mz-ore = { path = "../ore", features = ["async"] }
mz-proto = { path = "../proto" }
mz-repr = { path = "../repr" }
mz-ssh-util = { path = "../ssh-util" }
mysql_common.workspace = true
mysql_async.workspace = true
prost.workspace = true
proptest = { workspace = true, optional = true }
proptest-derive = { workspace = true, optional = true }
fancy-regex.workspace = true
regex.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true
url.workspace = true
uuid = { workspace = true, features = ["v4"] }

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true

[features]
default = ["mz-build-tools/default"]
proptest = ["dep:proptest", "dep:proptest-derive", "mz-repr/proptest"]

[dev-dependencies]
mz-mysql-util = { path = ".", features = ["proptest"] }
proptest.workspace = true
proptest-derive.workspace = true
tokio.workspace = true

[package.metadata.cargo-udeps.ignore]
# The self-dep above activates the `proptest` feature for tests so that
# `cfg(test)`-gated `Arbitrary` derives can find `mz-repr`'s proptest impls.
# cargo-udeps doesn't recognize feature-activation as usage.
development = ["mz-mysql-util"]
