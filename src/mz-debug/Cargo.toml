[package]
name = "mz-debug"
description = "Debug tool for self-managed Materialize."
version = "0.4.1"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
chrono.workspace = true
clap = { workspace = true, features = ["env"] }
csv-async = { version = "1.3.1", default-features = false, features = ["tokio"] }
futures.workspace = true
k8s-openapi = { version = "0.27.0", features = ["v1_32"] }
kube = { version = "3.0.1", default-features = false, features = ["client", "runtime"] }
mz-build-info = { path = "../build-info" }
mz-cloud-resources = { path = "../cloud-resources"}
mz-ore = { path = "../ore", features = ["cli", "test"] }
mz-server-core = { path = "../server-core"}
mz-sql-parser = { path = "../sql-parser" }
mz-tls-util = { path = "../tls-util" }
postgres-openssl.workspace = true
regex.workspace = true
reqwest.workspace = true
serde.workspace = true
serde_yaml = "0.9.34"
tokio.workspace = true
tokio-postgres.workspace = true
tokio-util = { workspace = true, features = ["io"] }
tracing.workspace = true
tracing-subscriber.workspace = true
url = { workspace = true, features = ["serde"] }
walkdir = "2.5"
zip = { version = "6.0.0", default-features = false, features=["deflate-flate2"]}

[features]
default = []
