[package]
name = "mz-debug"
description = "Debug tool for self-managed Materialize."
version = "0.4.1"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow = "1.0.102"
chrono = { version = "0.4.39", default-features = false }
clap = { version = "4.5.23", features = ["derive", "env"] }
csv-async = { version = "1.3.1", default-features = false, features = ["tokio"] }
futures = "0.3.32"
k8s-openapi = { version = "0.27.0", features = ["v1_32"] }
kube = { version = "3.0.1", default-features = false, features = ["client", "runtime"] }
mz-build-info = { path = "../build-info" }
mz-cloud-resources = { path = "../cloud-resources"}
mz-ore = { path = "../ore", features = ["cli", "test"] }
mz-server-core = { path = "../server-core"}
mz-sql-parser = { path = "../sql-parser" }
mz-tls-util = { path = "../tls-util" }
regex = "1.12.3"
reqwest = { version = "0.12.28", features = ["stream"] }
serde = "1.0.219"
serde_yaml = "0.9.34"
tokio = "1.49.0"
tokio-postgres = { version = "0.7.15" }
tokio-util = { version = "0.7.18", features = ["io"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", default-features = false, features = ["env-filter", "fmt"] }
url = { version = "2.5.8", features = ["serde"] }
walkdir = "2.5"
zip = { version = "6.0.0", default-features = false, features=["deflate-flate2"]}

[features]
default = []
