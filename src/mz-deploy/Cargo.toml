[package]
name = "mz-deploy"
description = "Declarative SQL project tooling for Materialize: compile, test, deploy."
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
annotate-snippets = { workspace = true }
async-stream = { workspace = true }
aws-sdk-secretsmanager = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
itertools = { workspace = true }
rayon = { workspace = true }
junit-report = { workspace = true }
mz-build-info = { path = "../build-info" }
mz-ore = { path = "../ore", default-features = false, features = ["async"] }
mz-aws-util = { path = "../aws-util", default-features = false }
mz-catalog = { path = "../catalog" }
mz-controller-types = { path = "../controller-types" }
mz-expr = { path = "../expr" }
mz-repr = { path = "../repr", features = ["tracing"] }
mz-secrets = { path = "../secrets" }
mz-sql-lexer = { path = "../sql-lexer", default-features = false }
mz-sql = { path = "../sql" }
mz-sql-parser = { path = "../sql-parser", default-features = false }
mz-storage-types = { path = "../storage-types" }
ropey = { workspace = true }
tower-lsp = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true }
clap = { workspace = true, features = ["env"] }
clap_complete = { workspace = true }
crossbeam-channel = { workspace = true }
# Default features are off in the workspace declaration. mz-deploy only uses
# crossterm for terminal/cursor styling, not input reading, so it skips the
# default `events` feature — `events` pulls signal-hook-mio, which enables
# mio's default `log` feature (a banned crate).
crossterm = { workspace = true, features = ["windows"] }
owo-colors = { workspace = true, features = ["supports-colors"] }
tokio = { workspace = true }
tokio-postgres = { workspace = true, features = ["with-chrono-0_4", "with-serde_json-1"] }
postgres-openssl = { workspace = true }
openssl = { workspace = true }
toml = { workspace = true }
serde = { workspace = true }
dirs = { workspace = true }
reqwest = { workspace = true}
serde_json = { workspace = true }
strsim = { workspace = true }
supports-color = { workspace = true }
url = { workspace = true }
sha2 = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
uuid = { workspace = true, features = ["v4", "serde"] }
rusqlite = { workspace = true }

[dev-dependencies]
mz-ore = { path = "../ore", features = ["test"] }
tempfile = { workspace = true }

[features]
vendored-openssl = ["openssl/vendored"]
