<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mz-deploy explore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>__DOCS_CSS__</style>
</head>
<body>
    <div id="app">
        <nav id="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">Materialize</h1>
                <div class="project-name" id="project-name"></div>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search objects..." autocomplete="off">
                <div id="search-results" class="search-results hidden"></div>
            </div>
            <div class="nav-links">
                <a href="#overview" class="nav-link active" data-view="overview">Overview</a>
                <a href="#dag" class="nav-link" data-view="dag">DAG</a>
                <a href="#clusters" class="nav-link" data-view="clusters">Clusters</a>
                <a href="#contracts" class="nav-link" data-view="contracts">Data Contracts</a>
                <a href="#tests" class="nav-link" data-view="tests">Tests</a>
                <a href="#governance" class="nav-link" data-view="governance">Governance</a>
            </div>
            <div class="schema-browser" id="schema-browser"></div>
        </nav>
        <main id="content">
            <div id="view-overview" class="view"></div>
            <div id="view-dag" class="view"></div>
            <div id="view-clusters" class="view"></div>
            <div id="view-detail" class="view"></div>
            <div id="view-contracts" class="view"></div>
            <div id="view-tests" class="view"></div>
            <div id="view-governance" class="view"></div>
        </main>
    </div>
    <script>
        window.__MANIFEST__ = __MANIFEST_JSON__;
    </script>
    <script>__DOCS_JS__</script>
</body>
</html>
