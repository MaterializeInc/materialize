[package]
name = "mz"
description = "The Materialize command-line interface (CLI)."
license = "Apache-2.0"
version = "0.3.1"
edition.workspace = true
rust-version.workspace = true

[lints]
workspace = true

[dependencies]
axum.workspace = true
clap.workspace = true
csv = "1.4.0"
dirs = "6.0.0"
indicatif = "0.18.4"
termcolor = "1.4.1"
maplit.workspace = true
mz-cloud-api = { path = "../cloud-api" }
mz-frontegg-client = { path = "../frontegg-client" }
mz-frontegg-auth = { path = "../frontegg-auth" }
mz-build-info = { path = "../build-info" }
mz-ore = { path = "../ore", features = ["async", "cli", "test"] }
mz-sql-parser = { path = "../sql-parser" }
open = "5.3.3"
openssl-probe = "0.1.6"
hyper.workspace = true
reqwest.workspace = true
rpassword = "7.4.0"
semver.workspace = true
serde.workspace = true
serde-aux = "4.7.0"
serde_json.workspace = true
tabled = "0.20.0"
time = "0.3.17"
tokio.workspace = true
toml = "0.8.22"
toml_edit = { version = "0.22.26", features = ["serde"] }
thiserror.workspace = true
uuid.workspace = true
url.workspace = true

[dev-dependencies]
assert_cmd = "2.1.2"

[target.'cfg(target_os = "macos")'.dependencies]
security-framework = "2.10.0"

[package.metadata.deb]
name = "materialize-cli"
maintainer = "Materialize, Inc."
copyright = "Materialize, Inc. and contributors"
section = "utility"
assets = [
    ["target/release/mz", "usr/bin/", "755"],
]
depends = "postgresql-client, $auto"

[features]
default = []
