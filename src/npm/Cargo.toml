[package]
name = "mz-npm"
description = "A lightweight JavaScript package manager, like npm."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
flate2.workspace = true
hex.workspace = true
hex-literal.workspace = true
reqwest = { workspace = true, features = ["blocking", "rustls-tls-webpki-roots-no-provider"], default-features = false }
rustls = { workspace = true, features = ["aws_lc_rs"], default-features = false }
aws-lc-rs.workspace = true
tar.workspace = true
walkdir.workspace = true

[features]
default = []
