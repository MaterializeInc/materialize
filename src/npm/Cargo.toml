[package]
name = "mz-npm"
description = "A lightweight JavaScript package manager, like npm."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
flate2.workspace = true
hex.workspace = true
hex-literal = "1.1.0"
reqwest = { version = "0.12.28", features = ["blocking", "native-tls-vendored"] }
sha2 = "0.10.9"
tar = "0.4.44"
walkdir = "2.5.0"

[features]
default = []
