[package]
name = "mz-ore"
description = "Internal utility libraries for Materialize."
version = "0.1.0"
license = "Apache-2.0"
edition.workspace = true
rust-version.workspace = true
authors = ["Materialize, Inc."]

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true, optional = true }
# NB: ore is meant to be an extension of the Rust stdlib. To keep it
# lightweight, dependencies on external crates should be avoided if possible. If
# an external crate is required, it must be optional and feature-gated.
#
# Exceptions: `either` (zero deps, quasi-stdlib) and `zeroize` (zero runtime
# deps, security-critical — must be available unconditionally so that
# `ore::secure` types are always accessible without feature-flag opt-in).
# aws-lc-rs is the crypto backend. default-features=false avoids pulling in
# aws-lc-sys unconditionally; the `crypto` or `fips` features select which
# C library to link (aws-lc-sys vs aws-lc-fips-sys).
# is enabled, it links against aws-lc-fips-sys (the validated module).
aws-lc-rs = { workspace = true, optional = true }
async-trait = { workspace = true, optional = true }
rustls = { workspace = true, features = ["aws_lc_rs"], optional = true, default-features = false }
bytemuck = { workspace = true, optional = true }
bytes = { workspace = true, optional = true }
chrono = { workspace = true, features = ["std"], optional = true, default-features = false }
clap = { workspace = true, features = ["env", "string"], optional = true }
columnation = { workspace = true, optional = true }
columnar = { workspace = true, optional = true }
compact_bytes = { workspace = true, optional = true }
ctor = { workspace = true, optional = true }
differential-dataflow = { workspace = true, optional = true }
derivative.workspace = true
either.workspace = true
futures = { workspace = true, optional = true }
hibitset = { workspace = true, optional = true }
itertools.workspace = true
lgalloc = { workspace = true, optional = true }
libc = { workspace = true, optional = true }
mz-ore-proc = { path = "../ore-proc", default-features = false }
num.workspace = true
num-traits = { workspace = true, optional = true }
tokio-rustls = { workspace = true, optional = true, default-features = false }
parquet = { workspace = true, optional = true, default-features = false }
paste.workspace = true
pin-project.workspace = true
prometheus = { workspace = true, optional = true, default-features = false }
proptest = { workspace = true, features = ["std"], optional = true, default-features = false }
proptest-derive = { workspace = true, optional = true }
rand = { workspace = true, optional = true }
smallvec = { workspace = true, optional = true }
stacker = { workspace = true, optional = true }
sentry = { workspace = true, features = ["backtrace", "contexts", "debug-images", "reqwest"], optional = true, default-features = false }
sentry-panic = { workspace = true, optional = true }
serde = { workspace = true, features = ["derive"] }
tokio = { workspace = true, features = ["fs", "io-util", "net", "rt-multi-thread", "sync", "time",], optional = true }
thiserror.workspace = true
tracing-capture = { workspace = true, optional = true }
# TODO(guswynn): determine, when, if ever, we can remove `tracing-log`
# The `tracing-log` feature here is load-bearing: While our busiest-logging dependency (`rdkafka`) is now hooked-up
# to use `tracing`, we cannot remove this feature until we guarantee no dependencies log using the `log` crate, for
# log lines we care about.
# Note that this feature is distinct from `tracing`'s `log` feature, which has `tracing` macros emit `log` records if
# there is no global `tracing` subscriber.
tracing-subscriber = { workspace = true, features = ["env-filter", "fmt", "json", "tracing-log",], optional = true }
uuid = { workspace = true, features = ["v4", "v7"], optional = true }
url = { workspace = true, features = ["serde"] }
zeroize = { workspace = true, features = ["derive", "serde"] }

# For the `tracing` feature
http = { workspace = true, optional = true }
tracing = { workspace = true, optional = true }
tracing-opentelemetry = { workspace = true, optional = true }
tonic = { workspace = true, features = ["transport"], optional = true }
hyper-rustls = { workspace = true, features = ["aws-lc-rs", "http1", "http2", "native-tokio", "tls12"], optional = true, default-features = false }
hyper-util = { workspace = true, optional = true }
opentelemetry = { workspace = true, features = ["trace"], optional = true }
opentelemetry-otlp = { workspace = true, features = ["grpc-tonic"], optional = true }
opentelemetry_sdk = { workspace = true, features = ["rt-tokio", "experimental_trace_batch_span_processor_with_async_runtime"], optional = true }
console-subscriber = { workspace = true, optional = true }
sentry-tracing = { workspace = true, optional = true }
turmoil = { workspace = true, optional = true }
yansi = { workspace = true, optional = true }

[dev-dependencies]
anyhow.workspace = true
criterion = { workspace = true, features = ["async_tokio"] }
mz-ore = { path = "../ore", features = ["id_gen", "chrono"] }
proptest = { workspace = true, features = ["std"], default-features = false }
scopeguard.workspace = true
serde_json.workspace = true
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
tokio-test.workspace = true
tracing-subscriber.workspace = true

[features]
default = ["tokio-console"]
async = [
    "async-trait",
    "futures",
    "metrics",
    "tokio/tracing",
    "tokio-rustls",
    "tokio",
    "dep:tracing",
]
bytes = ["dep:bytes", "compact_bytes", "smallvec", "smallvec/const_generics", "region", "tracing"]
network = ["async", "dep:bytes", "smallvec", "dep:tracing"]
panic = ["sentry-panic"]
process = ["libc"]
region = ["dep:lgalloc", "dep:bytemuck"]
tracing = [
    "anyhow",
    "dep:tracing",
    "tracing-subscriber",
    "tracing-subscriber/ansi",
    "tracing-opentelemetry",
    "http",
    "hyper-rustls",
    "hyper-util",
    "metrics",
    "opentelemetry",
    "opentelemetry-otlp",
    "opentelemetry_sdk",
    "rustls",
    "tonic",
    "yansi",
]
# Sentry error reporting. Split from `tracing` so FIPS builds can exclude it.
sentry = ["dep:sentry", "dep:sentry-tracing"]
tokio-console = ["console-subscriber", "tokio", "tokio/tracing", "network"]
cli = ["clap"]
stack = ["stacker"]
test = ["anyhow", "ctor", "tracing-subscriber", "assert"]
metrics = ["prometheus", "assert"]
id_gen = ["hibitset", "rand", "uuid"]
capture = ["tracing-capture"]
assert-no-tracing = []
assert = ["assert-no-tracing", "ctor", "tracing"]
proptest = ["dep:proptest", "proptest-derive"]
overflowing = ["assert"]
# `crypto` enables the aws-lc-rs crypto backend in standard (non-FIPS) mode.
# `fips` is a marker feature for FIPS 140-3 builds. It does NOT activate
# aws-lc-rs/fips at the Cargo level to avoid duplicate symbol conflicts with
# `crypto` under --all-features. Actual FIPS builds must pass
# --cfg=aws_lc_fips or use the dedicated FIPS build profile (SEC-260).
crypto = ["aws-lc-rs", "rustls", "ctor"]
fips = ["crypto"]

[[test]]
name = "future"
required-features = ["async", "panic"]

[[test]]
name = "panic"
required-features = ["panic"]

[[test]]
name = "task"
required-features = ["async"]

[[bench]]
name = "id_gen"
harness = false

[[bench]]
name = "bytes"
harness = false
required-features = ["bytes", "region", "tracing"]

[package.metadata.cargo-udeps.ignore]
# Only used in doc-tests.
development = ["tokio-test"]
