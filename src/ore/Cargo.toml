[package]
name = "mz-ore"
description = "Internal utility libraries for Materialize."
version = "0.1.0"
license = "Apache-2.0"
edition.workspace = true
rust-version.workspace = true
authors = ["Materialize, Inc."]

[lints]
workspace = true

[dependencies]
anyhow = { version = "1.0.102", optional = true }
# NB: ore is meant to be an extension of the Rust stdlib. To keep it
# lightweight, dependencies on external crates should be avoided if possible. If
# an external crate is required, it must be optional and feature-gated.
#
# Exceptions: `either` (zero deps, quasi-stdlib) and `zeroize` (zero runtime
# deps, security-critical — must be available unconditionally so that
# `ore::secure` types are always accessible without feature-flag opt-in).
# aws-lc-rs is the FIPS 140-3 validated crypto backend. When the `fips` feature
# is enabled, it links against aws-lc-fips-sys (the validated module).
aws-lc-rs = { version = "1", optional = true }
async-trait = { version = "0.1.89", optional = true }
bytemuck = { version = "1.23.1", optional = true }
bytes = { version = "1.11.1", optional = true }
chrono = { version = "0.4.39", default-features = false, features = ["std"], optional = true }
clap = { version = "4.5.23", features = ["env", "string"], optional = true }
columnation = { version = "0.1.2", optional = true }
columnar = { version = "0.12.0", optional = true }
compact_bytes = { version = "0.2.1", optional = true }
ctor = { version = "0.6.3", optional = true }
differential-dataflow = { version = "0.21.1", optional = true }
derivative = { version = "2.2.0" }
either = "1.15.0"
futures = { version = "0.3.32", optional = true }
hibitset = { version = "0.6.4", optional = true }
itertools = "0.14.0"
lgalloc = { version = "0.6", optional = true }
libc = { version = "0.2.183", optional = true }
mz-ore-proc = { path = "../ore-proc", default-features = false }
num = "0.4.3"
num-traits = { version = "0.2", optional = true }
# The vendored feature is transitively depended upon by tokio-openssl.
openssl = { version = "0.10.76", features = ["vendored"], optional = true }
parquet = { version = "57", optional = true, default-features = false }
paste = "1.0.11"
pin-project = "1.1.11"
prometheus = { version = "0.14.0", default-features = false, optional = true }
proptest = { version = "1.10.0", default-features = false, features = ["std"], optional = true }
proptest-derive = { version = "0.8.0", optional = true }
rand = { version = "0.9.2", optional = true }
smallvec = { version = "1.15.1", optional = true }
stacker = { version = "0.1.23", optional = true }
sentry = { version = "0.46.1", optional = true, default-features = false, features = ["backtrace", "contexts", "debug-images", "transport"] }
sentry-panic = { version = "0.46.1", optional = true }
serde = { version = "1.0.219", features = ["derive"] }
tokio = { version = "1.49.0", features = [
    "fs",
    "io-util",
    "net",
    "rt-multi-thread",
    "sync",
    "time",
], optional = true }
tokio-openssl = { version = "0.6.5", optional = true }
thiserror = "2.0.18"
tracing-capture = { version = "0.1.0", optional = true }
# TODO(guswynn): determine, when, if ever, we can remove `tracing-log`
# The `tracing-log` feature here is load-bearing: While our busiest-logging dependency (`rdkafka`) is now hooked-up
# to use `tracing`, we cannot remove this feature until we guarantee no dependencies log using the `log` crate, for
# log lines we care about.
# Note that this feature is distinct from `tracing`'s `log` feature, which has `tracing` macros emit `log` records if
# there is no global `tracing` subscriber.
tracing-subscriber = { version = "0.3.23", default-features = false, features = [
    "env-filter",
    "fmt",
    "json",
    "tracing-log",
], optional = true }
uuid = { version = "1.19.0", optional = true, features = ["v4", "v7"] }
url = { version = "2.5.8", features = ["serde"] }
zeroize = { version = "1.8.2", features = ["derive", "serde"] }

# For the `tracing` feature
http = { version = "1.4.0", optional = true }
tracing = { version = "0.1.44", optional = true }
tracing-opentelemetry = { version = "0.32.1", optional = true }
tonic = { version = "0.14.2", features = ["transport"], optional = true }
tokio-native-tls = { version = "0.3.1", optional = true }
native-tls = { version = "0.2.14", features = ["alpn"], optional = true }
hyper-tls = { version = "0.6.0", optional = true }
hyper-util = { version = "0.1.20", optional = true }
opentelemetry = { version = "0.31.0", features = ["trace"], optional = true }
opentelemetry-otlp = { version = "0.31.1", features = ["grpc-tonic"], optional = true }
opentelemetry_sdk = { version = "0.31.0", features = ["rt-tokio", "experimental_trace_batch_span_processor_with_async_runtime"], optional = true }
console-subscriber = { version = "0.5.0", optional = true }
sentry-tracing = { version = "0.46.1", optional = true }
turmoil = { version = "0.7.1", optional = true }
yansi = { version = "1.0.1", optional = true }

[dev-dependencies]
anyhow = { version = "1.0.102" }
criterion = { version = "0.8.2", features = ["async_tokio"] }
mz-ore = { path = "../ore", features = ["id_gen", "chrono"] }
proptest = { version = "1.10.0", default-features = false, features = ["std"] }
scopeguard = "1.2.0"
serde_json = "1.0.149"
tokio = { version = "1.49.0", features = ["macros", "rt-multi-thread"] }
tokio-test = "0.4.5"
tracing-subscriber = "0.3.23"

[features]
default = ["tokio-console"]
async = [
    "async-trait",
    "futures",
    "metrics",
    "openssl",
    "tokio/tracing",
    "tokio-openssl",
    "tokio",
    "dep:tracing",
]
bytes = ["dep:bytes", "compact_bytes", "smallvec", "smallvec/const_generics", "region", "tracing"]
network = ["async", "dep:bytes", "smallvec", "dep:tracing"]
panic = ["sentry-panic"]
process = ["libc"]
region = ["dep:lgalloc", "dep:bytemuck"]
tracing = [
    "anyhow",
    "dep:tracing",
    "tracing-subscriber",
    "tracing-subscriber/ansi",
    "tracing-opentelemetry",
    "tokio-native-tls",
    "native-tls",
    "http",
    "hyper-tls",
    "hyper-util",
    "metrics",
    "opentelemetry",
    "opentelemetry-otlp",
    "opentelemetry_sdk",
    "tonic",
    "yansi",
]
# Sentry error reporting. Split from `tracing` so FIPS builds can exclude it.
sentry = ["dep:sentry", "dep:sentry-tracing"]
tokio-console = ["console-subscriber", "tokio", "tokio/tracing", "network"]
cli = ["clap"]
stack = ["stacker"]
test = ["anyhow", "ctor", "tracing-subscriber", "assert"]
metrics = ["prometheus", "assert"]
id_gen = ["hibitset", "rand", "uuid"]
capture = ["tracing-capture"]
assert-no-tracing = []
assert = ["assert-no-tracing", "ctor", "tracing"]
proptest = ["dep:proptest", "proptest-derive"]
overflowing = ["assert"]
# FIPS 140-3 compliance: use aws-lc-rs as the crypto backend.
# `crypto` enables aws-lc-rs in standard (non-FIPS) mode.
# `fips` enables aws-lc-rs with FIPS 140-3 validated module.
crypto = ["aws-lc-rs"]
fips = ["crypto", "aws-lc-rs/fips"]

[[test]]
name = "future"
required-features = ["async", "panic"]

[[test]]
name = "panic"
required-features = ["panic"]

[[test]]
name = "task"
required-features = ["async"]

[[bench]]
name = "id_gen"
harness = false

[[bench]]
name = "bytes"
harness = false
required-features = ["bytes", "region", "tracing"]

[package.metadata.cargo-udeps.ignore]
# Only used in doc-tests.
development = ["tokio-test"]
