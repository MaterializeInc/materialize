[package]
name = "persistcli"
description = "Persist command-line utilities"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false
autobins = false
autoexamples = false
autobenches = false

[lints]
workspace = true

[[bin]]
name = "persistcli"
bench = false

[dependencies]
anyhow.workspace = true
arrow.workspace = true
async-trait.workspace = true
axum = "0.8.8"
bytes = { workspace = true, features = ["serde"] }
clap = { workspace = true, features = ["env"] }
differential-dataflow.workspace = true
futures.workspace = true
humantime.workspace = true
mz-dyncfg = { path = "../dyncfg" }
mz-http-util = { path = "../http-util" }
mz-orchestrator-tracing = { path = "../orchestrator-tracing" }
mz-ore = { path = "../ore", features = ["bytes", "network", "panic", "tracing", "test"] }
mz-persist = { path = "../persist" }
mz-persist-client = { path = "../persist-client" }
mz-persist-types = { path = "../persist-types" }
mz-repr = { path = "../repr" }
mz-timestamp-oracle = { path = "../timestamp-oracle" }
mz-txn-wal = { path = "../txn-wal" }
num_cpus.workspace = true
num_enum = "0.7.6"
prometheus.workspace = true
serde = { workspace = true, features = ["rc"] }
serde_json.workspace = true
timely.workspace = true
tokio.workspace = true
tracing.workspace = true
url.workspace = true
uuid = { workspace = true, features = ["v4"] }

[features]
default = ["tokio-console"]
tokio-console = ["mz-ore/tokio-console"]
