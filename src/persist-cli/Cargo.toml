[package]
name = "persistcli"
description = "Persist command-line utilities"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false
autobins = false
autoexamples = false
autobenches = false

[lints]
workspace = true

[[bin]]
name = "persistcli"
bench = false

[dependencies]
anyhow.workspace = true
arrow = { version = "57", default-features = false }
async-trait.workspace = true
axum = "0.8.8"
bytes = { version = "1.11.1", features = ["serde"] }
clap = { version = "4.5.23", features = ["derive", "env"] }
differential-dataflow.workspace = true
futures.workspace = true
humantime = "2.3.0"
mz-dyncfg = { path = "../dyncfg" }
mz-http-util = { path = "../http-util" }
mz-orchestrator-tracing = { path = "../orchestrator-tracing" }
mz-ore = { path = "../ore", features = ["bytes", "network", "panic", "tracing", "test"] }
mz-persist = { path = "../persist" }
mz-persist-client = { path = "../persist-client" }
mz-persist-types = { path = "../persist-types" }
mz-repr = { path = "../repr" }
mz-timestamp-oracle = { path = "../timestamp-oracle" }
mz-txn-wal = { path = "../txn-wal" }
num_cpus.workspace = true
num_enum = "0.7.6"
prometheus.workspace = true
serde = { workspace = true, features = ["rc"] }
serde_json = "1.0.149"
timely.workspace = true
tokio = { version = "1.49.0", default-features = false, features = ["macros", "sync", "rt", "rt-multi-thread", "time"] }
tracing.workspace = true
url = "2.5.8"
uuid = { version = "1.19.0", features = ["v4"] }

[features]
default = ["tokio-console"]
tokio-console = ["mz-ore/tokio-console"]
