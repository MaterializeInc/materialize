# Open-loop saturation benchmark.
# Run with --open-loop to skip inter-op sleep. Clients fire as fast as
# possible; backpressure comes from mpsc channel capacity.
#
# Usage:
#   cargo run --release -p mz-persist-shared-log --example specsheet -- \
#       --workload examples/scenarios/open-loop-persist.yaml --open-loop
#
# Sweep writers_per_shard to find saturation:
#   for w in 1 2 4 8; do
#     cargo run --release -p mz-persist-shared-log --example specsheet -- \
#       --workload examples/scenarios/open-loop-persist.yaml \
#       --open-loop --writers-per-shard $w --json
#   done

num_shards: 1000
writers_per_shard: 1

cas_pct: 90
scan_pct: 8
head_pct: 1
truncate_pct: 1

value_size: 1024
max_entries: 10000
blob_latency: "s3-express"

# write_rate_per_second is ignored in open-loop mode, but must be set
# for closed-loop fallback / validation.
write_rate_per_second: 1.0

duration: 30
warmup: 5
