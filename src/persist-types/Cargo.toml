[package]
name = "mz-persist-types"
description = "Types for the persist crate."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

# NB: This is meant to be a strong, independent abstraction boundary. Please
# don't leak in dependencies on other Materialize packages.
[dependencies]
anyhow = "1.0.102"
arrow = { version = "57", default-features = false }
bytes = { version = "1.11.1", features = ["serde"] }
chrono = { version = "0.4.39", default-features = false, features = ["std"] }
hex = "0.4.3"
itertools.workspace = true
mz-ore = { path = "../ore", features = ["metrics", "test"], default-features = false }
mz-proto = { path = "../proto", default-features = false }
parquet = { version = "57", default-features = false, features = ["arrow", "flate2", "flate2-zlib-rs"] }
proptest = { version = "1.10.0", default-features = false, features = ["std"] }
proptest-derive = { version = "0.8.0", features = ["boxed_union"] }
prost = { version = "0.14.3", features = ["no-recursion-limit"] }
serde.workspace = true
serde_json = { version = "1.0.149" }
timely.workspace = true
tracing = "0.1.44"
uuid = { version = "1.19.0", features = ["v4"] }

[dev-dependencies]
proptest = { version = "1.10.0", default-features = false, features = ["std"] }

[build-dependencies]
prost-build.workspace = true
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }

[features]
default = ["mz-build-tools/default", "mz-proto/default"]
