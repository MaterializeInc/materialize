[package]
name = "mz-persist"
description = "Abstraction for Materialize dataplane persistence."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false
# Since we intentionally will only ever have one bench target, auto discovery of
# benches is unnecessary. Turning it off allows us to have helper code in
# src/benches.
autobenches = false

[lints]
workspace = true

# Disable the ability to use benches in the library because the bench harness
# isn't overridable there and the stock one prevents using Criterion specific
# flags, e.g. `cargo bench -p persist -- --baseline=foo`.
[lib]
bench = false

# NB: This is meant to be a strong, independent abstraction boundary. Please
# don't leak in dependencies on other Materialize packages.
[dependencies]
anyhow.workspace = true
arrow = { workspace = true, default-features = false }
async-trait.workspace = true
async-stream.workspace = true
aws-config = { workspace = true, default-features = false }
aws-credential-types = { workspace = true, features = ["hardcoded-credentials"] }
aws-sdk-s3 = { workspace = true, features = ["rt-tokio"], default-features = false }
aws-types.workspace = true
azure_identity = { workspace = true, features = ["enable_reqwest_rustls_no_provider", "old_azure_cli"], default-features = false }
azure_storage = { workspace = true, features = ["enable_reqwest_rustls_no_provider", "hmac_rust"], default-features = false }
azure_storage_blobs = { workspace = true, features = ["enable_reqwest_rustls_no_provider", "hmac_rust"], default-features = false }
azure_core = { workspace = true, features = ["enable_reqwest_rustls_no_provider", "hmac_rust"], default-features = false }
base64.workspace = true
bytes.workspace = true
deadpool-postgres.workspace = true
differential-dataflow.workspace = true
fail = { workspace = true, features = ["failpoints"] }
futures-util.workspace = true
mz-foundationdb = { path = "../foundationdb", default-features = false, optional = true }
itertools.workspace = true
md-5.workspace = true
mz-aws-util = { path = "../aws-util", features = ["s3"] }
mz-dyncfg = { path = "../dyncfg" }
mz-ore = { path = "../ore", default-features = false, features = ["metrics", "async", "bytes", "region", "parquet"] }
mz-persist-types = { path = "../persist-types" }
mz-postgres-client = { path = "../postgres-client" }
mz-proto = { path = "../proto" }
parquet = { workspace = true, features = ["arrow", "brotli", "flate2", "snap", "lz4", "zstd"], default-features = false }
postgres-protocol.workspace = true
prometheus = { workspace = true, default-features = false }
proptest = { workspace = true, features = ["std"], default-features = false }
proptest-derive = { workspace = true, features = ["boxed_union"] }
prost = { workspace = true, features = ["no-recursion-limit"] }
rand = { workspace = true, features = ["small_rng"] }
reqwest = { workspace = true, features = ["blocking", "json", "rustls-tls-webpki-roots-no-provider", "charset", "http2"], default-features = false }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, optional = true }
timely.workspace = true
tokio = { workspace = true, features = ["fs", "macros", "sync", "rt", "rt-multi-thread"] }
tokio-postgres.workspace = true
tracing.workspace = true
turmoil = { workspace = true, optional = true }
url.workspace = true
urlencoding.workspace = true
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
mz-ore = { path = "../ore", default-features = false, features = ["crypto", "test"] }
serde_json.workspace = true
tempfile.workspace = true

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true

[features]
default = ["mz-build-tools/default"]
foundationdb = ["mz-foundationdb"]
turmoil = ["dep:serde_json", "dep:turmoil"]

[package.metadata.cargo-udeps.ignore]
