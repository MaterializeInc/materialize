[package]
name = "mz-pgwire-common"
description = "Common logic for the PostgreSQL wire protocol."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
async-trait = "0.1.89"
byteorder = "1.4.3"
bytes = "1.11.1"
bytesize = "2.1.0"
derivative = "2.2.0"
mz-ore = { path = "../ore", features = ["network"], default-features = false }
mz-server-core = { path = "../server-core", default-features = false }
tokio = "1.49.0"
tokio-rustls = "0.26"
tokio-postgres = { version = "0.7.15" }
tracing = "0.1.44"

[features]
default = []
