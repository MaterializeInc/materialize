[package]
name = "mz-pgwire"
description = "A server for the PostgreSQL wire protocol."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
base64.workspace = true
byteorder = "1.4.3"
bytes = "1.11.1"
bytesize.workspace = true
csv-core = "0.1.13"
enum-kinds.workspace = true
futures.workspace = true
itertools.workspace = true
mz-adapter = { path = "../adapter" }
mz-adapter-types = { path = "../adapter-types" }
mz-auth = { path = "../auth", default-features = false }
mz-authenticator = { path = "../authenticator" }
mz-frontegg-auth = { path = "../frontegg-auth" }
mz-ore = { path = "../ore", features = ["tracing"] }
mz-pgcopy = { path = "../pgcopy" }
mz-pgrepr = { path = "../pgrepr" }
mz-pgwire-common = { path = "../pgwire-common" }
mz-repr = { path = "../repr" }
mz-server-core = { path = "../server-core" }
mz-sql = { path = "../sql" }
openssl.workspace = true
postgres = { version = "0.19.12" }
tokio = "1.49.0"
tokio-stream = "0.1.18"
tokio-openssl = "0.6.5"
tokio-util = { version = "0.7.18", features = ["codec"] }
tokio-metrics.workspace = true
tracing.workspace = true
uuid = { version = "1.19.0", features = ["v4"] }

[features]
default = []
