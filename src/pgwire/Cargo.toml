[package]
name = "mz-pgwire"
description = "A server for the PostgreSQL wire protocol."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow = "1.0.102"
async-trait = "0.1.89"
base64 = "0.22.1"
byteorder = "1.4.3"
bytes = "1.11.1"
bytesize = "2.1.0"
csv-core = "0.1.13"
enum-kinds = "0.5.1"
futures = "0.3.32"
itertools = "0.14.0"
mz-adapter = { path = "../adapter", default-features = false }
mz-adapter-types = { path = "../adapter-types" }
mz-auth = { path = "../auth", default-features = false }
mz-authenticator = { path = "../authenticator" }
mz-frontegg-auth = { path = "../frontegg-auth" }
mz-ore = { path = "../ore", features = ["tracing"] }
mz-pgcopy = { path = "../pgcopy" }
mz-pgrepr = { path = "../pgrepr" }
mz-pgwire-common = { path = "../pgwire-common" }
mz-repr = { path = "../repr" }
mz-server-core = { path = "../server-core" }
mz-sql = { path = "../sql" }
openssl = { version = "0.10.76", features = ["vendored"] }
postgres = { version = "0.19.12" }
tokio = "1.49.0"
tokio-stream = "0.1.18"
tokio-openssl = "0.6.5"
tokio-util = { version = "0.7.18", features = ["codec"] }
tokio-metrics = "0.4.9"
tracing = "0.1.44"
uuid = { version = "1.19.0", features = ["v4"] }

[features]
default = []
