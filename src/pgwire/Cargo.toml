[package]
name = "mz-pgwire"
description = "A server for the PostgreSQL wire protocol."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
base64.workspace = true
byteorder.workspace = true
bytes.workspace = true
bytesize.workspace = true
csv-core.workspace = true
enum-kinds.workspace = true
futures.workspace = true
itertools.workspace = true
mz-adapter = { path = "../adapter", default-features = false }
mz-adapter-types = { path = "../adapter-types" }
mz-auth = { path = "../auth", default-features = false }
mz-authenticator = { path = "../authenticator" }
mz-frontegg-auth = { path = "../frontegg-auth" }
mz-ore = { path = "../ore", features = ["tracing"] }
mz-pgcopy = { path = "../pgcopy" }
mz-pgrepr = { path = "../pgrepr" }
mz-pgwire-common = { path = "../pgwire-common" }
mz-repr = { path = "../repr" }
mz-server-core = { path = "../server-core" }
mz-sql = { path = "../sql" }
postgres.workspace = true
tokio.workspace = true
tokio-stream.workspace = true
tokio-util = { workspace = true, features = ["codec"] }
tokio-metrics.workspace = true
tracing.workspace = true
uuid = { workspace = true, features = ["v4"] }

[features]
default = []
