[package]
name = "mz-postgres-util"
description = "PostgreSQL utility library."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
itertools.workspace = true
mz-cloud-resources = { path = "../cloud-resources", optional = true }
mz-ore = { path = "../ore", features = ["async"], optional = true }
mz-proto = { path = "../proto", optional = true }
mz-repr = { path = "../repr", optional = true }
mz-sql-parser = { path = "../sql-parser" }
mz-ssh-util = { path = "../ssh-util", optional = true }
mz-tls-util = { path = "../tls-util", default-features = false }
openssh = { workspace = true, features = ["native-mux",], optional = true, default-features = false }
postgres_array = { workspace = true, optional = true }
proptest = { workspace = true, features = ["std",], optional = true, default-features = false }
proptest-derive = { workspace = true, features = ["boxed_union"] }
prost = { workspace = true, features = ["no-recursion-limit",], optional = true }
serde = { workspace = true, features = ["derive"], optional = true }
thiserror.workspace = true
tokio = { workspace = true, features = ["fs", "rt", "sync"] }
tokio-postgres.workspace = true
tracing.workspace = true

[features]
default = ["mz-build-tools/default", "replication", "schemas", "tunnel"]
replication = ["tunnel"]
schemas = ["prost", "serde", "proptest", "mz-proto", "tunnel"]
tunnel = [
    "mz-cloud-resources",
    "serde",
    "mz-ssh-util",
    "mz-repr",
    "openssh",
    "mz-ore",
]

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true
