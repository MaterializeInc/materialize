[package]
name = "mz-proto"
description = "Protocol buffer libraries for Materialize."
version = "0.0.0"
license = "Apache-2.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
chrono = { workspace = true, optional = true }
chrono-tz = { workspace = true, optional = true }
globset.workspace = true
http.workspace = true
mz-ore = { path = "../ore", default-features = false, features = ["proptest", "test", "overflowing"] }
num.workspace = true
proptest.workspace = true
proptest-derive.workspace = true
prost.workspace = true
regex.workspace = true
serde = { workspace = true, features = ["rc"] }
serde_json = { workspace = true, features = ["arbitrary_precision"] }
url = { workspace = true, features = ["serde"] }
uuid.workspace = true

[features]
default = ["mz-build-tools/default"]
chrono = ["dep:chrono", "dep:chrono-tz"]

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true
