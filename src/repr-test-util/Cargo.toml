version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
chrono = { version = "0.4.39", default-features = false, features = ["serde", "std"] }
itertools.workspace = true
mz-lowertest = { path = "../lowertest" }
mz-ore = { path = "../ore" }
mz-repr = { path = "../repr" }
