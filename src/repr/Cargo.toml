[package]
name = "mz-repr"
description = "The core data types for Materialize."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[[bench]]
name = "row"
harness = false

[[bench]]
name = "strconv"
harness = false

[[bench]]
name = "packed"
harness = false

[[bench]]
name = "data_types"
harness = false

[dependencies]
anyhow.workspace = true
arrow.workspace = true
bitflags.workspace = true
bytemuck.workspace = true
bytes.workspace = true
cfg-if.workspace = true
columnar.workspace = true
columnation.workspace = true
chrono.workspace = true
compact_bytes.workspace = true
dec = { workspace = true, features = ["serde"] }
differential-dataflow.workspace = true
enum-kinds.workspace = true
hex.workspace = true
itertools.workspace = true
mz-lowertest = { path = "../lowertest", default-features = false }
mz-ore = { path = "../ore", features = [
    "bytes",
    "id_gen",
    "smallvec",
    "region",
    "stack",
    "test",
    "tracing",
], default-features = false }
mz-persist-types = { path = "../persist-types", default-features = false }
mz-pgtz = { path = "../pgtz", default-features = false }
mz-proto = { path = "../proto", features = ["chrono"], default-features = false }
mz-sql-parser = { path = "../sql-parser", default-features = false }
mz-timely-util = { path = "../timely-util", default-features = false }
num-traits.workspace = true
num_enum.workspace = true
ordered-float.workspace = true
postgres-protocol.workspace = true
prost.workspace = true
regex.workspace = true
ryu.workspace = true
serde.workspace = true
serde_json = { workspace = true, features = ["arbitrary_precision", "preserve_order"] }
smallvec = { workspace = true, features = ["serde", "union"] }
static_assertions.workspace = true
strsim.workspace = true
timely.workspace = true
tokio-postgres.workspace = true
tracing-core.workspace = true
url = { workspace = true, features = ["serde"] }
uuid = { workspace = true, features = ["serde"] }
proptest.workspace = true
proptest-derive.workspace = true
thiserror.workspace = true
tracing.workspace = true

# for the tracing feature
tracing-subscriber = { workspace = true, optional = true }

[dev-dependencies]
bincode.workspace = true
criterion.workspace = true
insta.workspace = true
mz-persist = { path = "../persist" }
rand.workspace = true

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true

[features]
default = [
    "mz-build-tools/default",
    "mz-persist-types/default",
    "mz-pgtz/default",
    "mz-proto/default",
    ]
tracing = ["tracing-subscriber"]
