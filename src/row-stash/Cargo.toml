[package]
name = "mz-row-stash"
description = "An abstraction over Persist that allows staging Rows non-durably."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow = "1.0.97"
arrow = { version = "53.3.0", default-features = false }
bytes = "1.10.1"
differential-dataflow = "0.14.2"
futures = "0.3.31"
mz-ore = { path = "../ore", features = ["assert", "tracing"] }
mz-persist-client = { path = "../persist-client" }
mz-persist-types = { path = "../persist-types", default-features = false }
mz-repr = { path = "../repr" }
sha2 = "0.10.8"
timely = "0.20.0"
tracing = "0.1.37"
uuid = "1.16.0"
