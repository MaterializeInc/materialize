[package]
name = "mz-s3-datagen"
description = "Generate S3 test data."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
aws-config = { version = "1.8.15", default-features = false }
aws-sdk-s3 = { version = "1.94.0", default-features = false, features = ["rt-tokio"] }
bytefmt = "0.1.7"
clap.workspace = true
futures.workspace = true
indicatif = "0.18.4"
mz-aws-util = { path = "../aws-util", features = ["s3"] }
mz-ore = { path = "../ore", features = ["cli"] }
tokio = { version = "1.49.0", features = ["macros", "net", "rt", "rt-multi-thread", "time"] }
tracing.workspace = true
tracing-subscriber = { version = "0.3.23", default-features = false, features = ["env-filter", "fmt"] }

[features]
default = []
