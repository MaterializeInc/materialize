[package]
name = "mz-secrets"
description = "Secrets Controller"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow = "1.0.102"
async-trait = "0.1.89"
mz-repr = { path = "../repr", default-features = false }
