[package]
name = "mz-sql-server-util"
description = "SQL Server utility library."
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[[example]]
name = "cdc"

[dependencies]
anyhow = "1.0.102"
async-stream = "0.3.3"
base64 = "0.22.1"
chrono = { version = "0.4.39", default-features = false, features = ["std"] }
columnation = "0.1.2"
dec = "0.4.8"
derivative = "2.2.0"
futures = "0.3.32"
hex = "0.4.3"
itertools.workspace = true
mz-ore = { path = "../ore", features = ["async"] }
mz-proto = { path = "../proto" }
mz-repr = { path = "../repr" }
mz-ssh-util = { path = "../ssh-util" }
mz-cloud-resources = { path = "../cloud-resources" }
ordered-float = { version = "5.1.0", features = ["serde"] }
proptest = { version = "1.10.0", default-features = false, features = ["std"] }
proptest-derive = { version = "0.8.0", features = ["boxed_union"] }
prost = { version = "0.14.3", features = ["no-recursion-limit"] }
serde.workspace = true
smallvec = { version = "1.15.1", features = ["union"] }
static_assertions.workspace = true
thiserror.workspace = true
tiberius = { version = "0.12", features = ["chrono", "sql-browser-tokio", "tds73", "native-tls"], default-features = false }
timely.workspace = true
tokio = { version = "1.49.0", features = ["net"] }
tokio-stream = "0.1.18"
tokio-util = { version = "0.7.18", features = ["compat"] }
tracing = "0.1.44"
uuid = "1.19.0"

[dev-dependencies]
tracing-subscriber = "0.3.23"

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true

[features]
default = []
