[package]
name = "mz-sql-server-util"
description = "SQL Server utility library."
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[[example]]
name = "cdc"

[dependencies]
anyhow.workspace = true
async-stream.workspace = true
base64.workspace = true
chrono.workspace = true
columnation.workspace = true
dec.workspace = true
derivative.workspace = true
futures.workspace = true
hex.workspace = true
itertools.workspace = true
mz-ore = { path = "../ore", features = ["async"] }
mz-proto = { path = "../proto" }
mz-repr = { path = "../repr" }
mz-ssh-util = { path = "../ssh-util" }
mz-cloud-resources = { path = "../cloud-resources" }
ordered-float.workspace = true
proptest.workspace = true
proptest-derive.workspace = true
prost.workspace = true
serde.workspace = true
smallvec = { workspace = true, features = ["union"] }
static_assertions.workspace = true
thiserror.workspace = true
tiberius = { version = "0.12", features = ["chrono", "sql-browser-tokio", "tds73", "native-tls"], default-features = false }
timely.workspace = true
tokio.workspace = true
tokio-stream.workspace = true
tokio-util = { workspace = true, features = ["compat"] }
tracing.workspace = true
uuid.workspace = true

[dev-dependencies]
tracing-subscriber.workspace = true

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true

[features]
default = []
