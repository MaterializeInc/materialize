[package]
name = "mz-sqllogictest"
description = "A driver for sqllogictest, a SQL correctness testing framework."
version = "0.0.1"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
bytes.workspace = true
chrono = { workspace = true, features = ["std"], default-features = false }
clap = { workspace = true, features = ["derive"] }
dec.workspace = true
fallible-iterator.workspace = true
futures.workspace = true
itertools.workspace = true
junit-report.workspace = true
maplit.workspace = true
md-5.workspace = true
mz-adapter-types = { path = "../adapter-types" }
mz-authenticator = { path = "../authenticator", default-features = false }
mz-build-info = { path = "../build-info" }
mz-catalog = { path = "../catalog" }
mz-controller = { path = "../controller" }
mz-dyncfgs = { path = "../dyncfgs" }
mz-environmentd = { path = "../environmentd", default-features = false }
mz-license-keys = { path = "../license-keys" }
mz-ore = { path = "../ore", features = ["async", "crypto", "panic", "tracing"] }
mz-orchestrator = { path = "../orchestrator" }
mz-orchestrator-process = { path = "../orchestrator-process" }
mz-orchestrator-tracing = { path = "../orchestrator-tracing" }
mz-persist-client = { path = "../persist-client" }
mz-pgrepr = { path = "../pgrepr" }
mz-repr = { path = "../repr" }
mz-secrets = { path = "../secrets" }
mz-server-core = { path = "../server-core" }
mz-service = { path = "../service" }
mz-sql = { path = "../sql" }
mz-sql-parser = { path = "../sql-parser" }
mz-storage-types = { path = "../storage-types" }
mz-tracing = { path = "../tracing" }
postgres-protocol.workspace = true
regex.workspace = true
reqwest = { workspace = true, features = ["json", "rustls-tls-webpki-roots-no-provider"], default-features = false }
shell-words.workspace = true
serde_json.workspace = true
tempfile.workspace = true
time.workspace = true
tracing.workspace = true
tokio.workspace = true
tokio-postgres = { workspace = true, features = ["with-chrono-0_4", "with-uuid-1", "with-serde_json-1",] }
tokio-stream = { workspace = true, features = ["net"] }
tower-http = { workspace = true, features = ["cors"] }
uuid.workspace = true
walkdir.workspace = true

[features]
default = []
