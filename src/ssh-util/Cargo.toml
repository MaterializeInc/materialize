[package]
name = "mz-ssh-util"
description = "SSH utility library."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
mz-ore = { path = "../ore", features = ["test"] }
openssh = { version = "0.11.6", default-features = false, features = ["native-mux"] }
openssh-mux-client = "0.17.9"
openssl.workspace = true
rand = "0.9.2"
futures.workspace = true
itertools.workspace = true
scopeguard.workspace = true
serde.workspace = true
serde_json = { version = "1.0.149" }
ssh-key = { version = "0.6.7" }
tempfile = "3.23.0"
thiserror.workspace = true
tokio = "1.49.0"
tokio-stream = "0.1.18"
tracing.workspace = true
zeroize = { version = "1.8.2", features = ["serde"] }

[features]
default = []
