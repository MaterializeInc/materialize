[package]
name = "mz-ssh-util"
description = "SSH utility library."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow = { version = "1.0.102" }
mz-ore = { path = "../ore", features = ["test"] }
openssh = { version = "0.11.6", default-features = false, features = ["native-mux"] }
openssh-mux-client = "0.17.9"
aws-lc-rs = "1"
rand = "0.9.2"
futures = "0.3.32"
itertools = "0.14.0"
scopeguard = "1.2.0"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = { version = "1.0.149" }
ssh-key = { version = "0.6.7" }
tempfile = "3.23.0"
thiserror = { version = "2.0.18" }
tokio = "1.49.0"
tokio-stream = "0.1.18"
tracing = "0.1.44"
zeroize = { version = "1.8.2", features = ["serde"] }

[features]
default = []
