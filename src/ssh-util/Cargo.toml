[package]
name = "mz-ssh-util"
description = "SSH utility library."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow = { version = "1.0.102" }
mz-ore = { path = "../ore", features = ["test"] }
openssh = { version = "0.11.6", default-features = false, features = ["native-mux"] }
openssh-mux-client = "0.17.9"
openssl = { version = "0.10.76", features = ["vendored"] }
rand = "0.9.2"
futures = "0.3.32"
itertools.workspace = true
scopeguard = "1.2.0"
serde.workspace = true
serde_json = { version = "1.0.149" }
ssh-key = { version = "0.6.7" }
tempfile = "3.23.0"
thiserror.workspace = true
tokio = "1.49.0"
tokio-stream = "0.1.18"
tracing = "0.1.44"
zeroize = { version = "1.8.2", features = ["serde"] }

[features]
default = []
