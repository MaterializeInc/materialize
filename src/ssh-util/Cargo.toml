[package]
name = "mz-ssh-util"
description = "SSH utility library."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
mz-ore = { path = "../ore", features = ["test"] }
openssh = { version = "0.11.6", default-features = false, features = ["native-mux"] }
openssh-mux-client = "0.17.9"
openssl.workspace = true
rand.workspace = true
futures.workspace = true
itertools.workspace = true
scopeguard.workspace = true
serde.workspace = true
serde_json.workspace = true
ssh-key = { version = "0.6.7" }
tempfile.workspace = true
thiserror.workspace = true
tokio.workspace = true
tokio-stream.workspace = true
tracing.workspace = true
zeroize = { version = "1.8.2", features = ["serde"] }

[features]
default = []
