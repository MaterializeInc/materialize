[package]
name = "mz-storage-controller"
description = "Implementation of the Storage controller API."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
bytes.workspace = true
chrono.workspace = true
derivative.workspace = true
differential-dataflow.workspace = true
futures.workspace = true
itertools.workspace = true
mz-build-info = { path = "../build-info" }
mz-cluster-client = { path = "../cluster-client" }
mz-controller-types = { path = "../controller-types" }
mz-dyncfg = { path = "../dyncfg" }
mz-dyncfgs = { path = "../dyncfgs" }
mz-ore = { path = "../ore", features = ["async", "chrono", "tracing"] }
mz-persist-client = { path = "../persist-client" }
mz-persist-types = { path = "../persist-types" }
mz-proto = { path = "../proto" }
mz-repr = { path = "../repr" }
mz-service = { path = "../service" }
mz-storage-client = { path = "../storage-client" }
mz-storage-types = { path = "../storage-types" }
mz-timely-util = { path = "../timely-util" }
mz-tls-util = { path = "../tls-util" }
mz-txn-wal = { path = "../txn-wal" }
proptest.workspace = true
prost.workspace = true
serde.workspace = true
serde_json.workspace = true
timely.workspace = true
tokio = { version = "1.49.0", features = ["fs", "rt", "sync", "test-util", "time"] }
tokio-postgres = { version = "0.7.15", features = ["serde"] }
tokio-stream = "0.1.18"
tracing.workspace = true
uuid.workspace = true

[features]
default = []
