[package]
name = "mz-storage-operators"
description = "Shared Storage dataflow operators"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
arrow.workspace = true
arrow-ipc.workspace = true
async-compression.workspace = true
async-stream.workspace = true
aws-types.workspace = true
aws-smithy-types.workspace = true
aws-sdk-s3.workspace = true
bytes.workspace = true
bytesize.workspace = true
csv-async.workspace = true
derivative.workspace = true
differential-dataflow.workspace = true
futures.workspace = true
glob.workspace = true
http.workspace = true
itertools.workspace = true
mz-aws-util = { path = "../aws-util" }
mz-arrow-util = { path = "../arrow-util" }
mz-dyncfg = { path = "../dyncfg" }
mz-expr = { path = "../expr" }
mz-ore = { path = "../ore", features = ["async", "tracing", "differential-dataflow", "columnation"] }
mz-persist-client = { path = "../persist-client" }
mz-persist-types = { path = "../persist-types" }
mz-pgcopy = { path = "../pgcopy" }
mz-pgrepr = { path = "../pgrepr" }
mz-proto = { path = "../proto" }
mz-repr = { path = "../repr" }
mz-storage-types = { path = "../storage-types" }
mz-timely-util = { path = "../timely-util" }
mz-txn-wal = { path = "../txn-wal" }
parquet.workspace = true
prometheus.workspace = true
proptest.workspace = true
prost.workspace = true
reqwest = { workspace = true, features = ["stream", "rustls-tls-webpki-roots-no-provider"], default-features = false }
sentry.workspace = true
serde.workspace = true
smallvec = { workspace = true, features = ["union"] }
timely.workspace = true
thiserror.workspace = true
tokio.workspace = true
tokio-stream.workspace = true
tokio-util = { workspace = true, features = ["io"] }
tracing.workspace = true
url.workspace = true
uuid = { workspace = true, features = ["v4"] }

[features]
default = []
