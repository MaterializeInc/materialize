[package]
name = "mz-storage-operators"
description = "Shared Storage dataflow operators"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
arrow.workspace = true
arrow-ipc = "57"
async-compression = { version = "0.4.27", features = ["bzip2-sys", "gzip", "tokio", "xz", "zstd"] }
async-stream = "0.3.6"
aws-types.workspace = true
aws-smithy-types = "1.1.8"
aws-sdk-s3 = { version = "1.94.0", default-features = false }
bytes.workspace = true
bytesize.workspace = true
csv-async = { version = "1.3.1", features = ["tokio"] }
derivative.workspace = true
differential-dataflow.workspace = true
futures.workspace = true
glob = "0.3.3"
http.workspace = true
itertools.workspace = true
mz-aws-util = { path = "../aws-util" }
mz-arrow-util = { path = "../arrow-util" }
mz-dyncfg = { path = "../dyncfg" }
mz-expr = { path = "../expr" }
mz-ore = { path = "../ore", features = ["async", "tracing", "differential-dataflow", "columnation"] }
mz-persist-client = { path = "../persist-client" }
mz-persist-types = { path = "../persist-types" }
mz-pgcopy = { path = "../pgcopy" }
mz-pgrepr = { path = "../pgrepr" }
mz-proto = { path = "../proto" }
mz-repr = { path = "../repr" }
mz-storage-types = { path = "../storage-types" }
mz-timely-util = { path = "../timely-util" }
mz-txn-wal = { path = "../txn-wal" }
parquet = { version = "57", default-features = false, features = ["arrow", "async", "snap"] }
prometheus.workspace = true
proptest.workspace = true
prost.workspace = true
reqwest.workspace = true
sentry = { version = "0.46.1", default-features = false, features = [] }
serde.workspace = true
smallvec = { workspace = true, features = ["union"] }
timely.workspace = true
thiserror.workspace = true
tokio.workspace = true
tokio-stream.workspace = true
tokio-util = { workspace = true, features = ["io"] }
tracing.workspace = true
url.workspace = true
uuid = { workspace = true, features = ["v4"] }

[features]
default = []
