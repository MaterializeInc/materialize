[package]
name = "mz-storage-types"
description = "Shared types for the `mz-storage*` crates"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[[bench]]
name = "row"
harness = false

[dependencies]
anyhow.workspace = true
arrow.workspace = true
async-trait.workspace = true
aws-config.workspace = true
aws-credential-types.workspace = true
aws-sdk-sts = { version = "1.41.0", default-features = false, features = ["rt-tokio"] }
aws-types.workspace = true
bytes.workspace = true
columnation.workspace = true
dec.workspace = true
derivative.workspace = true
differential-dataflow.workspace = true
hex.workspace = true
http.workspace = true
itertools.workspace = true
mysql_async.workspace = true
mz-aws-util = { path = "../aws-util", features = ["s3"] }
mz-ccsr = { path = "../ccsr" }
mz-cloud-resources = { path = "../cloud-resources" }
mz-dyncfg = { path = "../dyncfg" }
mz-expr = { path = "../expr" }
mz-interchange = { path = "../interchange" }
mz-kafka-util = { path = "../kafka-util" }
mz-ore = { path = "../ore", features = ["async", "tracing"] }
mz-mysql-util = { path = "../mysql-util" }
mz-persist-types = { path = "../persist-types" }
mz-pgcopy = { path = "../pgcopy" }
mz-postgres-util = { path = "../postgres-util" }
mz-proto = { path = "../proto" }
mz-repr = { path = "../repr" }
mz-rocksdb-types = { path = "../rocksdb-types" }
mz-secrets = { path = "../secrets" }
mz-service = { path = "../service" }
mz-ssh-util = { path = "../ssh-util" }
mz-sql-parser = { path = "../sql-parser" }
mz-sql-server-util = { path = "../sql-server-util" }
mz-timely-util = { path = "../timely-util" }
mz-tls-util = { path = "../tls-util" }
mz-tracing = { path = "../tracing" }
native-tls = "0.2.14"
openssl.workspace = true
proptest.workspace = true
proptest-derive.workspace = true
prost.workspace = true
rdkafka.workspace = true
regex.workspace = true
reqwest.workspace = true
serde.workspace = true
serde_json = { workspace = true, features = ["preserve_order"] }
thiserror.workspace = true
tiberius = { version = "0.12", features = ["sql-browser-tokio", "tds73", "native-tls"], default-features = false }
timely.workspace = true
tokio.workspace = true
tokio-postgres = { workspace = true, features = ["serde"] }
tracing.workspace = true
url = { workspace = true, features = ["serde"] }
uuid = { workspace = true, features = ["serde", "v4"] }
base64.workspace = true
iceberg = "0.7.0"
iceberg-catalog-rest = "0.7.0"

[dev-dependencies]
criterion.workspace = true
insta.workspace = true
mz-persist = { path = "../persist" }
rand.workspace = true

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true

[features]
default = ["mz-build-tools/default"]
