[package]
name = "mz-storage-types"
description = "Shared types for the `mz-storage*` crates"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[[bench]]
name = "row"
harness = false

[dependencies]
anyhow.workspace = true
arrow = { workspace = true, default-features = false }
async-trait.workspace = true
aws-config = { workspace = true, features = ["sso"], default-features = false }
aws-credential-types = { workspace = true, features = ["hardcoded-credentials"] }
aws-sdk-sts = { workspace = true, features = ["rt-tokio"], default-features = false }
aws-types.workspace = true
bytes.workspace = true
columnation.workspace = true
dec.workspace = true
derivative.workspace = true
differential-dataflow.workspace = true
hex.workspace = true
http.workspace = true
itertools.workspace = true
mysql_async = { workspace = true, features = ["minimal", "rustls-tls",], default-features = false }
mz-aws-util = { path = "../aws-util", features = ["s3"] }
mz-ccsr = { path = "../ccsr" }
mz-cloud-resources = { path = "../cloud-resources" }
mz-dyncfg = { path = "../dyncfg" }
mz-expr = { path = "../expr" }
mz-interchange = { path = "../interchange" }
mz-kafka-util = { path = "../kafka-util" }
mz-ore = { path = "../ore", features = ["async", "tracing"] }
mz-mysql-util = { path = "../mysql-util" }
mz-persist-types = { path = "../persist-types" }
mz-pgcopy = { path = "../pgcopy" }
mz-postgres-util = { path = "../postgres-util" }
mz-proto = { path = "../proto" }
mz-repr = { path = "../repr" }
mz-rocksdb-types = { path = "../rocksdb-types" }
mz-secrets = { path = "../secrets" }
mz-service = { path = "../service" }
mz-ssh-util = { path = "../ssh-util" }
mz-sql-parser = { path = "../sql-parser" }
mz-sql-server-util = { path = "../sql-server-util" }
mz-timely-util = { path = "../timely-util" }
mz-tls-util = { path = "../tls-util" }
mz-tracing = { path = "../tracing" }
proptest = { workspace = true, features = ["std"], default-features = false }
proptest-derive = { workspace = true, features = ["boxed_union"] }
prost = { workspace = true, features = ["no-recursion-limit"] }
rdkafka = { workspace = true, features = ["cmake-build", "ssl-awslc", "libz-static", "zstd"] }
regex.workspace = true
reqwest = { workspace = true, features = ["rustls-tls-webpki-roots-no-provider"], default-features = false }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, features = ["preserve_order"] }
thiserror.workspace = true
tiberius = { workspace = true, features = ["sql-browser-tokio", "tds73", "rustls"], default-features = false }
timely.workspace = true
tokio = { workspace = true, features = ["fs", "rt", "sync", "test-util", "time"] }
tokio-postgres = { workspace = true, features = ["serde"] }
tracing.workspace = true
url = { workspace = true, features = ["serde"] }
uuid = { workspace = true, features = ["serde", "v4"] }
base64.workspace = true
iceberg.workspace = true
iceberg-catalog-rest.workspace = true

[dev-dependencies]
criterion.workspace = true
insta = { workspace = true, features = ["json"] }
mz-persist = { path = "../persist" }
rand.workspace = true

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true

[features]
default = ["mz-build-tools/default"]
