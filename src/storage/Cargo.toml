[package]
name = "mz-storage"
description = "Materialize's storage layer."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[[example]]
name = "upsert_open_loop"
bench = false

[dependencies]
anyhow.workspace = true
async-stream.workspace = true
async-trait.workspace = true
aws-credential-types = { workspace = true, features = ["hardcoded-credentials"] }
aws-sdk-sts = { workspace = true, features = ["rt-tokio"], default-features = false }
arrow = { workspace = true, default-features = false }
bytes = { workspace = true, features = ["serde"] }
bytesize.workspace = true
bincode.workspace = true
chrono = { workspace = true, features = ["std"], default-features = false }
clap = { workspace = true, features = ["derive", "env"] }
columnation.workspace = true
crossbeam-channel.workspace = true
csv-core.workspace = true
dec.workspace = true
differential-dataflow.workspace = true
fail = { workspace = true, features = ["failpoints"] }
futures.workspace = true
iceberg.workspace = true
indexmap = { workspace = true, features = ["std"], default-features = false }
itertools.workspace = true
maplit.workspace = true
mysql_async = { workspace = true, features = ["minimal", "binlog"], default-features = false }
mysql_common = { workspace = true, features = ["chrono"], default-features = false }
mz-arrow-util = { path = "../arrow-util" }
mz-build-info = { path = "../build-info" }
mz-ccsr = { path = "../ccsr" }
mz-cluster-client = { path = "../cluster-client" }
mz-dyncfg = { path = "../dyncfg" }
mz-dyncfgs = { path = "../dyncfgs" }
mz-expr = { path = "../expr" }
mz-cluster = { path = "../cluster" }
mz-interchange = { path = "../interchange" }
mz-kafka-util = { path = "../kafka-util" }
mz-mysql-util = { path = "../mysql-util" }
mz-ore = { path = "../ore", features = ["async", "tracing", "chrono", "metrics", "columnation"] }
mz-persist = { path = "../persist" }
mz-persist-client = { path = "../persist-client" }
mz-persist-types = { path = "../persist-types" }
mz-pgcopy = { path = "../pgcopy" }
mz-postgres-util = { path = "../postgres-util" }
mz-repr = { path = "../repr" }
mz-rocksdb = { path = "../rocksdb" }
mz-sql-parser = { path = "../sql-parser" }
mz-sql-server-util = { path = "../sql-server-util" }
mz-ssh-util = { path = "../ssh-util" }
mz-storage-client = { path = "../storage-client" }
mz-storage-operators = { path = "../storage-operators" }
mz-storage-types = { path = "../storage-types" }
mz-timely-util = { path = "../timely-util" }
mz-txn-wal = { path = "../txn-wal" }
parquet = { workspace = true, features = ["arrow", "brotli", "flate2", "snap", "lz4", "zstd"], default-features = false }
pin-project.workspace = true
postgres-replication.workspace = true
prometheus = { workspace = true, default-features = false }
prost = { workspace = true, features = ["no-recursion-limit"] }
# Loadgen sources need reproducible randomness, so we need to continue using
# the old version of `rand`.
rand-8 = { workspace = true, features = ["small_rng"] }
rdkafka = { workspace = true, features = ["cmake-build", "ssl-awslc", "libz-static", "zstd",] }
regex.workspace = true
rocksdb = { workspace = true, features = ["snappy", "zstd", "lz4"], default-features = false }
seahash.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
serde_bytes.workspace = true
aws-lc-rs.workspace = true
tiberius = { workspace = true, features = ["chrono", "sql-browser-tokio", "tds73", "rustls"], default-features = false }
timely.workspace = true
tokio = { workspace = true, features = ["fs", "rt", "sync", "test-util"] }
tokio-postgres = { workspace = true, features = ["serde"] }
tokio-stream.workspace = true
tokio-util = { workspace = true, features = ["io"] }
tracing.workspace = true
thiserror.workspace = true
uuid = { workspace = true, features = ["serde", "v4"] }
arrow-ipc.workspace = true

[dev-dependencies]
async-trait.workspace = true
axum.workspace = true
clap = { workspace = true, features = ["derive", "env"] }
humantime.workspace = true
mz-http-util = { path = "../http-util" }
mz-orchestrator-tracing = { path = "../orchestrator-tracing" }
itertools.workspace = true
tempfile.workspace = true
tokio = { workspace = true, features = ["test-util"] }

[features]
default = []

[package.metadata.cargo-udeps.ignore]
# only used on linux
