[package]
name = "mz-storage"
description = "Materialize's storage layer."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[[example]]
name = "upsert_open_loop"
bench = false

[dependencies]
anyhow.workspace = true
async-stream = "0.3.6"
async-trait.workspace = true
aws-credential-types = { version = "1.2.7", features = ["hardcoded-credentials"] }
aws-sdk-sts = { version = "1.41.0", default-features = false, features = ["rt-tokio"] }
arrow.workspace = true
bytes = { workspace = true, features = ["serde"] }
bytesize.workspace = true
bincode = "1"
chrono.workspace = true
clap = { workspace = true, features = ["env"] }
columnation.workspace = true
crossbeam-channel = "0.5.15"
csv-core = { version = "0.1.13" }
dec.workspace = true
differential-dataflow.workspace = true
fail.workspace = true
futures.workspace = true
iceberg = "0.7.0"
indexmap = { version = "2.10.0", default-features = false, features = ["std"] }
itertools.workspace = true
maplit.workspace = true
mysql_async = { version = "0.36.2", default-features = false, features = ["minimal", "binlog"] }
mysql_common = { version = "0.35.5", default-features = false, features = ["chrono"] }
mz-arrow-util = { path = "../arrow-util" }
mz-build-info = { path = "../build-info" }
mz-ccsr = { path = "../ccsr" }
mz-cluster-client = { path = "../cluster-client" }
mz-dyncfg = { path = "../dyncfg" }
mz-dyncfgs = { path = "../dyncfgs" }
mz-expr = { path = "../expr" }
mz-cluster = { path = "../cluster" }
mz-interchange = { path = "../interchange" }
mz-kafka-util = { path = "../kafka-util" }
mz-mysql-util = { path = "../mysql-util" }
mz-ore = { path = "../ore", features = ["async", "tracing", "chrono", "metrics", "columnation"] }
mz-persist = { path = "../persist" }
mz-persist-client = { path = "../persist-client" }
mz-persist-types = { path = "../persist-types" }
mz-pgcopy = { path = "../pgcopy" }
mz-postgres-util = { path = "../postgres-util" }
mz-repr = { path = "../repr" }
mz-rocksdb = { path = "../rocksdb" }
mz-sql-parser = { path = "../sql-parser" }
mz-sql-server-util = { path = "../sql-server-util" }
mz-ssh-util = { path = "../ssh-util" }
mz-storage-client = { path = "../storage-client" }
mz-storage-operators = { path = "../storage-operators" }
mz-storage-types = { path = "../storage-types" }
mz-timely-util = { path = "../timely-util" }
mz-txn-wal = { path = "../txn-wal" }
parquet = { version = "57", default-features = false, features = ["arrow", "brotli", "flate2", "snap", "lz4", "zstd"] }
pin-project.workspace = true
postgres-replication = { version = "0.6.7" }
prometheus.workspace = true
prost.workspace = true
# Loadgen sources need reproducible randomness, so we need to continue using
# the old version of `rand`.
rand-8 = { package = "rand", version = "0.8.5", features = ["small_rng"] }
rdkafka = { version = "0.29.0", features = [
    "cmake-build",
    "ssl-vendored",
    "libz-static",
    "zstd",
] }
regex.workspace = true
rocksdb = { version = "0.24.0", default-features = false, features = ["snappy", "zstd", "lz4"] }
seahash = "4"
serde.workspace = true
serde_json.workspace = true
serde_bytes = { version = "0.11.19" }
sha2.workspace = true
tiberius = { version = "0.12", features = ["chrono", "sql-browser-tokio", "tds73", "native-tls"], default-features = false }
timely.workspace = true
tokio.workspace = true
tokio-postgres = { workspace = true, features = ["serde"] }
tokio-stream.workspace = true
tokio-util = { workspace = true, features = ["io"] }
tracing.workspace = true
thiserror.workspace = true
uuid = { workspace = true, features = ["serde", "v4"] }
arrow-ipc = "57"

[dev-dependencies]
async-trait.workspace = true
axum.workspace = true
clap = { workspace = true, features = ["env"] }
humantime.workspace = true
mz-http-util = { path = "../http-util" }
mz-orchestrator-tracing = { path = "../orchestrator-tracing" }
itertools.workspace = true
tempfile.workspace = true
tokio.workspace = true

[features]
default = []

[package.metadata.cargo-udeps.ignore]
# only used on linux
