[package]
name = "mz-testdrive"
description = "Integration test driver for Materialize."
version = "26.20.0-dev.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
async-compression = { version = "0.4.27", features = ["bzip2-sys", "gzip", "tokio", "xz", "zstd"] }
async-trait.workspace = true
aws-credential-types = { version = "1.2.10", features = ["hardcoded-credentials"] }
aws-sdk-sts = { version = "1.41.0", default-features = false, features = ["rt-tokio"] }
aws-types.workspace = true
arrow.workspace = true
byteorder = "1.5"
bytes.workspace = true
chrono.workspace = true
clap.workspace = true
duckdb = { version = "1.4.3", default-features = false, features = ["native-tls"] }
flate2.workspace = true
futures.workspace = true
globset = "0.4.18"
hex.workspace = true
http.workspace = true
humantime.workspace = true
itertools.workspace = true
junit-report = "0.8.3"
maplit.workspace = true
md-5.workspace = true
mysql_async = { version = "0.36.2", default-features = false, features = ["minimal"] }
mz-avro = { path = "../avro", features = ["snappy"] }
mz-aws-util = { path = "../aws-util", features = ["s3"] }
mz-build-info = { path = "../build-info" }
mz-build-tools = { path = "../build-tools", default-features = false }
mz-catalog = { path = "../catalog" }
mz-ccsr = { path = "../ccsr" }
mz-adapter = { path = "../adapter" }
mz-expr = { path = "../expr" }
mz-interchange = { path = "../interchange" }
mz-kafka-util = { path = "../kafka-util" }
mz-license-keys = { path = "../license-keys" }
mz-ore = { path = "../ore", features = ["async"] }
mz-persist-types = { path = "../persist-types" }
mz-persist-client = { path = "../persist-client" }
mz-pgrepr = { path = "../pgrepr" }
mz-repr = { path = "../repr" }
mz-sql = { path = "../sql" }
mz-sql-parser = { path = "../sql-parser" }
mz-sql-server-util = { path = "../sql-server-util" }
mz-storage-types = { path = "../storage-types" }
mz-tls-util = { path = "../tls-util" }
parquet = { version = "57", default-features = false, features = ["arrow", "brotli", "flate2", "snap", "lz4", "zstd"] }
postgres_array = { version = "0.11.0" }
postgres-protocol.workspace = true
prost.workspace = true
prost-reflect = { version = "0.16.3", features = ["serde"] }
prost-types = { version = "0.14.3" }
rand.workspace = true
rdkafka = { version = "0.29.0", features = ["cmake-build", "ssl-vendored", "libz-static", "zstd"] }
regex.workspace = true
reqwest.workspace = true
semver.workspace = true
serde.workspace = true
serde_json = { workspace = true, features = ["raw_value"] }
similar = "2.7.0"
tempfile.workspace = true
termcolor = "1.4.1"
tiberius = { version = "0.12", features = ["sql-browser-tokio", "tds73"], default-features = false }
time = "0.3.17"
tracing.workspace = true
tracing-subscriber.workspace = true
tokio.workspace = true
tokio-postgres = { workspace = true, features = ["with-chrono-0_4", "with-serde_json-1"] }
tokio-stream.workspace = true
tokio-util = { workspace = true, features = ["compat"] }
tonic = "0.14.2"
tonic-prost = "0.14.5"
url.workspace = true
uuid.workspace = true
walkdir = "2.5.0"

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true
tonic-prost-build = "0.14.5"

[features]
default = ["mz-build-tools/default"]
foundationdb = ["mz-persist-client/foundationdb"]
