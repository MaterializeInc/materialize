[package]
name = "mz-testdrive"
description = "Integration test driver for Materialize."
version = "26.22.0-rc.2"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
async-compression.workspace = true
async-trait.workspace = true
aws-credential-types.workspace = true
aws-sdk-sts.workspace = true
aws-types.workspace = true
arrow.workspace = true
byteorder.workspace = true
bytes.workspace = true
chrono.workspace = true
clap.workspace = true
duckdb.workspace = true
flate2.workspace = true
futures.workspace = true
globset.workspace = true
hex.workspace = true
http.workspace = true
humantime.workspace = true
itertools.workspace = true
junit-report.workspace = true
maplit.workspace = true
md-5.workspace = true
mysql_async.workspace = true
mz-avro = { path = "../avro", features = ["snappy"] }
mz-aws-util = { path = "../aws-util", features = ["s3"] }
mz-build-info = { path = "../build-info" }
mz-build-tools = { path = "../build-tools", default-features = false }
mz-catalog = { path = "../catalog" }
mz-ccsr = { path = "../ccsr" }
mz-adapter = { path = "../adapter" }
mz-expr = { path = "../expr" }
mz-interchange = { path = "../interchange" }
mz-kafka-util = { path = "../kafka-util" }
mz-license-keys = { path = "../license-keys" }
mz-ore = { path = "../ore", features = ["async"] }
mz-persist-types = { path = "../persist-types" }
mz-persist-client = { path = "../persist-client" }
mz-pgrepr = { path = "../pgrepr" }
mz-repr = { path = "../repr" }
mz-sql = { path = "../sql" }
mz-sql-parser = { path = "../sql-parser" }
mz-sql-server-util = { path = "../sql-server-util" }
mz-storage-types = { path = "../storage-types" }
mz-tls-util = { path = "../tls-util" }
parquet.workspace = true
postgres_array.workspace = true
postgres-protocol.workspace = true
prost.workspace = true
prost-reflect.workspace = true
prost-types.workspace = true
rand.workspace = true
rdkafka.workspace = true
regex.workspace = true
reqwest.workspace = true
semver.workspace = true
serde.workspace = true
serde_json = { workspace = true, features = ["raw_value"] }
similar.workspace = true
tempfile.workspace = true
termcolor.workspace = true
tiberius.workspace = true
time.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tokio.workspace = true
tokio-postgres = { workspace = true, features = ["with-chrono-0_4", "with-serde_json-1"] }
tokio-stream.workspace = true
tokio-util = { workspace = true, features = ["compat"] }
tonic.workspace = true
tonic-prost.workspace = true
url.workspace = true
uuid.workspace = true
walkdir.workspace = true

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true
tonic-prost-build.workspace = true

[features]
default = ["mz-build-tools/default"]
foundationdb = ["mz-persist-client/foundationdb"]
