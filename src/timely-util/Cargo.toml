[package]
name = "mz-timely-util"
description = "Utilities for working with Timely."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[[bench]]
name = "reclock"
harness = false

[dependencies]
ahash = { version = "0.8.12", default-features = false }
bincode = "1.3.3"
bytemuck = "1.23.1"
columnar.workspace = true
columnation.workspace = true
custom-labels = "0.4.6"
differential-dataflow.workspace = true
either = "1"
futures-util = "0.3.31"
lgalloc = "0.6"
mz-ore = { path = "../ore", default-features = false, features = ["async", "process", "tracing", "test", "num-traits", "region", "differential-dataflow", "overflowing"] }
num-traits = "0.2"
serde.workspace = true
timely.workspace = true
tokio = { version = "1.49.0", features = ["macros", "rt-multi-thread", "time"] }
tracing.workspace = true
uuid = { workspace = true, features = ["serde", "v4"] }

# This crate is used for capturing memory usage in a unit test. It is feature
# flagged because it replaces the global memory allocator.  Unfortunately,
# optional dependencies are not allowed in `dev-dependencies`, so it lives here.
allocation-counter = { version = "0", optional = true }

[dev-dependencies]
criterion = { version = "0.8.2" }

[features]
default = ["mz-ore/default"]
count-allocations = ["allocation-counter"]
