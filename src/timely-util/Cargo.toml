[package]
name = "mz-timely-util"
description = "Utilities for working with Timely."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[[bench]]
name = "reclock"
harness = false

[[bench]]
name = "consolidating_column_builder"
harness = false

[[bench]]
name = "columnar_merger"
harness = false

[[bench]]
name = "columnar_merge_batcher"
harness = false

[[bench]]
name = "column_pager"
harness = false

[[bench]]
name = "temporal_merge_batcher"
harness = false

[dependencies]
ahash.workspace = true
bincode.workspace = true
bytemuck.workspace = true
columnar.workspace = true
columnation.workspace = true
differential-dataflow.workspace = true
either.workspace = true
futures-util.workspace = true
lgalloc.workspace = true
lz4_flex.workspace = true
mz-ore = { path = "../ore", default-features = false, features = ["async", "process", "tracing", "test", "num-traits", "region", "differential-dataflow", "overflowing", "pager"] }
num-traits.workspace = true
serde.workspace = true
timely.workspace = true
tokio.workspace = true
tracing.workspace = true
uuid = { workspace = true, features = ["serde", "v4"] }

# This crate is used for capturing memory usage in a unit test. It is feature
# flagged because it replaces the global memory allocator.  Unfortunately,
# optional dependencies are not allowed in `dev-dependencies`, so it lives here.
allocation-counter = { workspace = true, optional = true }

[dev-dependencies]
criterion.workspace = true
itertools.workspace = true
proptest.workspace = true
rand.workspace = true
tempfile.workspace = true

[features]
default = ["mz-ore/default"]
count-allocations = ["allocation-counter"]
