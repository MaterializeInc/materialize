[package]
name = "mz-timestamp-oracle"
description = "Materialize's Timestamp Oracle."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
dec = "0.4.8"
deadpool-postgres = "0.10.3"
futures.workspace = true
futures-util = "0.3.31"
mz-adapter-types = { path = "../adapter-types" }
mz-foundationdb = { path = "../foundationdb", default-features = false, optional = true }
mz-ore = { path = "../ore", features = ["chrono", "async", "tracing"] }
mz-pgrepr = { path = "../pgrepr" }
mz-postgres-client = { path = "../postgres-client" }
mz-repr = { path = "../repr", features = ["tracing"] }
postgres-protocol.workspace = true
rand = "0.9.2"
serde.workspace = true
tokio = { version = "1.49.0", features = ["rt", "time"] }
tracing.workspace = true
uuid = { version = "1.19.0", features = ["v4"] }

[features]
default = []
foundationdb = ["mz-foundationdb"]
