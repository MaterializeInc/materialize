[package]
name = "mz-timestamp-oracle"
description = "Materialize's Timestamp Oracle."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
dec.workspace = true
deadpool-postgres.workspace = true
futures.workspace = true
futures-util.workspace = true
mz-adapter-types = { path = "../adapter-types" }
mz-foundationdb = { path = "../foundationdb", default-features = false, optional = true }
mz-ore = { path = "../ore", features = ["chrono", "async", "crypto", "tracing"] }
mz-pgrepr = { path = "../pgrepr" }
mz-postgres-client = { path = "../postgres-client" }
mz-repr = { path = "../repr", features = ["tracing"] }
postgres-protocol.workspace = true
rand.workspace = true
serde.workspace = true
tokio.workspace = true
tracing.workspace = true
uuid = { workspace = true, features = ["v4"] }

[features]
default = []
foundationdb = ["mz-foundationdb"]
