[package]
name = "mz-tls-util"
description = "A tiny utility crate for making TLS connectors."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
mz-ore = { path = "../ore", default-features = false }
openssl.workspace = true
openssl-sys = { version = "0.9.108", features = ["vendored"] }
postgres-openssl = { version = "0.5.2" }
thiserror.workspace = true
tokio = { version = "1.49.0", default-features = false, features = ["fs", "macros", "sync", "rt", "rt-multi-thread"] }
tokio-postgres = { version = "0.7.15" }
tracing.workspace = true

[dev-dependencies]
mz-ore = { path = "../ore", features = ["test"] }

[features]
default = []
