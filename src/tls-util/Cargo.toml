[package]
name = "mz-tls-util"
description = "A tiny utility crate for making TLS connectors."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow = "1.0.102"
mz-ore = { path = "../ore" }
openssl = { version = "0.10.76", features = ["vendored"] }
openssl-sys = { version = "0.9.108", features = ["vendored"] }
postgres-openssl = { version = "0.5.2" }
thiserror = "2.0.18"
tokio = { version = "1.49.0", default-features = false, features = ["fs", "macros", "sync", "rt", "rt-multi-thread"] }
tokio-postgres = { version = "0.7.15" }
tracing = "0.1.44"

[dev-dependencies]
mz-ore = { path = "../ore", features = ["test"] }

[features]
default = []
