[package]
name = "mz-tracing"
description = "A tracing library for Materialize."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
mz-ore = { path = "../ore", default-features = false, features = ["test", "tracing"] }
serde.workspace = true
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", default-features = false, features = ["env-filter", "fmt"] }

[features]
default = []
