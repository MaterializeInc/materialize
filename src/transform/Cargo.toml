[package]
name = "mz-transform"
description = "Transformations of Materialize expressions."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[build-dependencies]
chumsky = { workspace = true }

[dependencies]
differential-dataflow.workspace = true
enum-kinds.workspace = true
good_lp = { workspace = true }
itertools.workspace = true
mz-compute-types = { path = "../compute-types" }
mz-expr = { path = "../expr" }
mz-ore = { path = "../ore", features = ["differential-dataflow"] }
mz-repr = { path = "../repr", features = ["tracing"] }
mz-sql = { path = "../sql" }
ordered-float.workspace = true
paste.workspace = true
proptest = { workspace = true, optional = true }
proptest-derive = { workspace = true, optional = true }
serde.workspace = true
tracing.workspace = true

[dev-dependencies]
anyhow.workspace = true
datadriven.workspace = true
mz-expr-parser = { path = "../expr-parser" }
mz-expr-test-util = { path = "../expr-test-util" }
mz-lowertest = { path = "../lowertest" }
mz-ore = { path = "../ore", features = ["test"] }
mz-transform = { path = ".", features = ["proptest"] }
proc-macro2.workspace = true
proptest.workspace = true
proptest-derive.workspace = true
serde_json.workspace = true

[[test]]
name = "compare_real"
path = "tests/compare_real.rs"

[[test]]
name = "wcoj_decision"
path = "tests/wcoj_decision.rs"

[[test]]
name = "roundtrip"
path = "tests/roundtrip.rs"

[features]
default = []
proptest = ["dep:proptest", "dep:proptest-derive", "mz-repr/proptest", "mz-expr/proptest"]
