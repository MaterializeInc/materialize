[package]
name = "mz-transform"
description = "Transformations of Materialize expressions."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
differential-dataflow.workspace = true
enum-kinds.workspace = true
itertools.workspace = true
mz-compute-types = { path = "../compute-types" }
mz-expr = { path = "../expr" }
mz-ore = { path = "../ore", features = ["differential-dataflow"] }
mz-repr = { path = "../repr", features = ["tracing"] }
mz-sql = { path = "../sql" }
ordered-float = { version = "5.1.0", features = ["serde"] }
paste.workspace = true
proptest = { version = "1.10.0", default-features = false, features = ["std"] }
proptest-derive = { version = "0.8.0" }
serde.workspace = true
tracing.workspace = true

[dev-dependencies]
anyhow.workspace = true
datadriven = "0.9.0"
mz-expr-parser = { path = "../expr-parser" }
mz-expr-test-util = { path = "../expr-test-util" }
mz-lowertest = { path = "../lowertest" }
mz-ore = { path = "../ore", features = ["test"] }
proc-macro2 = "1.0.106"
serde_json = "1.0.149"

[features]
default = []
