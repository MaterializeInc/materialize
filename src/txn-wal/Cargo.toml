[package]
name = "mz-txn-wal"
description = "Atomic multi-shard mz_persist_client writes"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
async-trait.workspace = true
bytes = { version = "1.11.1" }
differential-dataflow.workspace = true
futures.workspace = true
itertools.workspace = true
mz-ore = { path = "../ore", features = ["process"] }
mz-dyncfg = { path = "../dyncfg" }
mz-persist-types = { path = "../persist-types" }
mz-persist-client = { path = "../persist-client" }
mz-timely-util = { path = "../timely-util" }
prometheus.workspace = true
prost = { version = "0.14.3", features = ["no-recursion-limit"] }
serde = { workspace = true, features = ["rc"] }
timely.workspace = true
tokio = { version = "1.49.0", default-features = false, features = ["rt", "rt-multi-thread"] }
tracing.workspace = true
uuid = { version = "1.19.0", features = ["v4"] }

[dev-dependencies]
crossbeam-channel = "0.5.15"
rand = { version = "0.9.2", default-features = false, features = ["small_rng"] }

[build-dependencies]
mz-build-tools = { path = "../build-tools", default-features = false, features = ["protobuf-src"] }
prost-build.workspace = true

[features]
default = ["mz-build-tools/default"]
