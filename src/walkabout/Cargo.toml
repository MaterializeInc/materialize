[package]
name = "mz-walkabout"
description = "AST visitor generation."
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow = "1.0.102"
itertools.workspace = true
mz-ore-build = { path = "../ore-build", default-features = false }
quote = "1.0.45"
syn = { version = "2.0.106", features = ["extra-traits", "full", "parsing"] }

[dev-dependencies]
datadriven = "0.9.0"
mz-ore = { path = "../ore", default-features = false, features = ["test"] }
tempfile = "3.23.0"

[features]
default = []
