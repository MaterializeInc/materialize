# FROM-scratch image holding the per-group docker-compose.yaml + .env.
# Antithesis pulls this image and reads `/docker-compose.yaml` to bring
# up the system under test; `.env` supplies `${MATERIALIZED_IMAGE}` /
# `${ANTITHESIS_WORKLOAD_IMAGE}` at compose-parse time.
#
# The compose YAML is generated from test/antithesis/mzcompose.py and
# test/antithesis/groups.yaml via:
#   bin/pyactivate test/antithesis/export-compose.py --group=upsert-stress \
#     > test/antithesis/configs/upsert-stress/docker-compose.yaml
# Regenerate when the topology or manifest changes; CI verifies the
# committed copy is up to date.
#
# `.env` (generated, gitignored) is written by export-env.py at build
# time. Its content changes every materialized fingerprint shift, which
# is what propagates fresh fingerprints into this image without touching
# the committed YAML.
#
# `publish: false` keeps the standard `ci.test.build` flow from trying
# to build this image — it would fail on `COPY docker-compose.yaml .env /`
# because `.env` is gitignored and only build-antithesis.sh writes it.
# The antithesis nightly step builds and pushes via push-antithesis.py.

name: antithesis-config-upsert-stress
publish: false
