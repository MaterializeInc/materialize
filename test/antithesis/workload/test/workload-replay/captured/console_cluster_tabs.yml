  sql: "with \"replica_history\" as (select \"replica_id\", \"cluster_id\", \"size\"\
    \ from \"mz_cluster_replica_history\" union select \"id\" as \"replica_id\", \"\
    cluster_id\", \"size\" from \"mz_cluster_replicas\"), \"replica_name_history\"\
    \ as (select \"id\", \"new_name\" as \"name\", COALESCE(\"occurred_at\", TIMESTAMP\
    \ '1970-01-01') as \"occurred_at\" from \"mz_cluster_replica_name_history\"),\
    \ \"replica_metrics_history\" as (select \"m\".\"occurred_at\", \"m\".\"replica_id\"\
    , \"r\".\"size\", (SUM(m.cpu_nano_cores::float8) / (NULLIF(s.cpu_nano_cores, 0)\
    \ * s.processes)) as \"cpu_percent\", (SUM(m.memory_bytes::float8) / (NULLIF(s.memory_bytes,\
    \ 0) * s.processes)) as \"memory_percent\", (SUM(m.disk_bytes::float8) / (NULLIF(s.disk_bytes,\
    \ 0) * s.processes)) as \"disk_percent\", SUM(m.disk_bytes::float8) as \"disk_bytes\"\
    , SUM(m.memory_bytes::float8) as \"memory_bytes\", s.disk_bytes * s.processes\
    \ as \"total_disk_bytes\", s.memory_bytes * s.processes as \"total_memory_bytes\"\
    , MAX(m.heap_bytes::float8) as \"heap_bytes\", MAX(m.heap_limit) as \"heap_limit\"\
    , MAX(m.heap_bytes::float8 / NULLIF(m.heap_limit, 0)) as \"heap_percent\" from\
    \ \"replica_history\" as \"r\" inner join \"mz_cluster_replica_sizes\" as \"s\"\
    \ on \"r\".\"size\" = \"s\".\"size\" inner join \"mz_cluster_replica_metrics_history\"\
    \ as \"m\" on \"m\".\"replica_id\" = \"r\".\"replica_id\" group by \"m\".\"occurred_at\"\
    , \"m\".\"replica_id\", \"r\".\"size\", \"s\".\"cpu_nano_cores\", \"s\".\"memory_bytes\"\
    , \"s\".\"disk_bytes\", \"s\".\"processes\"), \"replica_utilization_history_binned\"\
    \ as (select \"m\".\"occurred_at\", \"m\".\"replica_id\", \"m\".\"cpu_percent\"\
    , \"m\".\"memory_percent\", \"m\".\"memory_bytes\", \"m\".\"disk_percent\", \"\
    m\".\"disk_bytes\", \"m\".\"total_disk_bytes\", \"m\".\"total_memory_bytes\",\
    \ \"m\".\"heap_bytes\", \"m\".\"heap_percent\", \"m\".\"size\", date_bin(\n  \
