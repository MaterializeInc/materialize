# (workload_console_cluster_tabs.yml). Deduplicated by SQL and stripped of
# per-query timing metadata so the bundled file stays small enough to commit.
# The originating capture is a one-hour slice of Materialize's web console
# traffic (introspection / metadata queries against mz_catalog + mz_internal),
# which the workload-replay Antithesis driver replays in random batches under
# container-level fault injection.
