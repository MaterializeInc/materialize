# Per-group Antithesis workload image.  The Dockerfile is shared across
# every group via a symlink to test/antithesis/workload/Dockerfile and
# selects the group's script subset at build time using the
# ANTITHESIS_WORKLOAD_GROUP build arg.

name: antithesis-workload-deploy
publish: false

build-args:
  ANTITHESIS_WORKLOAD_GROUP: deploy

pre-image:
  # Source files shared with the other workload-<group> images.  The
  # canonical location is test/antithesis/workload/; mzbuild build
  # contexts can't reach upward in the tree, so each per-group image
  # copies them in here.
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: test/**
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: stubs/**
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: setup-complete.sh
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: workload-entrypoint.sh
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: bake-test-templates.sh
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: scripts-for-group.py
  - type: copy
    source: test/antithesis
    destination: .
    matching: groups.yaml
  # `materialize/__init__.py` only — the deploy group's drivers don't
  # import any heavy `materialize.*` modules; only the pgwire helpers
  # in test/helpers/ + the Antithesis SDK.  The __init__.py keeps the
  # workload Dockerfile's `COPY materialize/` step from failing on a
  # non-existent directory.  Everything else is mocked by
  # `stubs/materialize/...`.
  - type: copy
    source: misc/python
    destination: .
    matching: materialize/__init__.py
  # Repository-checked-in testdrive scripts that the testdrive-runner
  # drivers execute under Antithesis fault injection.  The deploy
  # group doesn't ship a testdrive-runner today, but the workload
  # Dockerfile's `COPY testdrive-files/` step requires the directory
  # to exist — keep the pg-cdc glob so the build context is valid.
  - type: copy
    source: .
    destination: testdrive-files
    matching: test/pg-cdc/*.td
