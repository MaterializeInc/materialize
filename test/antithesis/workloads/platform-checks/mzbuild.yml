# Per-group Antithesis workload image.  The Dockerfile is shared across
# every group via a symlink to test/antithesis/workload/Dockerfile and
# selects the group's script subset at build time using the
# ANTITHESIS_WORKLOAD_GROUP build arg.

name: antithesis-workload-platform-checks
publish: false

build-args:
  ANTITHESIS_WORKLOAD_GROUP: platform-checks

pre-image:
  # Source files shared with the other workload-<group> images.  The
  # canonical location is test/antithesis/workload/; mzbuild build
  # contexts can't reach upward in the tree, so each per-group image
  # copies them in here.
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: test/**
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: stubs/**
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: setup-complete.sh
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: workload-entrypoint.sh
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: bake-test-templates.sh
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: scripts-for-group.py
  - type: copy
    source: test/antithesis
    destination: .
    matching: groups.yaml
  # `materialize.*` Python package slice — used by the parallel-workload
  # driver (when this image is the `combined` flavor) and by the
  # platform-checks runner, which imports the real
  # `materialize.checks.{checks,actions,all_checks}` modules to harvest
  # testdrive fragments from upstream Check classes.  Everything not
  # listed here is mocked out by the stubs in `stubs/materialize/`.
  - type: copy
    source: misc/python
    destination: .
    matching: materialize/__init__.py
  - type: copy
    source: misc/python
    destination: .
    matching: materialize/util.py
  - type: copy
    source: misc/python
    destination: .
    matching: materialize/sqlsmith.py
  - type: copy
    source: misc/python
    destination: .
    matching: materialize/mz_version.py
  - type: copy
    source: misc/python
    destination: .
    matching: materialize/parallel_workload/**
  - type: copy
    source: misc/python
    destination: .
    matching: materialize/data_ingest/**
  # Check classes: Check base + decorators (`disabled`,
  # `externally_idempotent`), the Testdrive/PyAction wrappers, the
  # KAFKA_SCHEMA_WITH_SINGLE_STRING_FIELD constant, and every concrete
  # Check class under all_checks/.  `executors.py` is deliberately
  # excluded — the stubs/ tree ships a tiny Executor base class so the
  # heavy cloudtest / mzcompose imports don't follow.
  - type: copy
    source: misc/python
    destination: .
    matching: materialize/checks/__init__.py
  - type: copy
    source: misc/python
    destination: .
    matching: materialize/checks/checks.py
  - type: copy
    source: misc/python
    destination: .
    matching: materialize/checks/actions.py
  - type: copy
    source: misc/python
    destination: .
    matching: materialize/checks/common.py
  - type: copy
    source: misc/python
    destination: .
    matching: materialize/checks/features.py
  - type: copy
    source: misc/python
    destination: .
    matching: materialize/checks/all_checks/**
  # Repository-checked-in testdrive scripts that the testdrive-runner
  # drivers execute under Antithesis fault injection.  Keeping the
  # source-of-truth path means new tests in `test/pg-cdc/` are exercised
  # against Antithesis as soon as their filenames are referenced by a
  # singleton driver.
  - type: copy
    source: .
    destination: testdrive-files
    matching: test/pg-cdc/*.td
