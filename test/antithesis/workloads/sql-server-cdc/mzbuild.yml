# Per-group Antithesis workload image.  The Dockerfile is shared across
# every group via a symlink to test/antithesis/workload/Dockerfile and
# selects the group's script subset at build time using the
# ANTITHESIS_WORKLOAD_GROUP build arg.

name: antithesis-workload-sql-server-cdc
publish: false

build-args:
  ANTITHESIS_WORKLOAD_GROUP: sql-server-cdc

pre-image:
  # Source files shared with the other workload-<group> images.  The
  # canonical location is test/antithesis/workload/; mzbuild build
  # contexts can't reach upward in the tree, so each per-group image
  # copies them in here.
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: test/**
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: stubs/**
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: setup-complete.sh
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: workload-entrypoint.sh
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: bake-test-templates.sh
  - type: copy
    source: test/antithesis/workload
    destination: .
    matching: scripts-for-group.py
  - type: copy
    source: test/antithesis
    destination: .
    matching: groups.yaml
  # `materialize/__init__.py` only — this group's drivers don't
  # import any heavy `materialize.*` modules.  The __init__.py is
  # kept so the workload Dockerfile's `COPY materialize/` step has
  # a non-empty source directory.  Everything else is mocked by
  # `stubs/materialize/...`.
  - type: copy
    source: misc/python
    destination: .
    matching: materialize/__init__.py
  # Repository-checked-in testdrive scripts that the testdrive-runner
  # drivers execute under Antithesis fault injection.  pg-cdc is bundled
  # by every group's image (parity with the other workload images);
  # the sql-server-cdc bundle also pulls in `setup/setup.td`, which the
  # singleton runner inlines as a prelude before each random .td file
  # to reset the `test` database + DummyTicker job to a known state.
  - type: copy
    source: .
    destination: testdrive-files
    matching: test/pg-cdc/*.td
  - type: copy
    source: .
    destination: testdrive-files
    matching: test/sql-server-cdc/*.td
  - type: copy
    source: .
    destination: testdrive-files
    matching: test/sql-server-cdc/setup/setup.td
