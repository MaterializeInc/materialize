/**
 * Render the detail page for a connection object.
 *
 * @param {Object} obj - The manifest object.
 * @returns {string} HTML string.
 */
function renderConnectionDetail(obj) {
    const infra = obj.infrastructure;
    const subtitle = infra ? infra.connector_type : null;
    let html = renderHeader(obj, { showCluster: false, subtitle: subtitle });
    html += renderDescription(obj);
    if (infra && infra.properties) {
        html += renderPropertiesTable(infra.properties, 'Connection Properties');
    }
    html += renderCollapsibleSQL(obj.sql);
    const sources = obj.dependents.filter(d => { const o = objMap[d]; return o && o.object_type === 'source'; });
    html += renderDepsTable(sources, 'Sources');
    html += renderGrants(obj);
    html += renderFilePath(obj);
    return html;
}

/**
 * Render the detail page for a source object.
 *
 * @param {Object} obj - The manifest object.
 * @returns {string} HTML string.
 */
function renderSourceDetail(obj) {
    const infra = obj.infrastructure;
    const subtitle = infra ? infra.connector_type : null;
    let html = renderHeader(obj, { subtitle: subtitle });
    html += renderDescription(obj);
    let configProps = [];
    if (infra) {
        if (infra.connection_ref) {
            configProps.push({ key: 'CONNECTION', value: infra.connection_ref, object_ref: infra.connection_ref });
        }
        if (infra.properties) {
            configProps = configProps.concat(infra.properties);
        }
    }
    if (configProps.length > 0) {
        html += renderPropertiesTable(configProps, 'Source Configuration');
    }
    html += renderCollapsibleSQL(obj.sql);
    const tables = obj.dependents.filter(d => { const o = objMap[d]; return o && o.object_type === 'table-from-source'; });
    if (tables.length > 0) {
        html += '<div class="section"><h2>Produced Tables (' + tables.length + ')</h2>';
        html += '<table class="data-table"><thead><tr><th>Table</th><th>External Reference</th></tr></thead><tbody>';
        tables.forEach(d => {
            const tbl = objMap[d];
            const extRef = (tbl && tbl.infrastructure && tbl.infrastructure.external_reference) || '\u2014';
            html += '<tr><td><a class="dep-link" data-id="' + escapeHtml(d) + '">' + escapeHtml(d) + '</a></td>';
            html += '<td>' + escapeHtml(extRef) + '</td></tr>';
        });
        html += '</tbody></table></div>';
    }
    html += renderColumns(obj);
    html += renderGrants(obj);
    html += renderFilePath(obj);
    return html;
}

/**
 * Render the detail page for a table-from-source object.
 *
 * @param {Object} obj - The manifest object.
 * @returns {string} HTML string.
 */
function renderTableFromSourceDetail(obj) {
    const infra = obj.infrastructure;
    let html = renderHeader(obj);
    html += renderDescription(obj);
    if (infra) {
        let props = [];
        if (infra.source_ref) {
            props.push({ key: 'SOURCE', value: infra.source_ref, object_ref: infra.source_ref });
        }
        if (infra.external_reference) {
            props.push({ key: 'EXTERNAL REFERENCE', value: infra.external_reference });
        }
        html += renderPropertiesTable(props, 'Source');
    }
    html += renderCollapsibleSQL(obj.sql);
    html += renderColumns(obj);
    html += renderDepsTable(obj.dependents, 'Dependents');
    html += renderIndexes(obj);
    html += renderConstraints(obj);
    html += renderReferencedBy(obj);
    html += renderGrants(obj);
    html += renderObjectTests(obj);
    html += renderFilePath(obj);
    return html;
}

/**
 * Render the default detail page for views, materialized views, tables, etc.
 *
 * @param {Object} obj - The manifest object.
 * @returns {string} HTML string.
 */
function renderDefaultDetail(obj) {
    let html = renderHeader(obj);
    html += renderDescription(obj);
    if (obj.sql) {
        html += '<div class="section"><h2>SQL</h2>';
        html += '<div class="sql-block"><pre>' + highlightSQL(obj.sql) + '</pre></div></div>';
    }
    html += renderColumns(obj);
    html += renderDepsTable(obj.dependencies, 'Dependencies');
    html += renderDepsTable(obj.dependents, 'Dependents');
    html += renderIndexes(obj);
    html += renderConstraints(obj);
    html += renderReferencedBy(obj);
    html += renderGrants(obj);
    html += renderObjectTests(obj);
    html += renderFilePath(obj);
    return html;
}

/**
 * Render the detail page for an object, dispatching to the type-specific renderer.
 *
 * @param {string} id - Fully-qualified object ID.
 */
function renderDetail(id) {
    const obj = objMap[id];
    const el = document.getElementById('view-detail');
    if (!obj) { el.innerHTML = '<p>Object not found: ' + escapeHtml(id) + '</p>'; return; }

    let html;
    switch (obj.object_type) {
        case 'secret':
            html = renderSecretDetail(obj);
            break;
        case 'connection':
            html = renderConnectionDetail(obj);
            break;
        case 'source':
            html = renderSourceDetail(obj);
            break;
        case 'table-from-source':
            html = renderTableFromSourceDetail(obj);
            break;
        default:
            html = renderDefaultDetail(obj);
            break;
    }

    el.innerHTML = html;
    el.querySelectorAll('.dep-link').forEach(l => {
        l.addEventListener('click', () => navigate('detail', l.dataset.id));
    });
    el.querySelectorAll('.show-lineage-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const oid = btn.dataset.id;
            window.location.hash = 'dag/lineage/' + oid;
        });
    });
}

// ====== DAG View ======

let dagRendered = false;
let dagNodeElements = {}; // objectId -> SVG <g> element
let dagEdgeElements = []; // { source, target, path } for edge elements
let currentDagObjects = []; // track currently rendered objects for depth coloring
let dagViewLevel = 'domains'; // 'domains' or 'objects'
let dagDrillSchema = null; // schema FQN when drilled in from domain view

/**
 * Build the HTML string for DAG view controls (view toggle, filters, depth coloring).
 *
 * @param {Array} allObjects - All objects from the manifest.
 * @returns {string} HTML string for the controls bar.
 */
function buildDagControls(allObjects) {
    let html = '<div class="dag-controls">';

    // View-level select
    html += '<label>View: </label>';
    html += '<select id="dag-view-level">';
    html += '<option value="domains"' + (dagViewLevel === 'domains' ? ' selected' : '') + '>Domains</option>';
    html += '<option value="objects"' + (dagViewLevel === 'objects' ? ' selected' : '') + '>Objects</option>';
    html += '</select>';

    // Object-mode controls (hidden in domains mode)
    html += '<span id="dag-object-controls"' + (dagViewLevel === 'domains' ? ' class="dag-object-controls hidden"' : ' class="dag-object-controls"') + '>';

    // Schema filter
    html += '<label>Schema: </label>';
    html += '<select id="dag-filter-schema"><option value="all">All</option>';
    const schemas = [...new Set(allObjects.map(o => o.database + '.' + o.schema))].sort();
    schemas.forEach(s => { html += '<option value="' + escapeHtml(s) + '"' + (dagDrillSchema === s ? ' selected' : '') + '>' + escapeHtml(s) + '</option>'; });
    html += '</select>';

    // Cluster filter
    html += '<label>Cluster: </label>';
    html += '<select id="dag-filter-cluster"><option value="all">All</option>';
    const clusterNames = [...new Set(allObjects.map(o => o.cluster).filter(Boolean))].sort();
    clusterNames.forEach(c => { html += '<option value="' + escapeHtml(c) + '">' + escapeHtml(c) + '</option>'; });
    html += '<option value="__none__">(none)</option>';
    html += '</select>';

    // Depth coloring toggle
    html += '<span class="depth-toggle"><input type="checkbox" id="dag-depth-color"><label for="dag-depth-color">Color by depth</label></span>';

    html += '</span>';
    html += '</div>';
    return html;
}

/**
 * Set up mouse-driven pan and zoom on the DAG container.
 *
 * @param {HTMLElement} containerEl - The `#dag-container` element.
 * @param {SVGSVGElement} svg - The `#dag-svg` element.
 * @returns {{resetTransform: function}} Object with a `resetTransform` function.
 */
function setupPanZoom(containerEl, svg) {
    let scale = 1, tx = 0, ty = 0;
    let dragging = false, lastX = 0, lastY = 0;

    function updateTransform() {
        const g = svg.querySelector('g');
        if (g) g.setAttribute('transform', 'translate(' + tx + ',' + ty + ') scale(' + scale + ')');
    }

    containerEl.addEventListener('mousedown', e => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
    containerEl.addEventListener('mousemove', e => {
        if (!dragging) return;
        tx += e.clientX - lastX;
        ty += e.clientY - lastY;
        lastX = e.clientX;
        lastY = e.clientY;
        updateTransform();
    });
    containerEl.addEventListener('mouseup', () => { dragging = false; });
    containerEl.addEventListener('mouseleave', () => { dragging = false; });
    containerEl.addEventListener('wheel', e => {
        e.preventDefault();
        const factor = e.deltaY > 0 ? 0.9 : 1.1;
        scale *= factor;
        updateTransform();
    });

    return {
        resetTransform() {
            scale = 1; tx = 0; ty = 0;
        }
    };
}

/**
 * Render the full DAG view: controls, domain or object graph, event handlers.
 */
function renderDAG() {
    dagRendered = true;

    const container = document.getElementById('view-dag');
    const allObjects = M.objects;

    if (allObjects.length === 0) {
        container.innerHTML = '<p style="color:var(--text-muted)">No objects in project.</p>';
        return;
    }

    // Build controls
    let html = buildDagControls(allObjects);
    html += '<div id="dag-hint" style="font-size:12px;color:var(--text-muted);margin-bottom:8px"></div>';
    html += '<div id="dag-container"><svg id="dag-svg"></svg></div>';
    container.innerHTML = html;

    const svg = document.getElementById('dag-svg');
    const svgEl = document.getElementById('dag-container');
    const panZoom = setupPanZoom(svgEl, svg);

    function resetView() {
        svg.innerHTML = '';
        panZoom.resetTransform();
        dagNodeElements = {};
        dagEdgeElements = [];
    }

    /** Drill into a specific domain from the domain DAG view. */
    function drillIntoDomain(fqn) {
        dagViewLevel = 'objects';
        dagDrillSchema = fqn;
        document.getElementById('dag-view-level').value = 'objects';
        document.getElementById('dag-object-controls').classList.remove('hidden');
        document.getElementById('dag-filter-schema').value = fqn;
        document.getElementById('dag-filter-cluster').value = 'all';
        window.location.hash = 'dag/schema/' + fqn;
        resetView();
        applyDagFilter();
    }

    function renderCurrentView() {
        resetView();
        const hint = document.getElementById('dag-hint');
        if (dagViewLevel === 'domains') {
            renderDomainDAG(svg, drillIntoDomain);
            window.location.hash = 'dag';
            if (hint) hint.textContent = 'Click a domain to drill into its objects.';
        } else {
            applyDagFilter();
            if (hint) hint.textContent = 'Click a node to trace lineage. Double-click to view details.';
        }
    }

    // Filter (objects mode)
    function applyDagFilter() {
        const schemaVal = document.getElementById('dag-filter-schema').value;
        const clusterVal = document.getElementById('dag-filter-cluster').value;
        let filtered = allObjects;
        if (schemaVal !== 'all') {
            filtered = filtered.filter(o => (o.database + '.' + o.schema) === schemaVal);
        }
        if (clusterVal !== 'all') {
            if (clusterVal === '__none__') {
                filtered = filtered.filter(o => !o.cluster);
            } else {
                filtered = filtered.filter(o => o.cluster === clusterVal);
            }
        }
        const filteredIds = new Set(filtered.map(o => o.id));
        const filteredEdges = M.edges.filter(e => filteredIds.has(e.source) && filteredIds.has(e.target));
        svg.innerHTML = '';
        panZoom.resetTransform();
        dagNodeElements = {};
        dagEdgeElements = [];
        currentDagObjects = filtered;
        layoutAndRenderDAG(svg, filtered, filteredEdges);
        // Re-apply depth coloring if active
        const depthCb = document.getElementById('dag-depth-color');
        if (depthCb && depthCb.checked) {
            applyDepthColoring(true);
        }
    }
    document.getElementById('dag-filter-schema').addEventListener('change', function() {
        if (dagViewLevel === 'objects') applyDagFilter();
    });
    document.getElementById('dag-filter-cluster').addEventListener('change', function() {
        if (dagViewLevel === 'objects') applyDagFilter();
    });

    // View-level toggle
    document.getElementById('dag-view-level').addEventListener('change', function() {
        dagViewLevel = this.value;
        dagDrillSchema = null;
        const objControls = document.getElementById('dag-object-controls');
        if (dagViewLevel === 'domains') {
            objControls.classList.add('hidden');
        } else {
            objControls.classList.remove('hidden');
            document.getElementById('dag-filter-schema').value = 'all';
            document.getElementById('dag-filter-cluster').value = 'all';
        }
        renderCurrentView();
    });

    // Depth coloring handler
    document.getElementById('dag-depth-color').addEventListener('change', function() {
        applyDepthColoring(this.checked);
    });

    // Click background to clear lineage
    svgEl.addEventListener('click', function(e) {
        if (e.target === svgEl || e.target === svg || e.target.tagName === 'svg') {
            clearLineage();
        }
    });

    // Initial render
    renderCurrentView();
}

/**
 * Render the domain-level DAG showing schemas as nodes with cross-schema edges.
 *
 * @param {SVGSVGElement} svg - The SVG element to render into.
 * @param {function(string): void} onDrillIntoDomain - Callback invoked with the schema FQN when a domain node is clicked.
 */
function renderDomainDAG(svg, onDrillIntoDomain) {
    // Build domain nodes
    const domainNodes = [];
    const domainIdxMap = {};
    const objToDomain = {}; // objectId -> domain fqn

    M.databases.forEach(db => {
        db.schemas.forEach(schema => {
            const fqn = db.name + '.' + schema.name;
            const typeCounts = {};
            let objectCount = 0;
            schema.object_ids.forEach(oid => {
                const obj = objMap[oid];
                if (!obj) return;
                objectCount++;
                typeCounts[obj.object_type] = (typeCounts[obj.object_type] || 0) + 1;
                objToDomain[oid] = fqn;
            });
            domainIdxMap[fqn] = domainNodes.length;
            domainNodes.push({
                id: fqn,
                label: schema.name,
                fqn: fqn,
                objectCount: objectCount,
                typeCounts: typeCounts
            });
        });
    });

    // Map external objects to a pseudo-domain if needed
    M.objects.forEach(o => {
        if (o.is_external && !objToDomain[o.id]) {
            objToDomain[o.id] = '__external__';
        }
    });

    // Build domain edges: aggregate cross-schema edges
    const edgeMap = {}; // "srcDomain|tgtDomain" -> count
    M.edges.forEach(e => {
        const srcDomain = objToDomain[e.source];
        const tgtDomain = objToDomain[e.target];
        if (!srcDomain || !tgtDomain || srcDomain === tgtDomain) return;
        if (srcDomain === '__external__' || tgtDomain === '__external__') return;
        const key = srcDomain + '|' + tgtDomain;
        edgeMap[key] = (edgeMap[key] || 0) + 1;
    });

    const domainEdges = [];
    Object.keys(edgeMap).forEach(key => {
        const parts = key.split('|');
        domainEdges.push({ source: parts[0], target: parts[1], count: edgeMap[key] });
    });

    if (domainNodes.length === 0) return;

    // Compute layout
    const layout = computeGraphLayout(domainNodes, domainEdges, DOMAIN_DAG);

    // Render SVG
    const ns = 'http://www.w3.org/2000/svg';
    const g = document.createElementNS(ns, 'g');

    g.appendChild(createArrowheadMarker(ns, 'arrowhead-domain'));

    // Edges
    const { NODE_W, NODE_H } = DOMAIN_DAG;
    domainEdges.forEach(e => {
        const si = layout.idxMap[e.source], ti = layout.idxMap[e.target];
        if (si === undefined || ti === undefined) return;
        const path = document.createElementNS(ns, 'path');
        const sx = layout.x[si] + NODE_W / 2, sy = layout.y[si] + NODE_H;
        const tx2 = layout.x[ti] + NODE_W / 2, ty2 = layout.y[ti];
        const my = (sy + ty2) / 2;
        path.setAttribute('d', 'M' + sx + ' ' + sy + ' C' + sx + ' ' + my + ' ' + tx2 + ' ' + my + ' ' + tx2 + ' ' + ty2);
        path.setAttribute('class', 'dag-edge');
        path.setAttribute('marker-end', 'url(#arrowhead-domain)');
        g.appendChild(path);

        // Count label at edge midpoint
        const labelX = (sx + tx2) / 2;
        const labelY = my;
        const label = document.createElementNS(ns, 'text');
        label.setAttribute('x', labelX);
        label.setAttribute('y', labelY - 4);
        label.setAttribute('text-anchor', 'middle');
        label.setAttribute('class', 'dag-edge-label');
        label.textContent = e.count;
        g.appendChild(label);
    });

    // Nodes
    domainNodes.forEach((dn, idx) => {
        const node = document.createElementNS(ns, 'g');
        node.setAttribute('class', 'dag-domain-node');
        node.setAttribute('transform', 'translate(' + layout.x[idx] + ',' + layout.y[idx] + ')');

        const rect = document.createElementNS(ns, 'rect');
        rect.setAttribute('width', NODE_W);
        rect.setAttribute('height', NODE_H);
        rect.setAttribute('rx', '6');
        rect.setAttribute('ry', '6');
        node.appendChild(rect);

        // Schema name (bold, top)
        const nameText = document.createElementNS(ns, 'text');
        nameText.setAttribute('x', 12);
        nameText.setAttribute('y', 20);
        nameText.setAttribute('class', 'domain-name');
        nameText.textContent = dn.label;
        node.appendChild(nameText);

        // Object count (smaller, right-aligned)
        const countText = document.createElementNS(ns, 'text');
        countText.setAttribute('x', NODE_W - 12);
        countText.setAttribute('y', 20);
        countText.setAttribute('text-anchor', 'end');
        countText.setAttribute('class', 'domain-count');
        countText.textContent = dn.objectCount + ' object' + (dn.objectCount !== 1 ? 's' : '');
        node.appendChild(countText);

        // Mini stacked bar
        const barY = 32, barH = 6, barMaxW = NODE_W - 24, barX = 12;
        if (dn.objectCount > 0) {
            let cx = barX;
            TYPE_ORDER.forEach(t => {
                const count = dn.typeCounts[t] || 0;
                if (count === 0) return;
                const w = Math.max(2, (count / dn.objectCount) * barMaxW);
                const barRect = document.createElementNS(ns, 'rect');
                barRect.setAttribute('x', cx);
                barRect.setAttribute('y', barY);
                barRect.setAttribute('width', w);
                barRect.setAttribute('height', barH);
                barRect.setAttribute('rx', '2');
                barRect.setAttribute('fill', TYPE_CSS_COLORS[t] || 'var(--text-muted)');
                barRect.setAttribute('class', 'dag-domain-bar');
                node.appendChild(barRect);
                cx += w;
            });
        }

        // FQN subtitle
        const fqnText = document.createElementNS(ns, 'text');
        fqnText.setAttribute('x', 12);
        fqnText.setAttribute('y', 50);
        fqnText.setAttribute('class', 'domain-count');
        fqnText.textContent = dn.fqn;
        node.appendChild(fqnText);

        // Click handler: drill into domain
        node.addEventListener('click', () => { onDrillIntoDomain(dn.fqn); });

        g.appendChild(node);
    });

    svg.setAttribute('viewBox', '0 0 ' + layout.totalW + ' ' + layout.totalH);
    svg.appendChild(g);
}

/**
 * Toggle depth-based coloring on DAG nodes.
 *
 * When active, node colors are mapped from blue (shallow) to red (deep)
 * using an HSL gradient. When inactive, restores original type-based colors.
 *
 * @param {boolean} active - Whether depth coloring should be applied.
 */
function applyDepthColoring(active) {
    if (!active) {
        // Reset to original type-based colors
        Object.keys(dagNodeElements).forEach(oid => {
            const node = dagNodeElements[oid];
            const obj = objMap[oid];
            if (!obj) return;
            const rect = node.querySelector('rect');
            if (rect) {
                rect.setAttribute('fill', TYPE_FILL_COLORS[obj.object_type] || '#f0f0f2');
                rect.setAttribute('stroke', TYPE_BORDER_COLORS[obj.object_type] || '#c0c0c6');
            }
        });
        return;
    }
    // Find max depth among visible objects
    let maxDepth = 0;
    currentDagObjects.forEach(o => {
        const d = (o.dag_depth != null) ? o.dag_depth : 0;
        if (d > maxDepth) maxDepth = d;
    });
    if (maxDepth === 0) maxDepth = 1;

    currentDagObjects.forEach(o => {
        const node = dagNodeElements[o.id];
        if (!node) return;
        const d = (o.dag_depth != null) ? o.dag_depth : 0;
        const t = d / maxDepth; // 0..1
        // HSL: blue (210) -> orange/red (20)
        const hue = 210 - t * 190;
        const sat = 70;
        const lightFill = 20 + t * 5;
        const lightBorder = 50 + t * 10;
        const rect = node.querySelector('rect');
        if (rect) {
            rect.setAttribute('fill', 'hsl(' + hue + ',' + sat + '%,' + lightFill + '%)');
            rect.setAttribute('stroke', 'hsl(' + hue + ',' + sat + '%,' + lightBorder + '%)');
        }
    });
}

/**
 * Lay out and render the object-level DAG into an SVG element.
 *
 * @param {SVGSVGElement} svg - The SVG element to render into.
 * @param {Array} objects - Objects to render as nodes.
 * @param {Array} edges - Dependency edges between objects.
 */
function layoutAndRenderDAG(svg, objects, edges) {
    if (objects.length === 0) return;

    const layout = computeGraphLayout(objects, edges, OBJECT_DAG);

    // Render SVG
    const ns = 'http://www.w3.org/2000/svg';
    const g = document.createElementNS(ns, 'g');

    g.appendChild(createArrowheadMarker(ns, 'arrowhead'));

    // Edges
    const { NODE_W, NODE_H } = OBJECT_DAG;
    dagEdgeElements = [];
    edges.forEach(e => {
        const si = layout.idxMap[e.source], ti = layout.idxMap[e.target];
        if (si === undefined || ti === undefined) return;
        const path = document.createElementNS(ns, 'path');
        const sx = layout.x[si] + NODE_W / 2, sy = layout.y[si] + NODE_H;
        const tx2 = layout.x[ti] + NODE_W / 2, ty2 = layout.y[ti];
        const my = (sy + ty2) / 2;
        path.setAttribute('d', 'M' + sx + ' ' + sy + ' C' + sx + ' ' + my + ' ' + tx2 + ' ' + my + ' ' + tx2 + ' ' + ty2);
        path.setAttribute('class', 'dag-edge' + (e.kind ? ' edge-' + e.kind : ''));
        path.setAttribute('marker-end', 'url(#arrowhead)');
        path.setAttribute('data-source', e.source);
        path.setAttribute('data-target', e.target);
        g.appendChild(path);
        dagEdgeElements.push({ source: e.source, target: e.target, kind: e.kind, path: path });

        // Phase 6: Semantic FK edge labels
        const targetObj = objMap[e.target];
        const fkMatch = targetObj && (targetObj.constraints || []).find(function(c) {
            return c.kind === 'FOREIGN KEY' && c.references === e.source;
        });
        if (fkMatch) {
            path.setAttribute('class', path.getAttribute('class') + ' edge-fk');
            const mx = (sx + tx2) / 2, mmy = (sy + ty2) / 2;
            const fkLabel = document.createElementNS(ns, 'text');
            var labelText = fkMatch.columns.join(',');
            if (fkMatch.reference_columns && fkMatch.reference_columns.length > 0) {
                labelText += ' \u2192 ' + fkMatch.reference_columns.join(',');
            }
            fkLabel.textContent = labelText;
            fkLabel.setAttribute('x', mx);
            fkLabel.setAttribute('y', mmy - 6);
            fkLabel.setAttribute('class', 'dag-edge-fk-label');
            g.appendChild(fkLabel);
        }
    });

    // Nodes
    dagNodeElements = {};
    objects.forEach((o, i) => {
        const node = document.createElementNS(ns, 'g');
        node.setAttribute('class', 'dag-node');
        node.setAttribute('transform', 'translate(' + layout.x[i] + ',' + layout.y[i] + ')');
        node.setAttribute('data-id', o.id);

        const rect = document.createElementNS(ns, 'rect');
        rect.setAttribute('width', NODE_W);
        rect.setAttribute('height', NODE_H);
        rect.setAttribute('fill', TYPE_FILL_COLORS[o.object_type] || '#f0f0f2');
        rect.setAttribute('stroke', TYPE_BORDER_COLORS[o.object_type] || '#c0c0c6');
        if (o.is_external) rect.setAttribute('stroke-dasharray', '4 2');
        node.appendChild(rect);

        const text = document.createElementNS(ns, 'text');
        text.setAttribute('x', NODE_W / 2);
        text.setAttribute('y', NODE_H / 2 + 4);
        text.setAttribute('text-anchor', 'middle');
        const label = o.name.length > 22 ? o.name.slice(0, 20) + '\u2026' : o.name;
        text.textContent = label;
        node.appendChild(text);

        // Single click = lineage, double click = detail
        let clickTimer = null;
        node.addEventListener('click', function(ev) {
            ev.stopPropagation();
            if (clickTimer) {
                clearTimeout(clickTimer);
                clickTimer = null;
                navigate('detail', o.id);
            } else {
                clickTimer = setTimeout(function() {
                    clickTimer = null;
                    highlightLineage(o.id);
                }, 250);
            }
        });
        g.appendChild(node);
        dagNodeElements[o.id] = node;
    });

    svg.setAttribute('viewBox', '0 0 ' + layout.totalW + ' ' + layout.totalH);
    svg.appendChild(g);
}

/**
 * Highlight the upstream and downstream lineage of an object in the DAG.
 *
 * Performs BFS in both directions from the selected object, then applies
 * CSS classes to dim unrelated nodes/edges and highlight lineage paths.
 * Shows a floating panel with upstream/downstream counts.
 *
 * @param {string} objectId - Fully-qualified ID of the object to trace lineage for.
 */
function highlightLineage(objectId) {
    clearLineage();
    if (!dagNodeElements[objectId]) return;

    // Build adjacency from dagEdgeElements
    const forwardAdj = {}; // source -> [targets]
    const reverseAdj = {}; // target -> [sources]
    dagEdgeElements.forEach(e => {
        if (!forwardAdj[e.source]) forwardAdj[e.source] = [];
        forwardAdj[e.source].push(e.target);
        if (!reverseAdj[e.target]) reverseAdj[e.target] = [];
        reverseAdj[e.target].push(e.source);
    });

    // BFS upstream
    const upstream = new Set();
    const upQueue = [objectId];
    while (upQueue.length > 0) {
        const cur = upQueue.shift();
        const preds = reverseAdj[cur] || [];
        preds.forEach(p => {
            if (!upstream.has(p) && p !== objectId) {
                upstream.add(p);
                upQueue.push(p);
            }
        });
    }

    // BFS downstream
    const downstream = new Set();
    const downQueue = [objectId];
    while (downQueue.length > 0) {
        const cur = downQueue.shift();
        const succs = forwardAdj[cur] || [];
        succs.forEach(s => {
            if (!downstream.has(s) && s !== objectId) {
                downstream.add(s);
                downQueue.push(s);
            }
        });
    }

    const lineageSet = new Set(upstream);
    downstream.forEach(d => { lineageSet.add(d); });
    lineageSet.add(objectId);

    // Dim all nodes not in lineage, highlight upstream/downstream
    Object.keys(dagNodeElements).forEach(oid => {
        const node = dagNodeElements[oid];
        if (oid === objectId) {
            node.setAttribute('class', 'dag-node selected');
        } else if (upstream.has(oid)) {
            node.setAttribute('class', 'dag-node upstream');
        } else if (downstream.has(oid)) {
            node.setAttribute('class', 'dag-node downstream');
        } else {
            node.setAttribute('class', 'dag-node dimmed');
        }
    });

    // Dim/highlight edges
    dagEdgeElements.forEach(e => {
        const srcUp = upstream.has(e.source) || e.source === objectId;
        const tgtUp = upstream.has(e.target) || e.target === objectId;
        const srcDown = downstream.has(e.source) || e.source === objectId;
        const tgtDown = downstream.has(e.target) || e.target === objectId;

        let cls = 'dag-edge';
        if (srcUp && tgtUp) {
            cls += ' upstream';
        } else if (srcDown && tgtDown) {
            cls += ' downstream';
        } else {
            cls += ' dimmed';
        }
        e.path.setAttribute('class', cls);
    });

    // Show lineage panel
    let panel = document.getElementById('lineage-panel');
    if (!panel) {
        panel = document.createElement('div');
        panel.id = 'lineage-panel';
        panel.className = 'lineage-panel';
        document.getElementById('dag-container').appendChild(panel);
    }
    const objName = objMap[objectId] ? objMap[objectId].name : objectId;
    var panelHtml = '<span class="lineage-close" id="lineage-close">&times;</span>' +
        '<div class="lineage-name">' + escapeHtml(objName) + '</div>' +
        '<div class="lineage-stats">' +
        '<span class="lineage-upstream">&uarr; ' + upstream.size + ' upstream</span>' +
        '<span class="lineage-downstream">&darr; ' + downstream.size + ' downstream</span>' +
        '</div>';

    // Phase 7: Show FK relationships in lineage panel
    var fksOut = fkForward[objectId] || [];
    var fksIn = fkReverse[objectId] || [];
    if (fksOut.length > 0 || fksIn.length > 0) {
        panelHtml += '<div class="lineage-relationships">';
        panelHtml += '<h4>Relationships</h4>';
        fksOut.forEach(function(fk) {
            var rel = classifyRelationship(objMap[objectId], {
                columns: fk.source_cols, references: fk.target_id
            });
            panelHtml += '<div class="lineage-rel">';
            panelHtml += '\u2192 <a class="lineage-nav" data-id="' + escapeHtml(fk.target_id) + '">' + escapeHtml(fk.target_id) + '</a>';
            panelHtml += ' <span class="rel-type">' + escapeHtml(rel.label) + '</span>';
            panelHtml += ' via ' + escapeHtml(fk.source_cols.join(', '));
            panelHtml += '</div>';
        });
        fksIn.forEach(function(fk) {
            panelHtml += '<div class="lineage-rel">';
            panelHtml += '\u2190 <a class="lineage-nav" data-id="' + escapeHtml(fk.source_id) + '">' + escapeHtml(fk.source_id) + '</a>';
            panelHtml += ' via ' + escapeHtml(fk.fk_name);
            panelHtml += '</div>';
        });
        panelHtml += '</div>';
    }

    panel.innerHTML = panelHtml;
    panel.style.display = 'block';
    document.getElementById('lineage-close').addEventListener('click', function(ev) {
        ev.stopPropagation();
        clearLineage();
    });
    panel.querySelectorAll('.lineage-nav').forEach(function(link) {
        link.style.cursor = 'pointer';
        link.addEventListener('click', function(ev) {
            ev.stopPropagation();
            navigate('detail', link.dataset.id);
        });
    });
}

/**
 * Clear all lineage highlighting from the DAG, resetting node/edge classes.
 */
function clearLineage() {
    Object.keys(dagNodeElements).forEach(oid => {
        dagNodeElements[oid].setAttribute('class', 'dag-node');
    });
    dagEdgeElements.forEach(e => {
        let cls = 'dag-edge';
        if (e.kind) cls += ' edge-' + e.kind;
        e.path.setAttribute('class', cls);
    });
    const panel = document.getElementById('lineage-panel');
    if (panel) panel.style.display = 'none';
}

/**
 * Render the tests view with summary bar and per-object test result tables.
 */
function renderTests() {
    const el = document.getElementById('view-tests');
    let html = '<h1 style="margin-bottom:20px">Tests</h1>';

    if (!M.test_results || !M.test_results.results) {
        html += '<p style="color:var(--text-muted)">No test results available. Run <code>mz-deploy test</code> to generate results.</p>';
        el.innerHTML = html;
        return;
    }

    const results = M.test_results.results;
    const summary = M.test_results.summary;

    // Summary bar
    html += '<div class="test-summary-bar">';
    html += '<div class="test-stat"><div class="test-stat-value test-status-passed">' + summary.passed + '</div><div>Passed</div></div>';
    html += '<div class="test-stat"><div class="test-stat-value test-status-failed">' + summary.failed + '</div><div>Failed</div></div>';
    html += '<div class="test-stat"><div class="test-stat-value test-status-validation_failed">' + summary.validation_failed + '</div><div>Validation Failed</div></div>';
    html += '</div>';

    // Group by object_id
    const grouped = {};
    results.forEach(r => {
        if (!grouped[r.object_id]) grouped[r.object_id] = [];
        grouped[r.object_id].push(r);
    });

    const objectIds = Object.keys(grouped).sort();
    objectIds.forEach(oid => {
        const tests = grouped[oid];
        html += '<div class="section">';
        html += '<h3><a class="dep-link" data-id="' + escapeHtml(oid) + '">' + escapeHtml(oid) + '</a></h3>';
        html += '<table class="data-table"><thead><tr><th>Test</th><th>Status</th><th>Time</th><th></th></tr></thead><tbody>';

        tests.forEach((t, idx) => {
            const statusClass = 'test-' + t.status;
            html += '<tr><td>' + escapeHtml(t.name) + '</td>';
            html += '<td><span class="badge ' + statusClass + '">' + escapeHtml(t.status) + '</span></td>';
            html += '<td>' + (t.elapsed_ms != null ? t.elapsed_ms + 'ms' : '\u2014') + '</td>';

            if (t.failure) {
                const detailId = 'test-detail-' + escapeHtml(oid).replace(/\./g, '-') + '-' + idx;
                html += '<td><span class="test-expandable" data-target="' + detailId + '">Details</span></td>';
                html += '</tr>';
                html += '<tr><td colspan="4"><div id="' + detailId + '" class="test-detail-content test-failure-detail">';

                if (t.failure.type === 'assertion') {
                    if (t.failure.missing && t.failure.missing.length > 0) {
                        html += '<p style="margin-bottom:4px;color:var(--red)">Missing rows:</p>';
                        html += renderFailureTable(t.failure.columns, t.failure.missing, 'missing-row');
                    }
                    if (t.failure.unexpected && t.failure.unexpected.length > 0) {
                        html += '<p style="margin-bottom:4px;margin-top:8px;color:var(--orange)">Unexpected rows:</p>';
                        html += renderFailureTable(t.failure.columns, t.failure.unexpected, 'unexpected-row');
                    }
                } else {
                    html += '<p class="failure-msg">' + escapeHtml(t.failure.message || '') + '</p>';
                }
                html += '</div></td>';
            } else {
                html += '<td></td>';
            }
            html += '</tr>';
        });

        html += '</tbody></table></div>';
    });

    el.innerHTML = html;

    // Expandable detail handlers
    el.querySelectorAll('.test-expandable').forEach(toggle => {
        toggle.addEventListener('click', function() {
            toggle.classList.toggle('expanded');
            const target = document.getElementById(toggle.dataset.target);
            if (target) target.classList.toggle('visible');
        });
    });

    el.querySelectorAll('.dep-link').forEach(l => {
        l.addEventListener('click', () => navigate('detail', l.dataset.id));
    });
}

/**
 * Render a table of failure rows (missing or unexpected) for a test result.
 *
 * @param {string[]} columns - Column headers.
 * @param {Array<Object>} rows - Row data keyed by column name.
 * @param {string} rowClass - CSS class to apply to each `<tr>`.
 * @returns {string} HTML table string.
 */
function renderFailureTable(columns, rows, rowClass) {
    let html = '<table><thead><tr>';
    (columns || []).forEach(c => { html += '<th>' + escapeHtml(c) + '</th>'; });
    html += '</tr></thead><tbody>';
    rows.forEach(row => {
        html += '<tr class="' + rowClass + '">';
        (columns || []).forEach(c => {
            html += '<td>' + escapeHtml(row[c] != null ? String(row[c]) : '') + '</td>';
        });
        html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
}

/**
 * Render the governance view with a role-to-schema privilege matrix.
 */
function renderGovernance() {
    const el = document.getElementById('view-governance');
    let html = '<h1 style="margin-bottom:20px">Governance</h1>';
    html += '<p style="color:var(--text-muted);margin-bottom:24px">Note: this view reflects object-level GRANT statements only. Schema-level grants and role inheritance are not shown.</p>';

    // Collect all grants across all objects
    const roleSchemaPrivileges = {}; // role -> { schema -> Set<privilege> }
    const allRoles = new Set();
    const allSchemas = new Set();
    const cellObjects = {}; // "role|schema" -> [objectId]

    M.objects.forEach(obj => {
        if (!obj.grants || obj.grants.length === 0) return;
        const schemaKey = obj.database + '.' + obj.schema;
        obj.grants.forEach(g => {
            if (typeof g !== 'object') return;
            const role = g.role;
            const priv = g.privilege;
            allRoles.add(role);
            allSchemas.add(schemaKey);
            if (!roleSchemaPrivileges[role]) roleSchemaPrivileges[role] = {};
            if (!roleSchemaPrivileges[role][schemaKey]) roleSchemaPrivileges[role][schemaKey] = new Set();
            roleSchemaPrivileges[role][schemaKey].add(priv);

            const cellKey = role + '|' + schemaKey;
            if (!cellObjects[cellKey]) cellObjects[cellKey] = [];
            if (cellObjects[cellKey].indexOf(obj.id) === -1) cellObjects[cellKey].push(obj.id);
        });
    });

    const sortedRoles = Array.from(allRoles).sort();
    const sortedSchemas = Array.from(allSchemas).sort();

    if (sortedRoles.length === 0) {
        html += '<p style="color:var(--text-muted)">No grants found in project.</p>';
        el.innerHTML = html;
        return;
    }

    html += '<p style="color:var(--text-muted);margin-bottom:24px">Role-to-schema privilege matrix across all objects.</p>';

    html += '<table class="governance-matrix"><thead><tr><th>Role</th>';
    sortedSchemas.forEach(s => {
        html += '<th>' + escapeHtml(s) + '</th>';
    });
    html += '</tr></thead><tbody>';

    sortedRoles.forEach(role => {
        html += '<tr><td class="role-name">' + escapeHtml(role) + '</td>';
        sortedSchemas.forEach(schema => {
            const privs = roleSchemaPrivileges[role] && roleSchemaPrivileges[role][schema];
            if (privs && privs.size > 0) {
                const cellKey = role + '|' + schema;
                const privsStr = Array.from(privs).sort().join(', ');
                html += '<td class="governance-cell" data-role="' + escapeHtml(role) + '" data-schema="' + escapeHtml(schema) + '" title="Objects: ' + escapeHtml((cellObjects[cellKey] || []).join(', ')) + '">' + escapeHtml(privsStr) + '</td>';
            } else {
                html += '<td style="color:var(--text-muted)">&mdash;</td>';
            }
        });
        html += '</tr>';
    });

    html += '</tbody></table>';

    el.innerHTML = html;

    // Click cell to show objects
    el.querySelectorAll('.governance-cell').forEach(cell => {
        cell.addEventListener('click', function() {
            const role = cell.dataset.role;
            const schema = cell.dataset.schema;
            const cellKey = role + '|' + schema;
            const objs = cellObjects[cellKey] || [];
            if (objs.length === 0) return;

            // Toggle inline detail
            const existing = cell.parentElement.querySelector('.governance-detail');
            if (existing) { existing.remove(); return; }

            // Remove other open details
            el.querySelectorAll('.governance-detail').forEach(d => { d.remove(); });

            const detail = document.createElement('tr');
            detail.className = 'governance-detail';
            const td = document.createElement('td');
            td.colSpan = sortedSchemas.length + 1;
            td.style.cssText = 'padding:12px;background:var(--bg-tertiary);font-size:13px';
            td.innerHTML = '<strong>' + escapeHtml(role) + '</strong> in <strong>' + escapeHtml(schema) + '</strong>: ' +
                objs.map(oid => '<a class="dep-link" data-id="' + escapeHtml(oid) + '">' + escapeHtml(oid) + '</a>').join(', ');
            detail.appendChild(td);
            cell.parentElement.insertAdjacentElement('afterend', detail);
            detail.querySelectorAll('.dep-link').forEach(l => {
                l.addEventListener('click', () => { navigate('detail', l.dataset.id); });
            });
        });
    });
}

/** Layout dimensions for ER diagram nodes. */
var ER_DAG = { NODE_W: 220, NODE_H: 32, PAD_X: 60, PAD_Y: 60 };

/**
 * Render the Entity-Relationship diagram view.
 */
function renderERDiagram() {
    var el = document.getElementById('view-er');

    // Collect ER-relevant objects: those with PKs, FKs, or that are FK targets
    var erObjectIds = new Set();
    M.objects.forEach(function(obj) {
        var hasPK = (obj.constraints || []).some(function(c) { return c.kind === 'PRIMARY KEY'; });
        var hasFK = (obj.constraints || []).some(function(c) { return c.kind === 'FOREIGN KEY'; });
        if (hasPK || hasFK) erObjectIds.add(obj.id);
        if (fkReverse[obj.id]) erObjectIds.add(obj.id);
    });

    if (erObjectIds.size === 0) {
        el.innerHTML = '<h1 style="margin-bottom:20px">Entity Relationships</h1>' +
            '<p style="color:var(--text-muted)">No FK constraints found in project. Add CONSTRAINT ... FOREIGN KEY statements to see the ER diagram.</p>';
        return;
    }

    var erObjects = M.objects.filter(function(o) { return erObjectIds.has(o.id); });

    // Build FK edges for layout
    var erEdges = [];
    var edgeDetails = [];
    erObjects.forEach(function(obj) {
        (fkForward[obj.id] || []).forEach(function(fk) {
            if (erObjectIds.has(fk.target_id)) {
                var rel = classifyRelationship(obj, {
                    columns: fk.source_cols, references: fk.target_id
                });
                erEdges.push({ source: fk.target_id, target: obj.id });
                edgeDetails.push({
                    source_id: obj.id,
                    target_id: fk.target_id,
                    fk_name: fk.fk_name,
                    source_cols: fk.source_cols,
                    target_cols: fk.target_cols,
                    rel: rel,
                    enforced: fk.enforced
                });
            }
        });
    });

    // Compute dynamic node heights based on column count
    var nodeHeights = {};
    erObjects.forEach(function(obj) {
        var pks = (obj.constraints || []).filter(function(c) { return c.kind === 'PRIMARY KEY'; });
        var fks = (obj.constraints || []).filter(function(c) { return c.kind === 'FOREIGN KEY'; });
        var pkCols = pks.length > 0 ? pks[0].columns : [];
        var fkCols = [];
        fks.forEach(function(fk) {
            fk.columns.forEach(function(c) {
                if (fkCols.indexOf(c) === -1 && pkCols.indexOf(c) === -1) fkCols.push(c);
            });
        });
        var lineCount = 1 + pkCols.length + fkCols.length; // name + pk cols + fk cols
        nodeHeights[obj.id] = Math.max(40, 28 + lineCount * 16);
    });

    // Use max height for uniform layout
    var maxNodeH = 40;
    erObjects.forEach(function(obj) { maxNodeH = Math.max(maxNodeH, nodeHeights[obj.id]); });

    var erDims = { NODE_W: 220, NODE_H: maxNodeH, PAD_X: 60, PAD_Y: 50 };
    var layout = computeGraphLayout(erObjects, erEdges, erDims);

    // Build controls
    var html = '<h1 style="margin-bottom:12px">Entity Relationships</h1>';
    html += '<div class="er-controls">';
    html += '<button id="er-zoom-in">+</button>';
    html += '<button id="er-zoom-out">\u2212</button>';
    html += '<button id="er-reset">Reset</button>';
    html += '<button id="er-export-jsonld">Export JSON-LD</button>';
    html += '<button id="er-export-owl">Export OWL/XML</button>';
    html += '</div>';
    html += '<div id="er-container"><svg id="er-svg"></svg></div>';
    el.innerHTML = html;

    var svg = document.getElementById('er-svg');
    var ns = 'http://www.w3.org/2000/svg';
    var g = document.createElementNS(ns, 'g');

    g.appendChild(createArrowheadMarker(ns, 'er-arrowhead'));

    // Render edges
    edgeDetails.forEach(function(ed) {
        var si = layout.idxMap[ed.target_id], ti = layout.idxMap[ed.source_id];
        if (si === undefined || ti === undefined) return;
        var sx = layout.x[si] + erDims.NODE_W / 2, sy = layout.y[si] + erDims.NODE_H;
        var tx = layout.x[ti] + erDims.NODE_W / 2, ty = layout.y[ti];
        var my = (sy + ty) / 2;

        var edgeG = document.createElementNS(ns, 'g');
        edgeG.setAttribute('class', 'er-edge er-edge-' + ed.rel.type);

        var path = document.createElementNS(ns, 'path');
        path.setAttribute('d', 'M' + sx + ' ' + sy + ' C' + sx + ' ' + my + ' ' + tx + ' ' + my + ' ' + tx + ' ' + ty);
        path.setAttribute('marker-end', 'url(#er-arrowhead)');
        edgeG.appendChild(path);

        // Label
        var label = document.createElementNS(ns, 'text');
        label.setAttribute('x', (sx + tx) / 2);
        label.setAttribute('y', (sy + ty) / 2 - 6);
        label.setAttribute('class', 'er-edge-label');
        label.textContent = ed.rel.label + ': ' + ed.fk_name;
        edgeG.appendChild(label);

        // Cardinality at source end
        var srcCard = document.createElementNS(ns, 'text');
        srcCard.setAttribute('x', sx + 8);
        srcCard.setAttribute('y', sy + 14);
        srcCard.setAttribute('class', 'er-cardinality');
        if (ed.rel.type === 'one-to-one') srcCard.textContent = '1';
        else if (ed.rel.type === 'subclass') srcCard.textContent = '1';
        else srcCard.textContent = 'N';
        edgeG.appendChild(srcCard);

        // Cardinality at target end
        var tgtCard = document.createElementNS(ns, 'text');
        tgtCard.setAttribute('x', tx + 8);
        tgtCard.setAttribute('y', ty - 4);
        tgtCard.setAttribute('class', 'er-cardinality');
        tgtCard.textContent = '1';
        edgeG.appendChild(tgtCard);

        // Tooltip
        var title = document.createElementNS(ns, 'title');
        title.textContent = ed.fk_name + ': ' + ed.source_cols.join(', ') + ' \u2192 ' + ed.target_cols.join(', ');
        edgeG.appendChild(title);

        g.appendChild(edgeG);
    });

    // Render nodes
    erObjects.forEach(function(obj, i) {
        var nodeH = nodeHeights[obj.id];
        var node = document.createElementNS(ns, 'g');
        node.setAttribute('class', 'er-node');
        node.setAttribute('transform', 'translate(' + layout.x[i] + ',' + layout.y[i] + ')');

        var rect = document.createElementNS(ns, 'rect');
        rect.setAttribute('width', erDims.NODE_W);
        rect.setAttribute('height', nodeH);
        rect.setAttribute('rx', '6');
        rect.setAttribute('stroke', TYPE_BORDER_COLORS[obj.object_type] || '#c0c0c6');
        node.appendChild(rect);

        // Name
        var nameText = document.createElementNS(ns, 'text');
        nameText.setAttribute('x', 10);
        nameText.setAttribute('y', 18);
        nameText.setAttribute('class', 'er-node-name');
        nameText.textContent = obj.name.length > 24 ? obj.name.slice(0, 22) + '\u2026' : obj.name;
        node.appendChild(nameText);

        // Type badge
        var typeBadge = document.createElementNS(ns, 'text');
        typeBadge.setAttribute('x', erDims.NODE_W - 10);
        typeBadge.setAttribute('y', 18);
        typeBadge.setAttribute('text-anchor', 'end');
        typeBadge.setAttribute('class', 'er-type-badge');
        typeBadge.textContent = obj.object_type;
        node.appendChild(typeBadge);

        // Separator line
        var sep = document.createElementNS(ns, 'line');
        sep.setAttribute('x1', 0);
        sep.setAttribute('y1', 26);
        sep.setAttribute('x2', erDims.NODE_W);
        sep.setAttribute('y2', 26);
        sep.setAttribute('stroke', '#e0e0e3');
        node.appendChild(sep);

        // PK and FK columns
        var yPos = 40;
        var pks = (obj.constraints || []).filter(function(c) { return c.kind === 'PRIMARY KEY'; });
        var fks = (obj.constraints || []).filter(function(c) { return c.kind === 'FOREIGN KEY'; });
        var pkCols = pks.length > 0 ? pks[0].columns : [];
        var fkColSet = new Set();
        fks.forEach(function(fk) { fk.columns.forEach(function(c) { fkColSet.add(c); }); });

        pkCols.forEach(function(col) {
            var colText = document.createElementNS(ns, 'text');
            colText.setAttribute('x', 10);
            colText.setAttribute('y', yPos);
            colText.setAttribute('class', 'er-pk-col');
            colText.textContent = '\ud83d\udd11 ' + col;
            node.appendChild(colText);
            yPos += 16;
        });

        fks.forEach(function(fk) {
            fk.columns.forEach(function(col) {
                if (pkCols.indexOf(col) !== -1) return; // already shown as PK
                var colText = document.createElementNS(ns, 'text');
                colText.setAttribute('x', 10);
                colText.setAttribute('y', yPos);
                colText.setAttribute('class', 'er-fk-col');
                colText.textContent = '\u2192 ' + col;
                node.appendChild(colText);
                yPos += 16;
            });
        });

        node.addEventListener('click', function() { navigate('detail', obj.id); });
        g.appendChild(node);
    });

    svg.setAttribute('viewBox', '0 0 ' + layout.totalW + ' ' + layout.totalH);
    svg.appendChild(g);

    // Pan/zoom
    setupPanZoom(svg, g, 'er-zoom-in', 'er-zoom-out', 'er-reset');

    // Export handlers
    document.getElementById('er-export-jsonld').addEventListener('click', function() {
        exportOntologyJsonLD();
    });
    document.getElementById('er-export-owl').addEventListener('click', function() {
        exportOntologyOWL();
    });
}

/**
 * Set up pan and zoom controls for an SVG element.
 *
 * @param {SVGElement} svg - The SVG element.
 * @param {SVGGElement} g - The root group element inside the SVG.
 * @param {string} zoomInId - Button element ID for zoom in.
 * @param {string} zoomOutId - Button element ID for zoom out.
 * @param {string} resetId - Button element ID for reset.
 */
function setupPanZoom(svg, g, zoomInId, zoomOutId, resetId) {
    var scale = 1, panX = 0, panY = 0;
    var isPanning = false, startX, startY;

    function applyTransform() {
        g.setAttribute('transform', 'translate(' + panX + ',' + panY + ') scale(' + scale + ')');
    }

    svg.addEventListener('wheel', function(e) {
        e.preventDefault();
        var delta = e.deltaY > 0 ? 0.9 : 1.1;
        scale = Math.max(0.1, Math.min(5, scale * delta));
        applyTransform();
    });

    svg.addEventListener('mousedown', function(e) {
        isPanning = true;
        startX = e.clientX - panX;
        startY = e.clientY - panY;
        svg.style.cursor = 'grabbing';
    });

    svg.addEventListener('mousemove', function(e) {
        if (!isPanning) return;
        panX = e.clientX - startX;
        panY = e.clientY - startY;
        applyTransform();
    });

    svg.addEventListener('mouseup', function() { isPanning = false; svg.style.cursor = 'grab'; });
    svg.addEventListener('mouseleave', function() { isPanning = false; svg.style.cursor = 'default'; });

    document.getElementById(zoomInId).addEventListener('click', function() {
        scale = Math.min(5, scale * 1.2);
        applyTransform();
    });
    document.getElementById(zoomOutId).addEventListener('click', function() {
        scale = Math.max(0.1, scale * 0.8);
        applyTransform();
    });
    document.getElementById(resetId).addEventListener('click', function() {
        scale = 1; panX = 0; panY = 0;
        applyTransform();
    });
}

/**
 * Render the Path Finder view for discovering FK paths between objects.
 */
function renderPathFinder() {
    var el = document.getElementById('view-pathfinder');

    // Collect objects that participate in FK relationships
    var fkParticipants = [];
    M.objects.forEach(function(obj) {
        if (fkForward[obj.id] || fkReverse[obj.id]) {
            fkParticipants.push(obj);
        }
    });

    var html = '<h1 style="margin-bottom:12px">Path Finder</h1>';
    html += '<p style="color:var(--text-muted);margin-bottom:16px">Find foreign key paths between any two objects in the project.</p>';

    if (fkParticipants.length < 2) {
        html += '<p style="color:var(--text-muted)">Need at least 2 objects with FK constraints to find paths.</p>';
        el.innerHTML = html;
        return;
    }

    html += '<div class="pathfinder-controls">';
    html += '<select id="pf-from"><option value="">From...</option>';
    fkParticipants.forEach(function(o) {
        html += '<option value="' + escapeHtml(o.id) + '">' + escapeHtml(o.id) + '</option>';
    });
    html += '</select>';
    html += '<select id="pf-to"><option value="">To...</option>';
    fkParticipants.forEach(function(o) {
        html += '<option value="' + escapeHtml(o.id) + '">' + escapeHtml(o.id) + '</option>';
    });
    html += '</select>';
    html += '<button id="pf-find">Find Paths</button>';
    html += '</div>';
    html += '<div id="pf-results"></div>';

    el.innerHTML = html;

    document.getElementById('pf-find').addEventListener('click', function() {
        var fromId = document.getElementById('pf-from').value;
        var toId = document.getElementById('pf-to').value;
        var resultsEl = document.getElementById('pf-results');
        if (!fromId || !toId) {
            resultsEl.innerHTML = '<p style="color:var(--text-muted)">Select both From and To objects.</p>';
            return;
        }
        if (fromId === toId) {
            resultsEl.innerHTML = '<p style="color:var(--text-muted)">From and To must be different objects.</p>';
            return;
        }

        var paths = findFKPaths(fromId, toId);
        if (paths.length === 0) {
            resultsEl.innerHTML = '<p style="color:var(--text-muted)">No FK paths found between these objects (max depth: 6).</p>';
            return;
        }

        var rhtml = '<p style="color:var(--text-muted);margin-bottom:12px">Found ' + paths.length + ' path(s):</p>';
        paths.forEach(function(path, pidx) {
            rhtml += '<div class="pathfinder-result">';

            // Path chain visualization
            rhtml += '<div class="path-chain">';
            path.forEach(function(nodeId, ni) {
                if (ni > 0) {
                    // Find the FK between consecutive nodes
                    var prev = path[ni - 1];
                    var fkInfo = findFKBetween(prev, nodeId);
                    rhtml += '<span class="path-arrow">\u2192</span>';
                }
                var nodeObj = objMap[nodeId];
                var label = nodeObj ? nodeObj.name : nodeId;
                rhtml += '<span class="path-node" data-id="' + escapeHtml(nodeId) + '">' + escapeHtml(label) + '</span>';
            });
            rhtml += '</div>';

            // Step details
            for (var si = 1; si < path.length; si++) {
                var fkInfo = findFKBetween(path[si - 1], path[si]);
                if (fkInfo) {
                    rhtml += '<div class="path-step">' + escapeHtml(fkInfo.fk_name) + ': ' +
                        escapeHtml(fkInfo.source_cols.join(', ')) + ' \u2192 ' +
                        escapeHtml(fkInfo.target_cols.join(', ')) +
                        ' <span class="rel-type" style="display:inline-block;padding:0 4px;background:var(--bg-tertiary);border-radius:3px;font-size:10px">' +
                        escapeHtml(fkInfo.relLabel) + '</span></div>';
                }
            }

            // Generate JOIN SQL
            var joinSql = generateJoinSQL(path);
            if (joinSql) {
                rhtml += '<details class="path-sql"><summary>JOIN SQL</summary>';
                rhtml += '<div class="sql-block"><pre>' + highlightSQL(joinSql) + '</pre></div></details>';
            }

            rhtml += '</div>';
        });

        resultsEl.innerHTML = rhtml;

        // Click handlers for path nodes
        resultsEl.querySelectorAll('.path-node').forEach(function(n) {
            n.addEventListener('click', function() { navigate('detail', n.dataset.id); });
        });
    });
}

/**
 * Find the FK constraint between two adjacent nodes in a path.
 *
 * @param {string} a - First object ID.
 * @param {string} b - Second object ID.
 * @returns {Object|null} FK info with source_cols, target_cols, fk_name, relLabel.
 */
function findFKBetween(a, b) {
    // Check forward: a has FK referencing b
    var fwd = (fkForward[a] || []).find(function(r) { return r.target_id === b; });
    if (fwd) {
        var rel = classifyRelationship(objMap[a], { columns: fwd.source_cols, references: b });
        return { fk_name: fwd.fk_name, source_cols: fwd.source_cols, target_cols: fwd.target_cols, relLabel: rel.label, direction: 'forward' };
    }
    // Check reverse: b has FK referencing a
    var rev = (fkForward[b] || []).find(function(r) { return r.target_id === a; });
    if (rev) {
        var rel2 = classifyRelationship(objMap[b], { columns: rev.source_cols, references: a });
        return { fk_name: rev.fk_name, source_cols: rev.source_cols, target_cols: rev.target_cols, relLabel: rel2.label, direction: 'reverse' };
    }
    return null;
}

/**
 * Generate a SQL JOIN statement for a path of objects.
 *
 * @param {string[]} path - Array of object IDs in path order.
 * @returns {string} SQL SELECT ... FROM ... JOIN statement.
 */
function generateJoinSQL(path) {
    if (path.length < 2) return '';
    var aliases = {};
    var aliasIdx = 0;

    function getAlias(id) {
        if (!aliases[id]) {
            var obj = objMap[id];
            var name = obj ? obj.name : id;
            // Use first letter + index as alias
            aliases[id] = name.charAt(0).toLowerCase() + (aliasIdx++);
        }
        return aliases[id];
    }

    var firstAlias = getAlias(path[0]);
    var firstObj = objMap[path[0]];
    var firstFqn = firstObj ? firstObj.id : path[0];
    var sql = 'SELECT *\nFROM ' + firstFqn + ' ' + firstAlias;

    for (var i = 1; i < path.length; i++) {
        var fkInfo = findFKBetween(path[i - 1], path[i]);
        if (!fkInfo) continue;

        var curAlias = getAlias(path[i]);
        var curObj = objMap[path[i]];
        var curFqn = curObj ? curObj.id : path[i];
        var prevAlias = getAlias(path[i - 1]);

        sql += '\nJOIN ' + curFqn + ' ' + curAlias + ' ON ';

        if (fkInfo.direction === 'forward') {
            // path[i-1] has FK to path[i]
            var conditions = [];
            for (var j = 0; j < fkInfo.source_cols.length; j++) {
                conditions.push(prevAlias + '.' + fkInfo.source_cols[j] + ' = ' +
                    curAlias + '.' + (fkInfo.target_cols[j] || fkInfo.source_cols[j]));
            }
            sql += conditions.join(' AND ');
        } else {
            // path[i] has FK to path[i-1]
            var conditions2 = [];
            for (var j2 = 0; j2 < fkInfo.source_cols.length; j2++) {
                conditions2.push(curAlias + '.' + fkInfo.source_cols[j2] + ' = ' +
                    prevAlias + '.' + (fkInfo.target_cols[j2] || fkInfo.source_cols[j2]));
            }
            sql += conditions2.join(' AND ');
        }
    }

    return sql;
}

// ====== Ontology Export ======

/**
 * Export the project's FK ontology as JSON-LD and trigger a download.
 */
function exportOntologyJsonLD() {
    var graph = [];

    // Classes
    M.objects.forEach(function(obj) {
        if (!fkForward[obj.id] && !fkReverse[obj.id]) return;
        var classEntry = {
            '@id': 'mz:' + obj.name,
            '@type': 'owl:Class',
            'rdfs:label': obj.id
        };
        var roles = classifyObject(obj);
        if (roles.length > 0) {
            classEntry['mz:ontologyRoles'] = roles;
        }
        graph.push(classEntry);
    });

    // Properties (FK relationships)
    M.objects.forEach(function(obj) {
        (fkForward[obj.id] || []).forEach(function(fk) {
            var targetObj = objMap[fk.target_id];
            if (!targetObj) return;
            var rel = classifyRelationship(obj, { columns: fk.source_cols, references: fk.target_id });
            var prop = {
                '@id': 'mz:' + fk.fk_name,
                '@type': rel.type === 'one-to-one' ? 'owl:FunctionalProperty' : 'owl:ObjectProperty',
                'rdfs:domain': { '@id': 'mz:' + obj.name },
                'rdfs:range': { '@id': 'mz:' + targetObj.name },
                'mz:relationType': rel.label,
                'mz:columns': fk.source_cols.join(', ') + ' \u2192 ' + fk.target_cols.join(', ')
            };
            graph.push(prop);
        });
    });

    var jsonld = {
        '@context': {
            'owl': 'http://www.w3.org/2002/07/owl#',
            'rdfs': 'http://www.w3.org/2000/01/rdf-schema#',
            'mz': 'http://materialize.com/ontology/'
        },
        '@graph': graph
    };

    var blob = new Blob([JSON.stringify(jsonld, null, 2)], { type: 'application/ld+json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = M.project_name + '-ontology.jsonld';
    a.click();
    URL.revokeObjectURL(url);
}

/**
 * Export the project's FK ontology as OWL/XML and trigger a download.
 */
function exportOntologyOWL() {
    var xml = '<?xml version="1.0" encoding="UTF-8"?>\n';
    xml += '<rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"\n';
    xml += '         xmlns:rdfs="http://www.w3.org/2000/01/rdf-schema#"\n';
    xml += '         xmlns:owl="http://www.w3.org/2002/07/owl#"\n';
    xml += '         xmlns:mz="http://materialize.com/ontology/">\n\n';

    // Classes
    M.objects.forEach(function(obj) {
        if (!fkForward[obj.id] && !fkReverse[obj.id]) return;
        xml += '  <owl:Class rdf:about="mz:' + escapeXml(obj.name) + '">\n';
        xml += '    <rdfs:label>' + escapeXml(obj.id) + '</rdfs:label>\n';
        xml += '  </owl:Class>\n\n';
    });

    // Properties
    M.objects.forEach(function(obj) {
        (fkForward[obj.id] || []).forEach(function(fk) {
            var targetObj = objMap[fk.target_id];
            if (!targetObj) return;
            var rel = classifyRelationship(obj, { columns: fk.source_cols, references: fk.target_id });
            var propType = rel.type === 'one-to-one' ? 'owl:FunctionalProperty' : 'owl:ObjectProperty';
            xml += '  <' + propType + ' rdf:about="mz:' + escapeXml(fk.fk_name) + '">\n';
            xml += '    <rdfs:domain rdf:resource="mz:' + escapeXml(obj.name) + '"/>\n';
            xml += '    <rdfs:range rdf:resource="mz:' + escapeXml(targetObj.name) + '"/>\n';
            xml += '  </' + propType + '>\n\n';
        });
    });

    xml += '</rdf:RDF>\n';

    var blob = new Blob([xml], { type: 'application/rdf+xml' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = M.project_name + '-ontology.owl';
    a.click();
    URL.revokeObjectURL(url);
}

/**
 * Escape a string for safe insertion into XML.
 *
 * @param {string} str - Value to escape.
 * @returns {string} XML-safe string.
 */
function escapeXml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&apos;');
}
