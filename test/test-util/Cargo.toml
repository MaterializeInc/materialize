[package]
name = "mz-test-util"
description = "Utilities for testing Materialize"
version = "0.0.0"
edition.workspace = true
rust-version.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
chrono = { workspace = true, features = ["std"], default-features = false }
